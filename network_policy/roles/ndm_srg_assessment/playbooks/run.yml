---
# Grab-and-go entry point for the NDM SRG / Network Infrastructure Policy
# assessment + evidence generator. Read-only; runs on the control node.
#
#   ansible-playbook network_policy/roles/ndm_srg_assessment/playbooks/run.yml
#
# Output: /tmp/ndm-srg-artifacts/ndm_srg_assessment.{json,md}
- name: Generate NDM SRG / Network Infrastructure Policy evidence
  hosts: localhost
  connection: local
  gather_facts: true
  roles:
    - role: ndm_srg_assessment
