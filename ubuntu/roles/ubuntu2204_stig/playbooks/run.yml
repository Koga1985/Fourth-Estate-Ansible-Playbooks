---
# Grab-and-go entry point for the Ubuntu 22.04 STIG role.
# Dry-run: ansible-playbook -i inventory.example run.yml
# Enforce: ansible-playbook -i inventory.example run.yml -e apply_changes=true
- name: Apply Canonical Ubuntu 22.04 LTS STIG hardening
  hosts: ubuntu2204
  become: true
  gather_facts: true
  any_errors_fatal: false
  roles:
    - role: ubuntu2204_stig
