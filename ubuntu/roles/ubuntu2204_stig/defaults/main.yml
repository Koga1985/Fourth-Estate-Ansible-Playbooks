---
# defaults file for ubuntu2204_stig
# Canonical Ubuntu 22.04 LTS STIG (DISA) - rule IDs UBTU-22-XXXXXX.
# NIST SP 800-53 Rev 5 aligned.
#
# Safe by default: apply_changes=false runs every task in check mode (reports,
# changes nothing) and writes a per-host JSON findings artifact. Pass
# -e apply_changes=true to remediate.

apply_changes: false
artifacts_dir: "/tmp/ubuntu2204-stig-artifacts"

# Control-area toggles
stig_banner: true
stig_packages_services: true
stig_sshd: true
stig_accounts_pam: true
stig_auditd: true
stig_kernel_sysctl: true
stig_compliance_report: true

# UBTU-22-255010 - DoD banner
ubuntu_dod_banner: |
  You are accessing a U.S. Government (USG) Information System (IS) that is
  provided for USG-authorized use only. By using this IS (which includes any
  device attached to this IS), you consent to the following conditions:
  -The USG routinely intercepts and monitors communications on this IS.
  -At any time, the USG may inspect and seize data stored on this IS.
  -Communications using, or data stored on, this IS are not private.
  -This IS includes security measures to protect USG interests.
  -Notwithstanding the above, using this IS does not constitute consent to PM,
  LE or CI investigative searching or monitoring of the content of privileged
  communications. See User Agreement for details.

# UBTU-22-2552xx - SSH daemon (drop-in)
ubuntu_sshd_dropin: /etc/ssh/sshd_config.d/00-stig.conf
ubuntu_ssh_permit_root_login: "no"          # UBTU-22-255045
ubuntu_ssh_client_alive_interval: 600       # UBTU-22-255070
ubuntu_ssh_client_alive_count_max: 1        # UBTU-22-255075
ubuntu_ssh_x11_forwarding: "no"             # UBTU-22-255050
ubuntu_ssh_permit_empty_passwords: "no"     # UBTU-22-255040
ubuntu_ssh_ignore_rhosts: "yes"
ubuntu_ssh_banner: /etc/issue.net           # UBTU-22-255010

# UBTU-22-2153xx - packages
ubuntu_packages_absent:
  - telnetd           # UBTU-22-215010
  - rsh-server
  - nis
ubuntu_packages_present:
  - auditd            # UBTU-22-651010
  - aide              # UBTU-22-651015
  - ufw               # UBTU-22-251010
  - chrony            # UBTU-22-252010
  - apparmor          # UBTU-22-232010
  - libpam-pwquality

# UBTU-22-611xxx - PAM pwquality / faillock
ubuntu_pwquality:
  difok: 8
  minlen: 15          # UBTU-22-611015
  ucredit: -1         # UBTU-22-611025
  lcredit: -1         # UBTU-22-611035
  dcredit: -1         # UBTU-22-611045
  ocredit: -1         # UBTU-22-611055
  dictcheck: 1
ubuntu_faillock:
  deny: 3             # UBTU-22-411045
  fail_interval: 900
  unlock_time: 0      # UBTU-22-411050

# UBTU-22-411xxx - login.defs / accounts
ubuntu_pass_max_days: 60      # UBTU-22-411010
ubuntu_pass_min_days: 1       # UBTU-22-411020
ubuntu_encrypt_method: "SHA512"   # UBTU-22-611010
ubuntu_account_inactive_days: 35  # UBTU-22-411030
ubuntu_session_tmout: 600     # UBTU-22-412010
ubuntu_umask: "077"           # UBTU-22-412020

# UBTU-22-653xxx - auditd actions
ubuntu_auditd_space_left_action: email
ubuntu_auditd_disk_full_action: halt
ubuntu_auditd_max_log_file_action: syslog

# UBTU-22-2nnxxx - kernel sysctl
ubuntu_sysctl:
  net.ipv4.conf.all.accept_redirects: 0
  net.ipv4.conf.all.accept_source_route: 0
  net.ipv4.conf.all.send_redirects: 0
  net.ipv4.conf.all.rp_filter: 1
  net.ipv4.icmp_echo_ignore_broadcasts: 1
  net.ipv6.conf.all.accept_source_route: 0
  net.ipv6.conf.all.accept_redirects: 0
  kernel.randomize_va_space: 2
  kernel.dmesg_restrict: 1
  kernel.kptr_restrict: 1
  fs.protected_symlinks: 1
  fs.protected_hardlinks: 1

compliance_frameworks:
  - dod_stig
  - nist_800_53
  - nist_800_171
stig_benchmark: "Canonical Ubuntu 22.04 LTS STIG"
stig_version: "V2R1"
