---
# SSH daemon hardening via a STIG drop-in (RHEL 8 uses Include sshd_config.d/*)
# RHEL-08-010040/255035/255040/255045/255065/255090/255100/255105/255110
# NIST AC-12, AC-17, IA-2, SC-23

- name: RHEL-08-010xxx - Write SSH STIG drop-in configuration
  ansible.builtin.copy:
    dest: "{{ rhel8_sshd_dropin }}"
    owner: root
    group: root
    mode: "0600"
    content: |
      # Managed by rhel8_stig - DoD RHEL 8 STIG {{ stig_version }}
      Banner {{ rhel8_ssh_banner }}
      PermitRootLogin {{ rhel8_ssh_permit_root_login }}
      ClientAliveInterval {{ rhel8_ssh_client_alive_interval }}
      ClientAliveCountMax {{ rhel8_ssh_client_alive_count_max }}
      X11Forwarding {{ rhel8_ssh_x11_forwarding }}
      PermitEmptyPasswords {{ rhel8_ssh_permit_empty_passwords }}
      PrintLastLog {{ rhel8_ssh_print_last_log }}
      IgnoreRhosts {{ rhel8_ssh_ignore_rhosts }}
      GSSAPIAuthentication {{ rhel8_ssh_gss_api_auth }}
      StrictModes yes
      Compression no
      MaxAuthTries 6
  check_mode: "{{ not (apply_changes | bool) }}"
  register: r_sshd_dropin
  notify: restart sshd
  tags:
    - stig_cat2
    - "RHEL-08-010040"
    - "RHEL-08-010550"
    - "RHEL-08-010201"
    - "RHEL-08-010200"
    - "RHEL-08-010630"

- name: RHEL-08-010570 - Validate sshd configuration syntax
  ansible.builtin.command: /usr/sbin/sshd -t
  changed_when: false
  when: apply_changes | bool
  tags: [stig_cat2, "RHEL-08-010570"]
