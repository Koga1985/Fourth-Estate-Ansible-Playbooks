---
# defaults file for rhel8_stig
# Red Hat Enterprise Linux 8 STIG (DISA) - rule IDs RHEL-08-XXXXXX.
# NIST SP 800-53 Rev 5 aligned. Companion to rhel9_stig (RHEL-09-*).
#
# Safe by default: apply_changes=false runs every task in check mode (reports,
# changes nothing) and writes a per-host JSON findings artifact. Pass
# -e apply_changes=true to remediate. Crypto policy / FIPS changes need a reboot.

apply_changes: false
artifacts_dir: "/tmp/rhel8-stig-artifacts"

# Control-area toggles
stig_banner_login: true
stig_packages_services: true
stig_sshd: true
stig_crypto_policy: true
stig_accounts_pam: true
stig_auditd: true
stig_kernel_sysctl: true
stig_compliance_report: true

# RHEL-08-010550 / 010200 / 010201 - SSH daemon (drop-in)
rhel8_sshd_dropin: /etc/ssh/sshd_config.d/00-stig.conf
rhel8_ssh_permit_root_login: "no"           # RHEL-08-010550
rhel8_ssh_client_alive_interval: 600        # RHEL-08-010201
rhel8_ssh_client_alive_count_max: 1         # RHEL-08-010200
rhel8_ssh_x11_forwarding: "no"              # RHEL-08-010630
rhel8_ssh_permit_empty_passwords: "no"      # RHEL-08-010300
rhel8_ssh_ignore_rhosts: "yes"              # RHEL-08-010460
rhel8_ssh_print_last_log: "yes"             # RHEL-08-020350
rhel8_ssh_banner: /etc/issue                # RHEL-08-010040

# RHEL-08-010060 - DoD banner
rhel8_dod_banner: |
  You are accessing a U.S. Government (USG) Information System (IS) that is
  provided for USG-authorized use only. By using this IS (which includes any
  device attached to this IS), you consent to the following conditions:
  -The USG routinely intercepts and monitors communications on this IS.
  -At any time, the USG may inspect and seize data stored on this IS.
  -Communications using, or data stored on, this IS are not private.
  -This IS includes security measures to protect USG interests.
  -Notwithstanding the above, using this IS does not constitute consent to PM,
  LE or CI investigative searching or monitoring of the content of privileged
  communications. See User Agreement for details.

# RHEL-08-040xxx - prohibited packages
rhel8_packages_absent:
  - telnet-server     # RHEL-08-040000
  - rsh-server        # RHEL-08-040180
  - tftp-server       # RHEL-08-040190
  - gssproxy          # RHEL-08-040370
# RHEL-08-0103xx / 030180 / 010360 - required packages
rhel8_packages_present:
  - aide              # RHEL-08-010359
  - audit             # RHEL-08-030180
  - chrony            # RHEL-08-030740
  - firewalld         # RHEL-08-040100
  - openssl-pkcs11    # RHEL-08-010130

# RHEL-08-010020 - FIPS / system-wide crypto policy
rhel8_crypto_policy: "FIPS"

# RHEL-08-020xxx - PAM pwquality / faillock
rhel8_pwquality:
  difok: 8            # RHEL-08-020170
  minlen: 15          # RHEL-08-020230
  ucredit: -1         # RHEL-08-020110
  lcredit: -1         # RHEL-08-020120
  dcredit: -1         # RHEL-08-020130
  ocredit: -1         # RHEL-08-020140
  maxrepeat: 3        # RHEL-08-020150
  maxclassrepeat: 4   # RHEL-08-020160
  dictcheck: 1        # RHEL-08-020300
rhel8_pwhistory_remember: 5   # RHEL-08-020220
rhel8_faillock:
  deny: 3             # RHEL-08-020011
  fail_interval: 900  # RHEL-08-020012
  unlock_time: 0      # RHEL-08-020013

# RHEL-08-020xxx - login.defs / account policy
rhel8_pass_max_days: 60       # RHEL-08-020200
rhel8_pass_min_days: 1        # RHEL-08-020180
rhel8_pass_warn_age: 7
rhel8_account_inactive_days: 35   # RHEL-08-020330
rhel8_session_tmout: 600      # RHEL-08-020320
rhel8_umask: "077"            # RHEL-08-020351

# RHEL-08-030xxx - auditd
rhel8_auditd_space_left_action: email     # RHEL-08-030731
rhel8_auditd_disk_full_action: halt       # RHEL-08-030700
rhel8_auditd_max_log_file_action: syslog  # RHEL-08-030710

# RHEL-08-0xxxxx - kernel sysctl
rhel8_sysctl:
  net.ipv4.conf.all.accept_redirects: 0      # RHEL-08-040209
  net.ipv4.conf.all.accept_source_route: 0   # RHEL-08-040239
  net.ipv4.conf.all.send_redirects: 0        # RHEL-08-040220
  net.ipv4.conf.all.rp_filter: 1             # RHEL-08-040285
  net.ipv4.icmp_echo_ignore_broadcasts: 1    # RHEL-08-040000
  net.ipv6.conf.all.accept_source_route: 0   # RHEL-08-040240
  net.ipv6.conf.all.accept_redirects: 0      # RHEL-08-040210
  kernel.randomize_va_space: 2               # RHEL-08-010430
  kernel.dmesg_restrict: 1                   # RHEL-08-010375
  kernel.kptr_restrict: 1                    # RHEL-08-010376
  fs.protected_symlinks: 1                   # RHEL-08-010373
  fs.protected_hardlinks: 1                  # RHEL-08-010374

compliance_frameworks:
  - dod_stig
  - nist_800_53
  - nist_800_171
stig_benchmark: "Red Hat Enterprise Linux 8 STIG"
stig_version: "V1R15"
