---
# Grab-and-go entry point for the RHEL 8 STIG role.
# Dry-run: ansible-playbook -i inventory.example run.yml
# Enforce: ansible-playbook -i inventory.example run.yml -e apply_changes=true
- name: Apply Red Hat Enterprise Linux 8 STIG hardening
  hosts: rhel8
  become: true
  gather_facts: true
  any_errors_fatal: false
  roles:
    - role: rhel8_stig
