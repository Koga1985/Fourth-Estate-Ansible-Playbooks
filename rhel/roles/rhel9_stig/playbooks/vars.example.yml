---
# Example overrides for rhel9_stig (-e @vars.example.yml).
apply_changes: false

# FIPS is the STIG default; use DEFAULT:NO-SHA1 in labs that can't enable FIPS.
rhel9_crypto_policy: "FIPS"

# Loosen the parking list if a package is genuinely required (document the POA&M).
rhel9_packages_absent:
  - telnet-server
  - tftp-server
  - rsh-server
  - sendmail

rhel9_faillock:
  deny: 3
  fail_interval: 900
  unlock_time: 0

rhel9_session_tmout: 900
