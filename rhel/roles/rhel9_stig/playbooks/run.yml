---
# Grab-and-go entry point for the RHEL 9 STIG role.
#
# Dry-run (default - reports findings, changes nothing):
#   ansible-playbook -i inventory.example run.yml
# Enforce:
#   ansible-playbook -i inventory.example run.yml -e apply_changes=true
# Single host / single area:
#   ansible-playbook -i inventory.example run.yml --limit web01 --tags ssh,audit
- name: Apply Red Hat Enterprise Linux 9 STIG hardening
  hosts: rhel9
  become: true
  gather_facts: true
  any_errors_fatal: false
  roles:
    - role: rhel9_stig
