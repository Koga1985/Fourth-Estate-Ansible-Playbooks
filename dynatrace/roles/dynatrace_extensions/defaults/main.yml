---
# defaults file for dynatrace_extensions
# Dynatrace Extensions (Framework 2.0) - manage Extension Framework 2.0 install/activate via the Dynatrace REST APIs (ansible.builtin.uri).
#
# Safe by default: apply_changes=false performs read-only assessment. With
# apply_changes=true the data-driven dt_extension_operations are applied.

ansible_connection: local

dt_environment_url: "{{ vault_dt_environment_url | default('https://ENVID.live.dynatrace.com') }}"
dt_api_token: "{{ vault_dt_api_token | default('') }}"   # scopes: extensions.read extensions.write
dt_validate_certs: true

apply_changes: false
artifacts_dir: "/tmp/dynatrace-artifacts"

# Read-only assessment endpoint
dt_assess_path: "v2/extensions"
dt_assess_count_key: "extensions"

# Data-driven operations (apply_changes=true only)
# Each item: { id, title, method, path, body, status_code }
dt_extension_operations: []

compliance_frameworks:
  - nist_800_53
