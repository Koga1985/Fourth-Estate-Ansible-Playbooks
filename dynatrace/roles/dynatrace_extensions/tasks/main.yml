---
# tasks file for dynatrace_extensions

- name: Ensure artifacts directory exists
  ansible.builtin.file:
    path: "{{ artifacts_dir }}"
    state: directory
    mode: "0750"
  run_once: true
  changed_when: false
  tags: [always]

- name: Show run mode
  ansible.builtin.debug:
    msg: "dynatrace_extensions against {{ dt_environment_url }} - {{ 'ENFORCING' if apply_changes | bool else 'DRY-RUN / assessment only' }}"
  tags: [always]

- name: Assess existing objects ({{ dt_assess_path }})
  ansible.builtin.uri:
    url: "{{ dt_environment_url }}/api/{{ dt_assess_path }}"
    method: GET
    headers: { Authorization: "Api-Token {{ dt_api_token }}", Accept: application/json }
    validate_certs: "{{ dt_validate_certs }}"
    status_code: [200, 400, 403, 404]
    timeout: 30
  no_log: true
  register: dt_assess
  failed_when: false
  tags: [assess]

- name: Display assessment
  ansible.builtin.debug:
    msg: "Existing {{ dt_assess_count_key }}: {{ (dt_assess.json[dt_assess_count_key] | default([]) | length) if dt_assess.status == 200 else 'n/a (status ' + (dt_assess.status | string) + ')' }}"
  tags: [assess]

- name: Apply Dynatrace Extensions (Framework 2.0) operations
  ansible.builtin.uri:
    url: "{{ dt_environment_url }}/api/{{ item.path }}"
    method: "{{ item.method | default('POST') }}"
    headers:
      Authorization: "Api-Token {{ dt_api_token }}"
      Accept: application/json
      Content-Type: application/json
    body_format: json
    body: "{{ item.body | default(omit) }}"
    validate_certs: "{{ dt_validate_certs }}"
    status_code: "{{ item.status_code | default([200, 201]) }}"
    timeout: 60
  no_log: true
  loop: "{{ dt_extension_operations }}"
  loop_control:
    label: "{{ item.id }} - {{ item.title }}"
  when:
    - apply_changes | bool
    - dt_extension_operations | length > 0
  register: dt_ops_apply
  tags: [apply]

- name: Write artifact
  ansible.builtin.copy:
    dest: "{{ artifacts_dir }}/dynatrace_extensions.json"
    mode: "0640"
    content: "{{ {'environment': dt_environment_url, 'mode': 'enforce' if apply_changes | bool else 'assessment', 'existing': (dt_assess.json[dt_assess_count_key] | default([]) | length) if dt_assess.status == 200 else 'n/a', 'operations_applied': (dt_ops_apply.results | default([]) | map(attribute='item') | map(attribute='id') | list) if apply_changes | bool else []} | to_nice_json }}"
  tags: [report]

- name: Summarize
  ansible.builtin.debug:
    msg: "Dynatrace Extensions (Framework 2.0) {{ 'enforced' if apply_changes | bool else 'assessed' }}. Artifact: {{ artifacts_dir }}/dynatrace_extensions.json"
  tags: [report]
