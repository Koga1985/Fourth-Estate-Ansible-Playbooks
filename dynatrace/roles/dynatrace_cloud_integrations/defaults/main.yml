---
# defaults file for dynatrace_cloud_integrations
# Dynatrace cloud integrations - manage AWS/Azure/GCP monitoring connectors via the Dynatrace REST APIs (ansible.builtin.uri).
#
# Safe by default: apply_changes=false performs read-only assessment. With
# apply_changes=true the data-driven dt_cloud_operations are applied.

ansible_connection: local

dt_environment_url: "{{ vault_dt_environment_url | default('https://ENVID.live.dynatrace.com') }}"
dt_api_token: "{{ vault_dt_api_token | default('') }}"   # scopes: ReadConfig WriteConfig
dt_validate_certs: true

apply_changes: false
artifacts_dir: "/tmp/dynatrace-artifacts"

# Read-only assessment endpoint
dt_assess_path: "config/v1/aws/credentials"
dt_assess_count_key: "values"

# Data-driven operations (apply_changes=true only)
# Each item: { id, title, method, path, body, status_code }
dt_cloud_operations: []

compliance_frameworks:
  - nist_800_53
