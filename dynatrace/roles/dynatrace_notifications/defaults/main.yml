---
# defaults file for dynatrace_notifications
# Manage Dynatrace problem-notification integrations (ServiceNow, Slack, email,
# PagerDuty, Jira, webhooks) via the Configuration API (ansible.builtin.uri).
#
# Safe by default: apply_changes=false performs read-only assessment of existing
# notifications. With apply_changes=true the data-driven dt_notifications are
# applied.

ansible_connection: local

dt_environment_url: "{{ vault_dt_environment_url | default('https://ENVID.live.dynatrace.com') }}"
dt_api_token: "{{ vault_dt_api_token | default('') }}"   # scope: WriteConfig
dt_validate_certs: true

apply_changes: false
artifacts_dir: "/tmp/dynatrace-artifacts"

# Data-driven notification operations (apply_changes=true only)
# Each item: { id, title, method, path, body, status_code }
# path is appended to {{ dt_environment_url }}/api/  (e.g. config/v1/notifications)
dt_notifications: []

compliance_frameworks:
  - nist_800_53
