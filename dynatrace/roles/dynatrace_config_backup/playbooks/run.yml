---
# Grab-and-go entry point for the Dynatrace config backup role.
#   ansible-playbook -i inventory.example run.yml -e @vars.example.yml
# Run on a schedule (cron/AWX) to retain configuration backups.
- name: Back up Dynatrace tenant configuration
  hosts: dynatrace_tenant
  gather_facts: true
  any_errors_fatal: true
  roles:
    - role: dynatrace_config_backup
