---
# tasks file for dynatrace_config_backup

- name: Ensure artifacts directory exists
  ansible.builtin.file:
    path: "{{ artifacts_dir }}"
    state: directory
    mode: "0750"
  run_once: true
  changed_when: false
  tags: [always]

- name: Compute timestamped backup directory
  ansible.builtin.set_fact:
    backup_dir: "{{ backup_base_dir }}/{{ ansible_date_time.iso8601_basic_short | default(lookup('pipe', 'date -u +%Y%m%dT%H%M%S')) }}"
  tags: [always]

- name: Create backup directory
  ansible.builtin.file:
    path: "{{ backup_dir }}"
    state: directory
    mode: "0750"
  tags: [always]

- name: Show run mode
  ansible.builtin.debug:
    msg: "dynatrace_config_backup -> {{ backup_dir }} ({{ dt_backup_endpoints | length }} config endpoints + {{ dt_backup_settings_schemas | length }} settings schemas)"
  tags: [always]

- name: Export Config API objects
  ansible.builtin.uri:
    url: "{{ dt_environment_url }}/api/{{ item.path }}"
    method: GET
    headers: { Authorization: "Api-Token {{ dt_api_token }}", Accept: application/json }
    validate_certs: "{{ dt_validate_certs }}"
    status_code: [200, 403, 404]
    timeout: 60
    return_content: true
  no_log: true
  loop: "{{ dt_backup_endpoints }}"
  loop_control:
    label: "{{ item.name }}"
  register: dt_backup
  tags: [backup]

- name: Write Config API backups to files
  ansible.builtin.copy:
    dest: "{{ backup_dir }}/{{ item.item.name }}.json"
    mode: "0640"
    content: "{{ item.json | default({}) | to_nice_json }}"
  loop: "{{ dt_backup.results }}"
  loop_control:
    label: "{{ item.item.name }} ({{ item.status }})"
  when: item.status == 200
  tags: [backup]

- name: Export Settings 2.0 objects
  ansible.builtin.uri:
    url: "{{ dt_environment_url }}/api/v2/settings/objects?schemaIds={{ item }}&fields=value,schemaId,scope&pageSize=500"
    method: GET
    headers: { Authorization: "Api-Token {{ dt_api_token }}", Accept: application/json }
    validate_certs: "{{ dt_validate_certs }}"
    status_code: [200, 400, 403, 404]
    timeout: 60
  no_log: true
  loop: "{{ dt_backup_settings_schemas }}"
  loop_control:
    label: "{{ item }}"
  register: dt_settings_backup
  tags: [backup]

- name: Write Settings 2.0 backups to files
  ansible.builtin.copy:
    dest: "{{ backup_dir }}/settings_{{ item.item | regex_replace('[^A-Za-z0-9._-]', '_') }}.json"
    mode: "0640"
    content: "{{ item.json | default({}) | to_nice_json }}"
  loop: "{{ dt_settings_backup.results }}"
  loop_control:
    label: "{{ item.item }} ({{ item.status }})"
  when: item.status == 200
  tags: [backup]

- name: Write backup manifest
  ansible.builtin.copy:
    dest: "{{ artifacts_dir }}/dynatrace_config_backup.json"
    mode: "0640"
    content: "{{ {'environment': dt_environment_url, 'backup_dir': backup_dir, 'config_objects': (dt_backup.results | selectattr('status', 'equalto', 200) | map(attribute='item') | map(attribute='name') | list), 'settings_schemas': (dt_settings_backup.results | selectattr('status', 'equalto', 200) | map(attribute='item') | list), 'skipped': (dt_backup.results | rejectattr('status', 'equalto', 200) | map(attribute='item') | map(attribute='name') | list)} | to_nice_json }}"
  tags: [report]

- name: Summarize
  ansible.builtin.debug:
    msg: >-
      Backed up {{ dt_backup.results | selectattr('status', 'equalto', 200) | list | length }}
      config object(s) + {{ dt_settings_backup.results | selectattr('status', 'equalto', 200) | list | length }}
      settings schema(s) to {{ backup_dir }}.
  tags: [report]
