---
# defaults file for dynatrace_config_backup
# Export Dynatrace tenant configuration to timestamped JSON files for DR and
# change-audit (config-as-code style backup). Read-only against Dynatrace.

ansible_connection: local

dt_environment_url: "{{ vault_dt_environment_url | default('https://ENVID.live.dynatrace.com') }}"
dt_api_token: "{{ vault_dt_api_token | default('') }}"   # scope: ReadConfig, settings.read
dt_validate_certs: true

# Where backups are written (a timestamped subdirectory is created under here)
backup_base_dir: "/var/backups/dynatrace"
artifacts_dir: "/tmp/dynatrace-artifacts"

# Config API endpoints to back up: { name, path }
dt_backup_endpoints:
  - { name: "managementZones", path: "config/v1/managementZones" }
  - { name: "alertingProfiles", path: "config/v1/alertingProfiles" }
  - { name: "autoTags", path: "config/v1/autoTags" }
  - { name: "notifications", path: "config/v1/notifications" }
  - { name: "dashboards", path: "config/v1/dashboards" }
  - { name: "maintenanceWindows", path: "config/v1/maintenanceWindows" }
  - { name: "requestAttributes", path: "config/v1/service/requestAttributes" }
  - { name: "slo", path: "v2/slo?pageSize=1000" }
  - { name: "syntheticMonitors", path: "v1/synthetic/monitors" }
  - { name: "apiTokens", path: "v2/apiTokens?fields=+scopes,+expirationDate" }

# Settings 2.0 schemas to back up (objects exported with their value)
dt_backup_settings_schemas:
  - "builtin:preferences.privacy"
  - "builtin:logmonitoring.sensitive-data-masking-settings"
  - "builtin:alerting.maintenance-window"

compliance_frameworks:
  - nist_800_53
  - nist_800_171
