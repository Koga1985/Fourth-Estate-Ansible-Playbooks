---
# Example overrides for dynatrace_security_hardening (-e @vars.example.yml).
apply_changes: false
dt_environment_url: "https://abc12345.live.dynatrace.com"
dt_api_token: "{{ vault_dt_api_token }}"

dt_require_token_expiration: true
dt_sensitive_token_scopes:
  - "WriteConfig"
  - "settings.write"
  - "DataExport"
  - "apiTokens.write"

# Data-driven hardening operations (apply_changes=true only) - validate first.
dt_security_operations: []
