---
# Grab-and-go entry point for the Dynatrace Kubernetes role.
# Dry-run: KUBECONFIG=~/.kube/config ansible-playbook run.yml -e @vars.example.yml
# Enforce: KUBECONFIG=~/.kube/config ansible-playbook run.yml -e @vars.example.yml -e apply_changes=true
- name: Deploy Dynatrace to Kubernetes (DynaKube)
  hosts: localhost
  connection: local
  gather_facts: false
  any_errors_fatal: true
  collections:
    - kubernetes.core
  roles:
    - role: dynatrace_kubernetes
