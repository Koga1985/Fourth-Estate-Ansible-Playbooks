---
# Example overrides for dynatrace_kubernetes (-e @vars.example.yml).
apply_changes: false
kubeconfig: "~/.kube/config"
dt_api_url: "https://abc12345.live.dynatrace.com/api"
dt_api_token: "{{ vault_dt_api_token }}"
dt_data_ingest_token: "{{ vault_dt_data_ingest_token }}"
dynakube_oneagent_mode: "cloudNativeFullStack"
dynakube_activegate_capabilities:
  - kubernetes-monitoring
  - routing
  - dynatrace-api
# Optionally apply the operator manifest (else install via Helm first):
# dynatrace_operator_manifest_url: "https://github.com/Dynatrace/dynatrace-operator/releases/latest/download/kubernetes.yaml"
