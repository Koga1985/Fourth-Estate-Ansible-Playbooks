---
# Grab-and-go entry point for the Dynatrace audit export role.
#   ansible-playbook -i inventory.example run.yml -e @vars.example.yml
# Run on a schedule (cron/AWX) to retain audit evidence.
- name: Export Dynatrace audit log
  hosts: dynatrace_tenant
  gather_facts: false
  any_errors_fatal: true
  roles:
    - role: dynatrace_audit_export
