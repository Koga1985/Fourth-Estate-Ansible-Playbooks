---
# Example overrides for dynatrace_audit_export (-e @vars.example.yml).
dt_environment_url: "https://abc12345.live.dynatrace.com"
dt_api_token: "{{ vault_dt_api_token }}"
audit_lookback: "now-24h"
audit_filter: ""   # e.g. "eventType(CREATE,UPDATE,DELETE)"
audit_output_file: "/var/log/dynatrace/auditlog.ndjson"

# Optional: forward to Splunk HEC
# audit_forward_url: "https://splunk.example.mil:8088/services/collector/event"
# audit_forward_headers:
#   Authorization: "Splunk {{ vault_splunk_hec_token }}"
