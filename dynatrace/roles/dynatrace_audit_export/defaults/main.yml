---
# defaults file for dynatrace_audit_export
# Export the Dynatrace audit log to a local NDJSON evidence file and (optionally)
# forward it to a SIEM/HTTP collector. Supports AU-6/AU-9/AU-11 (audit review,
# protection, retention) for the ATO/evidence package.
#
# Read-only against Dynatrace (GET auditlogs). apply_changes is not used; the
# role always writes the evidence file. Run it on a schedule (e.g., daily).

ansible_connection: local

dt_environment_url: "{{ vault_dt_environment_url | default('https://ENVID.live.dynatrace.com') }}"
dt_api_token: "{{ vault_dt_api_token | default('') }}"   # scope: auditLogs.read
dt_validate_certs: true

artifacts_dir: "/tmp/dynatrace-artifacts"

# Time window (Dynatrace relative time) and page size
audit_lookback: "now-24h"
audit_page_size: 5000
# Optional filter, e.g. "eventType(CREATE,UPDATE,DELETE)" or "category(CONFIG)"
audit_filter: ""

# Output
audit_output_file: "{{ artifacts_dir }}/dynatrace_auditlog.ndjson"

# Optional SIEM forward (e.g., Splunk HEC). Leave url empty to skip.
audit_forward_url: ""
audit_forward_headers: {}     # e.g. { Authorization: "Splunk <HEC-token>" }

compliance_frameworks:
  - nist_800_53
  - nist_800_171
benchmark: "Dynatrace audit log export (NIST AU-6 / AU-9 / AU-11)"
