---
# Grab-and-go entry point for the Dynatrace OneAgent role.
# Dry-run (assessment): ansible-playbook -i inventory.example run.yml
# Enforce (install):    ansible-playbook -i inventory.example run.yml -e apply_changes=true
- name: Deploy Dynatrace OneAgent
  hosts: dynatrace_hosts
  gather_facts: true
  any_errors_fatal: false
  collections:
    - ansible.windows
  roles:
    - role: dynatrace_oneagent
