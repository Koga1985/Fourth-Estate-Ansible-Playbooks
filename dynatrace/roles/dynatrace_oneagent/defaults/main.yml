---
# defaults file for dynatrace_oneagent
# Deploy and configure the Dynatrace OneAgent on Linux/Windows hosts.
#
# Safe by default: apply_changes=false performs a no-op assessment (reports
# whether OneAgent is installed and what would change) and does NOT install,
# reconfigure, or restart. Pass -e apply_changes=true to install/configure.

# ============================================================
# Tenant / download (set in inventory; vault the tokens)
# ============================================================
# SaaS:    https://<env-id>.live.dynatrace.com
# Managed: https://<activegate-or-server>/e/<env-id>
dt_environment_url: "{{ vault_dt_environment_url | default('https://ENVID.live.dynatrace.com') }}"
# PaaS token (scope: InstallerDownload) - used to pull the installer
dt_paas_token: "{{ vault_dt_paas_token | default('') }}"
dt_validate_certs: true

# ============================================================
# Deployment control
# ============================================================
apply_changes: false
artifacts_dir: "/tmp/dynatrace-artifacts"
oneagent_installer_dir: "/tmp"

# ============================================================
# OneAgent configuration
# ============================================================
oneagent_host_group: ""                  # logical host group (optional)
oneagent_network_zone: ""                # network zone for ActiveGate affinity (optional)
oneagent_monitoring_mode: "fullstack"    # fullstack | infra-only | discovery
oneagent_log_monitoring: true            # enable log monitoring
oneagent_app_log_content_access: false   # SECURITY: keep false unless required
oneagent_restart_service: true           # restart after a config change

# Installer arch/flavor (Linux)
oneagent_arch: "x86"
oneagent_flavor: "default"

# Path to oneagentctl (used for idempotent reconfig of an existing agent)
oneagent_ctl_linux: "/opt/dynatrace/oneagent/agent/tools/oneagentctl"
oneagent_ctl_windows: 'C:\Program Files\dynatrace\oneagent\agent\tools\oneagentctl.exe'

compliance_frameworks:
  - nist_800_53
  - nist_800_171
