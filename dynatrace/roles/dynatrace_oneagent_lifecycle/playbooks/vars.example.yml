---
# Example overrides for dynatrace_oneagent_lifecycle (-e @vars.example.yml).
apply_changes: false
oneagent_set_host_group: "FOURTH-ESTATE-PROD"
oneagent_set_network_zone: "datacenter-east"
oneagent_set_monitoring_mode: "fullstack"   # or infra-only
oneagent_restart_after_change: true
# Decommission is double-gated (also needs apply_changes=true):
oneagent_decommission: false
