---
# Grab-and-go entry point for the Dynatrace OneAgent lifecycle role.
# Assess (default):      ansible-playbook -i inventory.example run.yml
# Reconfigure:           ansible-playbook -i inventory.example run.yml -e apply_changes=true -e oneagent_set_host_group=PROD
# Decommission (gated):  ansible-playbook -i inventory.example run.yml -e apply_changes=true -e oneagent_decommission=true
- name: Dynatrace OneAgent lifecycle
  hosts: dynatrace_hosts
  become: true
  gather_facts: true
  any_errors_fatal: false
  roles:
    - role: dynatrace_oneagent_lifecycle
