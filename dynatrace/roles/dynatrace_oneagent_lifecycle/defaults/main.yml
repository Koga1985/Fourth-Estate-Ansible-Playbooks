---
# defaults file for dynatrace_oneagent_lifecycle
# Fleet lifecycle for an already-installed Dynatrace OneAgent (Linux): version
# assessment, monitoring-mode / host-group / network-zone changes, service
# restart, and (guarded) decommission/uninstall.
#
# Safe by default: apply_changes=false only reports the current version and what
# would change. Decommission additionally requires oneagent_decommission=true.

# ============================================================
# Deployment control
# ============================================================
apply_changes: false
artifacts_dir: "/tmp/dynatrace-artifacts"

# Paths
oneagent_ctl_linux: "/opt/dynatrace/oneagent/agent/tools/oneagentctl"
oneagent_uninstall_linux: "/opt/dynatrace/oneagent/agent/uninstall.sh"

# ============================================================
# Reconfiguration (applied when apply_changes=true)
# ============================================================
oneagent_set_host_group: ""          # "" = leave unchanged
oneagent_set_network_zone: ""        # "" = leave unchanged
oneagent_set_monitoring_mode: ""     # "" = leave unchanged; or infra-only|fullstack
oneagent_restart_after_change: true

# ============================================================
# Decommission (DANGEROUS - double-gated)
# ============================================================
oneagent_decommission: false         # set true AND apply_changes=true to uninstall

compliance_frameworks:
  - nist_800_53
