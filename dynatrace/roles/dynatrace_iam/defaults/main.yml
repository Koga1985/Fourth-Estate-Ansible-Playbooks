---
# defaults file for dynatrace_iam
# Manage Dynatrace Account Management (IAM): groups, users, policies and
# group->policy bindings via the Account Management API (OAuth2 bearer).
# NIST 800-53 AC-2 / AC-6 (least privilege, account management).
#
# Safe by default: apply_changes=false retrieves an OAuth token and performs
# read-only assessment (group/user counts) - no create/modify. With
# apply_changes=true the data-driven dt_iam_operations are applied.

# Runs on the control node
ansible_connection: local

# ============================================================
# OAuth2 client (vault the secret) - create under Account Management > OAuth clients
# ============================================================
dt_account_uuid: "{{ vault_dt_account_uuid | default('ACCOUNT-UUID') }}"
dt_oauth_client_id: "{{ vault_dt_oauth_client_id | default('') }}"
dt_oauth_client_secret: "{{ vault_dt_oauth_client_secret | default('') }}"
dt_oauth_token_url: "https://sso.dynatrace.com/sso/oauth2/token"
dt_oauth_scope: "account-idm-read account-idm-write"
dt_iam_api_base: "https://api.dynatrace.com/iam/v1"
dt_validate_certs: true

# ============================================================
# Deployment control
# ============================================================
apply_changes: false
artifacts_dir: "/tmp/dynatrace-artifacts"

# ============================================================
# Data-driven IAM operations (applied only with apply_changes=true)
# Each item: { id, title, method, path, body, status_code }
# `path` is appended to {{ dt_iam_api_base }}/  (use accounts/{{uuid}}/... etc.)
# ============================================================
dt_iam_operations: []

compliance_frameworks:
  - nist_800_53
  - nist_800_171
benchmark: "Dynatrace IAM (NIST AC-2 / AC-6)"
