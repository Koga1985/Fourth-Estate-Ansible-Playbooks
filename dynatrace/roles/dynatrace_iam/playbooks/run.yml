---
# Grab-and-go entry point for the Dynatrace IAM role.
# Assess (default): ansible-playbook -i inventory.example run.yml -e @vars.example.yml
# Enforce:          ansible-playbook -i inventory.example run.yml -e @vars.example.yml -e apply_changes=true
- name: Manage Dynatrace IAM (groups / users / policies)
  hosts: dynatrace_account
  gather_facts: false
  any_errors_fatal: true
  roles:
    - role: dynatrace_iam
