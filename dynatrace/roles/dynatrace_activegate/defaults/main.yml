---
# defaults file for dynatrace_activegate
# Deploy a Dynatrace ActiveGate (Linux) and set its group / network zone.
#
# Safe by default: apply_changes=false reports whether ActiveGate is installed
# and what would change; it does NOT download, install, or restart.

# ============================================================
# Tenant / download (vault the token)
# ============================================================
dt_environment_url: "{{ vault_dt_environment_url | default('https://ENVID.live.dynatrace.com') }}"
dt_paas_token: "{{ vault_dt_paas_token | default('') }}"
dt_validate_certs: true

# ============================================================
# Deployment control
# ============================================================
apply_changes: false
artifacts_dir: "/tmp/dynatrace-artifacts"
activegate_installer_dir: "/tmp"

# ============================================================
# ActiveGate configuration
# ============================================================
activegate_group: ""                     # collector group (optional)
activegate_network_zone: ""              # network zone (optional)
activegate_service_name: "dynatracegateway"
activegate_install_dir: "/opt/dynatrace/gateway"
activegate_custom_properties: "/var/lib/dynatrace/gateway/config/custom.properties"

compliance_frameworks:
  - nist_800_53
  - nist_800_171
