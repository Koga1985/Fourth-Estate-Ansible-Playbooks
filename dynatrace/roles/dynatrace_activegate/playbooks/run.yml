---
# Grab-and-go entry point for the Dynatrace ActiveGate role.
# Dry-run: ansible-playbook -i inventory.example run.yml
# Enforce: ansible-playbook -i inventory.example run.yml -e apply_changes=true
- name: Deploy Dynatrace ActiveGate
  hosts: dynatrace_activegates
  become: true
  gather_facts: true
  any_errors_fatal: false
  collections:
    - community.general
  roles:
    - role: dynatrace_activegate
