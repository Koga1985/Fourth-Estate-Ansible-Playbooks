---
# defaults file for dynatrace_tenant_config
# Configure a Dynatrace tenant via the Configuration / Settings 2.0 REST APIs
# (management zones, alerting profiles, auto-tags, problem notifications,
# maintenance windows). Uses ansible.builtin.uri only.
#
# Safe by default: apply_changes=false performs read-only GET assessment and
# does NOT create/modify anything. With apply_changes=true the data-driven
# operations in dt_config_operations are applied.

# Runs on the control node
ansible_connection: local

# ============================================================
# Tenant API (vault the token)
# ============================================================
dt_environment_url: "{{ vault_dt_environment_url | default('https://ENVID.live.dynatrace.com') }}"
# API token scopes: ReadConfig, WriteConfig, settings.read, settings.write
dt_api_token: "{{ vault_dt_api_token | default('') }}"
dt_validate_certs: true

# ============================================================
# Deployment control
# ============================================================
apply_changes: false
artifacts_dir: "/tmp/dynatrace-artifacts"

stig_assess: true
stig_apply_operations: true
stig_compliance_report: true

# ============================================================
# Data-driven config operations (applied only when apply_changes=true)
# Each item: { id, title, method, path, body, status_code }
# `path` is appended to {{ dt_environment_url }}/api/
# Populate per your tenant (see vars.example.yml). Empty = assessment only.
# ============================================================
dt_config_operations: []

compliance_frameworks:
  - nist_800_53
  - nist_800_171
