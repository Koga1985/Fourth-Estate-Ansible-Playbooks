---
# defaults file for dynatrace_monitoring_as_code
# Provision SLOs, synthetic monitors and dashboards from version-controlled
# definitions via the Dynatrace REST APIs (ansible.builtin.uri).
#
# Safe by default: apply_changes=false performs read-only assessment (counts of
# SLOs / synthetic monitors / dashboards). With apply_changes=true the
# data-driven operations are applied.

ansible_connection: local

dt_environment_url: "{{ vault_dt_environment_url | default('https://ENVID.live.dynatrace.com') }}"
dt_api_token: "{{ vault_dt_api_token | default('') }}"   # scopes: slo.write, ExternalSyntheticIntegration, WriteConfig
dt_validate_certs: true

apply_changes: false
artifacts_dir: "/tmp/dynatrace-artifacts"

# Data-driven monitoring-as-code operations (apply_changes=true only)
# Each item: { id, title, method, path, body, status_code }
dt_mac_operations: []

compliance_frameworks:
  - nist_800_53
