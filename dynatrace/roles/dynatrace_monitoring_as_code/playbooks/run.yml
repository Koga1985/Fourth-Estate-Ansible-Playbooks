---
# Grab-and-go entry point for the Dynatrace monitoring-as-code role.
# Assess (default): ansible-playbook -i inventory.example run.yml -e @vars.example.yml
# Enforce:          ansible-playbook -i inventory.example run.yml -e @vars.example.yml -e apply_changes=true
- name: Provision Dynatrace monitoring-as-code
  hosts: dynatrace_tenant
  gather_facts: false
  any_errors_fatal: true
  roles:
    - role: dynatrace_monitoring_as_code
