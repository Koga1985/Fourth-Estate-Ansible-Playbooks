---
# defaults file for dynatrace_synthetic_locations
# Dynatrace private synthetic locations - manage private synthetic locations (run on ActiveGates with the synthetic capability) via the Dynatrace REST APIs (ansible.builtin.uri).
#
# Safe by default: apply_changes=false performs read-only assessment. With
# apply_changes=true the data-driven dt_synthetic_location_operations are applied.

ansible_connection: local

dt_environment_url: "{{ vault_dt_environment_url | default('https://ENVID.live.dynatrace.com') }}"
dt_api_token: "{{ vault_dt_api_token | default('') }}"   # scopes: ExternalSyntheticIntegration
dt_validate_certs: true

apply_changes: false
artifacts_dir: "/tmp/dynatrace-artifacts"

# Read-only assessment endpoint
dt_assess_path: "v2/synthetic/locations"
dt_assess_count_key: "locations"

# Data-driven operations (apply_changes=true only)
# Each item: { id, title, method, path, body, status_code }
dt_synthetic_location_operations: []

compliance_frameworks:
  - nist_800_53
