---
# defaults file for dynatrace_log_monitoring
# Dynatrace log monitoring - Settings 2.0 assessment + data-driven enforcement via ansible.builtin.uri.
# NIST 800-53: AU-9 / SC-28 (log masking, storage)
#
# Safe by default: apply_changes=false performs read-only assessment of the
# relevant Settings 2.0 objects. With apply_changes=true the data-driven
# dt_log_operations are applied.

ansible_connection: local

dt_environment_url: "{{ vault_dt_environment_url | default('https://ENVID.live.dynatrace.com') }}"
dt_api_token: "{{ vault_dt_api_token | default('') }}"   # scopes: settings.read settings.write
dt_validate_certs: true

apply_changes: false
artifacts_dir: "/tmp/dynatrace-artifacts"

# Settings 2.0 schema(s) inspected during assessment
dt_assess_schema_ids: "builtin:logmonitoring.sensitive-data-masking-settings"

# Data-driven operations (apply_changes=true only)
# Each item: { id, title, method, path, body, status_code }
# Typically POST/PUT to api/v2/settings/objects with a schemaId in the body.
dt_log_operations: []

compliance_frameworks:
  - nist_800_53
  - nist_800_171
benchmark: "Dynatrace log monitoring (NIST AU-9 / SC-28 (log masking, storage))"
