---
# IBM z/OS Ansible collection requirements.
# Install with: ansible-galaxy collection install -r requirements.yml
#
# Live assessment additionally requires, on the z/OS managed node:
#   - IBM Open Enterprise SDK for Python (z/OS Python)
#   - Z Open Automation Utilities (ZOAU)
#   - SSH access to USS for the automation user
# See: https://ibm.github.io/z_ansible_collections_doc/

collections:
  - name: ibm.ibm_zos_core
    version: ">=1.10.0"
  - name: ansible.utils
    version: ">=4.0.0"
