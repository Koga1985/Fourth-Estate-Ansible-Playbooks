---
# Grab-and-go entry point for the z/OS RACF STIG assessment skeleton.
#
# Checklist only (default - no mainframe contacted):
#   ansible-playbook -i inventory.example run.yml
# Live read-only assessment against an LPAR:
#   ansible-playbook -i inventory.example run.yml -e zos_live_assessment=true -e zos_target=zos-lpar-01
- name: IBM z/OS RACF STIG assessment
  hosts: localhost
  connection: local
  gather_facts: true
  roles:
    - role: zos_racf_stig
