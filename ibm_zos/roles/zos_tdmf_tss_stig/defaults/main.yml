---
# defaults file for zos_tdmf_tss_stig
# DISA IBM z/OS TDMF (Transparent Data Migration Facility) for TSS STIG -
# assessment skeleton. Read-only verify references + documented remediation.

ansible_connection: local
artifacts_dir: "/tmp/zos-tdmf-tss-stig-artifacts"
zos_live_assessment: false
zos_target: ""

# Confirm exact V-IDs/rule-IDs against the TDMF (TSS) STIG release at audit.
zos_tdmf_catalog:
  - id: "TDMF-APF"
    title: "TDMF load libraries are APF-authorized and protected"
    severity: CAT I
    command: "D PROG,APF"
    note: "Confirm TDMF load libraries appear in the APF list and are TSS-protected."
    remediation: "Protect TDMF load libs with TSS (owner + least-privilege PERMIT); restrict UPDATE/ALTER."
  - id: "TDMF-STC"
    title: "TDMF started task runs under a dedicated least-privilege ACID"
    severity: CAT II
    command: "TSS LIST(STC)"
    note: "Confirm a unique STC ACID for TDMF with only required access."
    remediation: "Define a TDMF STC ACID via TSS ADDTO(STC); grant only needed datasets/resources."
  - id: "TDMF-CMD"
    title: "TDMF migration command/dataset access limited to authorized storage admins"
    severity: CAT I
    command: "TSS WHOHAS DSNAME(TDMF.**)"
    note: "Only storage administration ACIDs should hold access to TDMF control datasets."
    remediation: "Restrict TDMF control/command datasets via TSS; default deny; PERMIT named admins."
  - id: "TDMF-PARM"
    title: "TDMF control/parmlib datasets protected from unauthorized change"
    severity: CAT II
    command: "TSS WHOHAS DSNAME(TDMF.PARMLIB)"
    remediation: "TSS-protect TDMF parm/control datasets; remove general WRITE/ALTER."
  - id: "TDMF-AUDIT"
    title: "TDMF migration activity is logged/audited (SMF)"
    severity: CAT II
    command: "D SMF,O"
    note: "Confirm SMF is active so TDMF dataset access/migrations are recorded."
    remediation: "Ensure SMF + TSS audit capture TDMF dataset access and migration events."
  - id: "TDMF-MONITOR"
    title: "TDMF monitor/agent interfaces restricted to authorized operators"
    severity: CAT II
    command: "TSS LIST(RDT) RESCLASS(FACILITY)"
    note: "Any FACILITY/OPERCMDS resources used to drive TDMF must be protected."
    remediation: "Define and permit TDMF operator FACILITY/OPERCMDS resources by least privilege."

compliance_frameworks:
  - dod_stig
  - nist_800_53
stig_benchmark: "IBM z/OS TDMF for TSS STIG"
stig_version: "V7R2"
zos_esm: TSS
