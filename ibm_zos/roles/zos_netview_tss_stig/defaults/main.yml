---
# defaults file for zos_netview_tss_stig
# DISA IBM z/OS NetView for TSS STIG - assessment skeleton.
# Read-only verify references + documented remediation. No blind enforcement.

ansible_connection: local
artifacts_dir: "/tmp/zos-netview-tss-stig-artifacts"
zos_live_assessment: false
zos_target: ""

# NetView security is configured in CNMSTYLE/CNMSTGEN and enforced via SAF/TSS.
# Confirm exact V-IDs/rule-IDs against the NetView (TSS) STIG release at audit.
zos_netview_catalog:
  - id: "NV-CMDAUTH"
    title: "NetView command authorization performed by SAF (CMDAUTH=SAF, OPERSEC=SAFDEF)"
    severity: CAT I
    command: "TSS LIST(RDT) RESCLASS(NETCMDS)"
    note: "Confirm CMDAUTH=SAF/SAFCHECK and OPERSEC=SAFDEF in CNMSTYLE; NETCMDS protected."
    remediation: "Set OPERSEC=SAFDEF and CMDAUTH=SAF; define NETCMDS resource profiles in TSS."
  - id: "NV-OPERPW"
    title: "NetView operators authenticated via SAF, not DSIOPF passwords"
    severity: CAT II
    command: "TSS LIST(RDT) RESCLASS(APPL)"
    note: "Operator IDs defined as ACIDs; no clear passwords in DSIOPF; APPL(NetView) protected."
    remediation: "Define operators as TSS ACIDs; remove passwords from DSIOPF; protect the APPL."
  - id: "NV-SPAN"
    title: "Span-of-control / scoping restricts operators to authorized resources"
    severity: CAT II
    command: "TSS LIST(RDT) RESCLASS(NETSPAN)"
    remediation: "Define NETSPAN (span) resources and permit by least privilege."
  - id: "NV-RMTCMD"
    title: "Cross-domain / RMTCMD and remote command execution restricted"
    severity: CAT II
    command: "TSS WHOHAS NETCMDS(RMTCMD)"
    remediation: "Permit RMTCMD/cross-domain commands only to authorized automation ACIDs."
  - id: "NV-AUTOTASK"
    title: "Autotasks/auto-operators run under controlled, least-privilege ACIDs"
    severity: CAT II
    command: "TSS LIST(RDT) RESCLASS(NETCMDS)"
    note: "Review AUTOTASK definitions and their ACIDs."
    remediation: "Assign dedicated least-privilege ACIDs to autotasks."
  - id: "NV-APF"
    title: "NetView load libraries are APF-authorized and protected"
    severity: CAT I
    command: "D PROG,APF"
    note: "Confirm NetView (CNMLINK) libs are APF and TSS-protected (UACC/owner)."
    remediation: "Protect NetView libraries; restrict UPDATE/ALTER to sysprog."
  - id: "NV-AUDIT"
    title: "NetView security events recorded (SAF logging / SMF)"
    severity: CAT II
    command: "D SMF,O"
    remediation: "Ensure SAF audit + SMF recording capture NetView command violations."

compliance_frameworks:
  - dod_stig
  - nist_800_53
stig_benchmark: "IBM z/OS NetView for TSS STIG"
stig_version: "V7R2"
zos_esm: TSS
