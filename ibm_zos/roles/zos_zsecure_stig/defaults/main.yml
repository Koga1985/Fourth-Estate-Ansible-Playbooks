---
# defaults file for zos_zsecure_stig
# DISA IBM zSecure Suite STIG (Ver 1, Rel 3) - assessment skeleton.
# Read-only verify references + documented remediation. No blind enforcement.
# Commands shown for RACF (RLIST/LISTDSD); for a TSS site use the TSS
# equivalents (TSS WHOHAS / TSS LIST(RDT)).

ansible_connection: local
artifacts_dir: "/tmp/zos-zsecure-stig-artifacts"
zos_live_assessment: false
zos_target: ""

zos_zsecure_catalog:
  - id: "ZSEC-APF"
    title: "zSecure load library (SCKRLOAD) is APF-authorized and protected"
    severity: CAT I
    command: "D PROG,APF"
    note: "Confirm SCKRLOAD is APF and dataset-protected (UACC NONE / owner)."
    remediation: "Protect SCKRLOAD with UACC(NONE); restrict UPDATE/ALTER to sysprog."
  - id: "ZSEC-CKGRACF"
    title: "CKGRACF command authority restricted via XFACILIT (CKG.* resources)"
    severity: CAT I
    command: "RLIST XFACILIT CKG.** ALL"
    note: "CKGRACF privileged functions gated by CKG.CMD/CKG.RACF resources."
    remediation: "Define CKG.* profiles UACC(NONE); PERMIT only authorized security admins."
  - id: "ZSEC-CKRCARLA"
    title: "CKRCARLA / live database access authority restricted (CKR.* resources)"
    severity: CAT I
    command: "RLIST XFACILIT CKR.** ALL"
    note: "Access to live RACF/CKFREEZE data via CKR.* gated by least privilege."
    remediation: "Define CKR.* profiles UACC(NONE); PERMIT only auditors/admins as required."
  - id: "ZSEC-ALERT"
    title: "zSecure Alert/Command (CKN.*/C2POLICE) functions authorized via SAF"
    severity: CAT II
    command: "RLIST XFACILIT CKN.** ALL"
    remediation: "Protect CKN.*/alert resources; permit only the alert/automation ACIDs."
  - id: "ZSEC-CKFREEZE"
    title: "CKFREEZE and CKRPARM datasets protected from unauthorized access"
    severity: CAT II
    command: "LISTDSD DATASET('*.CKFREEZE') ALL"
    note: "CKFREEZE snapshots contain sensitive security data; protect read/write."
    remediation: "Protect CKFREEZE/CKRPARM datasets UACC(NONE); restrict to zSecure admins."
  - id: "ZSEC-SETUP"
    title: "zSecure setup/configuration (C2R$PARM) restricted to administrators"
    severity: CAT II
    command: "RLIST XFACILIT C2R.** ALL"
    remediation: "Protect zSecure setup resources; limit to authorized administrators."
  - id: "ZSEC-AUDIT"
    title: "zSecure administrative actions recorded (SMF / RACF audit)"
    severity: CAT II
    command: "D SMF,O"
    remediation: "Ensure SMF + ESM audit capture CKGRACF/zSecure privileged actions."

compliance_frameworks:
  - dod_stig
  - nist_800_53
stig_benchmark: "IBM zSecure Suite STIG"
stig_version: "V1R3"
zos_esm: "RACF/TSS"
