---
# Ansible Collections Requirements for CrowdStrike Falcon Automation
#
# Install with:
#   ansible-galaxy collection install -r requirements.yml
#

collections:
  # CrowdStrike Falcon Ansible collection — sensor install, policy management
  - name: crowdstrike.falcon
    version: ">=4.0.0"

  # Core POSIX/Linux modules (service, package, etc.)
  - name: ansible.posix
    version: ">=1.5.0"

  # Community general modules (rpm_key, etc.)
  - name: community.general
    version: ">=7.0.0"

  # Windows modules (required for Windows sensor deployment)
  - name: ansible.windows
    version: ">=2.0.0"

  # Kubernetes modules (required for container sensor deployment)
  # - name: kubernetes.core
  #   version: ">=3.0.0"
