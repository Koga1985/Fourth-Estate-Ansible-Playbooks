---
# defaults file for tomcat_app_server_srg
# Apache Tomcat hardening to the DISA Application Server SRG
# (SRG-APP-XXXXXX-AS-XXXXXX, Ver 4 Rel 4). NIST SP 800-53 Rev 5 aligned.
#
# Safe by default: apply_changes=false runs in check mode (reports, no changes).
# XML edits use community.general.xml and are idempotent (attribute/text sets).

# ============================================================
# Deployment control
# ============================================================
apply_changes: false
artifacts_dir: "/tmp/tomcat-srg-artifacts"

# ============================================================
# Tomcat paths (override per install)
# ============================================================
tomcat_home: /opt/tomcat
tomcat_conf_dir: "{{ tomcat_home }}/conf"
tomcat_server_xml: "{{ tomcat_conf_dir }}/server.xml"
tomcat_web_xml: "{{ tomcat_conf_dir }}/web.xml"
tomcat_webapps_dir: "{{ tomcat_home }}/webapps"
tomcat_service_name: tomcat
tomcat_run_user: tomcat

# ============================================================
# Control toggles
# ============================================================
stig_tomcat_hardening: true
stig_compliance_report: true

# ============================================================
# Application Server SRG settings
# ============================================================
# SRG-APP-000142-AS-000014 - disable the shutdown port (-1)
tomcat_disable_shutdown_port: true
# SRG-APP-000211-AS-000146 - remove default/example web applications
tomcat_remove_default_webapps:
  - docs
  - examples
  - ROOT
  - host-manager
  # 'manager' intentionally NOT removed by default - remove if unused:
  # - manager
# SRG-APP-000295-AS-000263 - session timeout (minutes)
tomcat_session_timeout: 15
# SRG-APP-000439-AS-000155 - TLS protocols on SSL connectors
tomcat_ssl_enabled_protocols: "TLSv1.2+TLSv1.3"
# SRG-APP-000266-AS-000168 - suppress error detail / version (ErrorReportValve)
tomcat_error_report_show_report: "false"
tomcat_error_report_show_server_info: "false"

# ============================================================
# Reporting metadata
# ============================================================
compliance_frameworks:
  - dod_stig
  - nist_800_53
  - nist_800_171
stig_benchmark: "Application Server SRG (Apache Tomcat)"
stig_version: "V4R4"
