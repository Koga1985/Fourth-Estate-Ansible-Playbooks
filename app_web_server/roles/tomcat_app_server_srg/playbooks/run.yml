---
# Grab-and-go entry point for the Tomcat Application Server SRG role.
# Dry-run: ansible-playbook -i inventory.example run.yml
# Enforce: ansible-playbook -i inventory.example run.yml -e apply_changes=true
- name: Apply Application Server SRG hardening (Apache Tomcat)
  hosts: app_servers
  become: true
  gather_facts: true
  any_errors_fatal: false
  collections:
    - community.general
  roles:
    - role: tomcat_app_server_srg
