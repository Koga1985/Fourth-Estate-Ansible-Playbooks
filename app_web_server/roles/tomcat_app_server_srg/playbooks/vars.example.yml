---
# Example overrides for tomcat_app_server_srg (-e @vars.example.yml).
apply_changes: false

tomcat_home: /opt/tomcat
tomcat_run_user: tomcat
tomcat_session_timeout: 15
tomcat_ssl_enabled_protocols: "TLSv1.2+TLSv1.3"

# Remove 'manager'/'host-manager' too if not used:
tomcat_remove_default_webapps:
  - docs
  - examples
  - ROOT
  - host-manager
