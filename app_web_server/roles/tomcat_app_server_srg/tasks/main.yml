---
# tasks file for tomcat_app_server_srg

- name: Ensure artifacts directory exists on control node
  ansible.builtin.file:
    path: "{{ artifacts_dir }}"
    state: directory
    mode: "0750"
  delegate_to: localhost
  run_once: true
  changed_when: false
  tags: [always]

- name: Show run mode
  ansible.builtin.debug:
    msg: >-
      tomcat_app_server_srg on {{ inventory_hostname }} -
      {{ 'ENFORCING' if apply_changes | bool else 'DRY-RUN / check mode only' }}
  tags: [always]

- name: Apply Application Server SRG hardening
  ansible.builtin.import_tasks: hardening.yml
  when: stig_tomcat_hardening | bool
  tags: [stig, tomcat]

- name: Compliance report
  ansible.builtin.import_tasks: compliance_report.yml
  when: stig_compliance_report | bool
  tags: [stig, report]
