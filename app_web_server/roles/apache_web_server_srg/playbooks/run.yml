---
# Grab-and-go entry point for the Apache Web Server SRG role.
# Dry-run: ansible-playbook -i inventory.example run.yml
# Enforce: ansible-playbook -i inventory.example run.yml -e apply_changes=true
- name: Apply Web Server SRG hardening (Apache HTTP Server)
  hosts: web_servers
  become: true
  gather_facts: true
  any_errors_fatal: false
  roles:
    - role: apache_web_server_srg
