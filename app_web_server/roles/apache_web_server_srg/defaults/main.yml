---
# defaults file for apache_web_server_srg
# Apache HTTP Server hardening to the DISA Web Server SRG
# (SRG-APP-XXXXXX-WSR-XXXXXX). NIST SP 800-53 Rev 5 aligned.
#
# Applies a single managed hardening drop-in plus global directives. Safe by
# default: apply_changes=false runs in check mode (reports, no changes) and the
# config is validated with `apachectl configtest` before any reload.

# ============================================================
# Deployment control
# ============================================================
apply_changes: false
artifacts_dir: "/tmp/apache-srg-artifacts"

# ============================================================
# Apache paths (RHEL/EL defaults; override for Debian/SUSE)
# ============================================================
apache_service_name: httpd
apache_conf_dir: /etc/httpd/conf.d
apache_main_conf: /etc/httpd/conf/httpd.conf
apache_hardening_conf: /etc/httpd/conf.d/00-srg-hardening.conf
apache_run_user: apache
apache_run_group: apache

# ============================================================
# Control toggles
# ============================================================
stig_apache_hardening: true
stig_compliance_report: true

# ============================================================
# Web Server SRG settings
# ============================================================
# SRG-APP-000516-WSR-000174 - hide product/version info
apache_server_tokens: "Prod"
apache_server_signature: "Off"
# SRG-APP-000141-WSR-000081 - disable HTTP TRACE
apache_trace_enable: "Off"
# SRG-APP-000001-WSR-000001 - session/connection limits
apache_timeout: 10
apache_keepalive: "On"
apache_keepalive_timeout: 5
apache_max_keepalive_requests: 100
# SRG-APP-000439-WSR-000156 - TLS only, strong protocols/ciphers
apache_ssl_protocol: "all -SSLv3 -TLSv1 -TLSv1.1"
apache_ssl_cipher_suite: "HIGH:!aNULL:!MD5:!3DES:!RC4"
apache_ssl_honor_cipher_order: "On"
# SRG-APP-000266-WSR-000159 - custom error pages (suppress detailed errors)
apache_error_log: "logs/error_log"
apache_log_level: "warn"
apache_custom_log_format: 'combined'
# SRG-APP-000211-WSR-000031 - directory browsing disabled
apache_disable_indexes: true
# Modules that must NOT be loaded (information disclosure / unused)
apache_disable_modules:
  - autoindex_module
  - status_module
  - info_module

# ============================================================
# Reporting metadata
# ============================================================
compliance_frameworks:
  - dod_stig
  - nist_800_53
  - nist_800_171
stig_benchmark: "Web Server SRG (Apache HTTP Server)"
stig_version: "V3R1"
