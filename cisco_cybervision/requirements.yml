---
# Cisco Cyber Vision Ansible Collections Requirements
# Install with: ansible-galaxy collection install -r requirements.yml
#
# Cyber Vision is automated via its REST API using the ansible.builtin.uri module.
# No dedicated cisco.cybervision collection is required.

collections:
  - name: community.general
    version: ">=8.0.0"

  - name: ansible.posix
    version: ">=1.5.0"

  - name: ansible.utils
    version: ">=2.10.0"

# Python dependencies (install separately):
# pip install requests urllib3
