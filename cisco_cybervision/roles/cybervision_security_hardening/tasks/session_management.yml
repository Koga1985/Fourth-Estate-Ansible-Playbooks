---
# tasks file for cybervision_security_hardening - Session management
# NIST AC-11, AC-12 | STIG CISC-ND-000390

- name: PHASE 4 - CISC-ND-000390 - Verify idle timeout compliance
  ansible.builtin.assert:
    that:
      - cv_idle_timeout | int <= 600
    fail_msg: "STIG CISC-ND-000390 violation: idle timeout must be <= 600s (currently {{ cv_idle_timeout }}s)"
    success_msg: "STIG CISC-ND-000390 compliant: idle timeout = {{ cv_idle_timeout }}s"

- name: PHASE 4 - CISC-ND-000390 - Configure session and idle timeouts
  ansible.builtin.uri:
    url: "{{ cv_api_url }}/system/security/session-policy"
    method: PUT
    headers:
      Authorization: "Bearer {{ cv_api_token }}"
      Content-Type: "application/json"
      Accept: "application/json"
    body_format: json
    body:
      session_timeout_seconds: "{{ cv_session_timeout }}"
      idle_timeout_seconds: "{{ cv_idle_timeout }}"
    validate_certs: "{{ cv_validate_certs }}"
    timeout: "{{ cv_timeout }}"
    status_code: [200, 204]
  register: cv_session_policy_result
  when: apply_changes | bool

- name: PHASE 4 - Display session management plan (dry-run)
  ansible.builtin.debug:
    msg:
      - "DRY RUN — would configure session policy:"
      - "  Session timeout: {{ cv_session_timeout }}s ({{ cv_session_timeout | int // 60 }} min)"
      - "  Idle timeout:    {{ cv_idle_timeout }}s ({{ cv_idle_timeout | int // 60 }} min)"
      - "  STIG compliant:  {{ cv_idle_timeout | int <= 600 }}"
  when: not apply_changes | bool

- name: Save session management artifact
  ansible.builtin.copy:
    content: "{{ session_artifact | to_nice_json }}"
    dest: "{{ artifacts_dir }}/cv_session_management.json"
    mode: '0640'
  vars:
    session_artifact:
      timestamp: "{{ ansible_date_time.iso8601 }}"
      center_host: "{{ cv_center_host }}"
      mode: "{{ 'applied' if apply_changes | bool else 'dry_run' }}"
      stig_control: "CISC-ND-000390"
      session_timeout_seconds: "{{ cv_session_timeout }}"
      idle_timeout_seconds: "{{ cv_idle_timeout }}"
      compliant: "{{ cv_idle_timeout | int <= 600 }}"
