---
# tasks file for cybervision_security_hardening - Access control and RBAC
# NIST AC-2, AC-3, AC-6 | STIG CISC-ND-000360

- name: PHASE 4 - CISC-ND-000360 - Query existing RBAC roles
  ansible.builtin.uri:
    url: "{{ cv_api_url }}/roles"
    method: GET
    headers:
      Authorization: "Bearer {{ cv_api_token }}"
      Accept: "application/json"
    validate_certs: "{{ cv_validate_certs }}"
    timeout: "{{ cv_timeout }}"
    status_code: 200
  register: cv_existing_roles
  failed_when: false

- name: PHASE 4 - CISC-ND-000360 - Configure concurrent session limits
  ansible.builtin.uri:
    url: "{{ cv_api_url }}/system/security/session-limits"
    method: PUT
    headers:
      Authorization: "Bearer {{ cv_api_token }}"
      Content-Type: "application/json"
      Accept: "application/json"
    body_format: json
    body:
      max_concurrent_sessions: "{{ cv_max_concurrent_sessions }}"
    validate_certs: "{{ cv_validate_certs }}"
    timeout: "{{ cv_timeout }}"
    status_code: [200, 204]
  register: cv_session_limits_result
  when: apply_changes | bool

- name: PHASE 4 - Display access control plan (dry-run)
  ansible.builtin.debug:
    msg:
      - "DRY RUN — would configure:"
      - "  Max concurrent sessions: {{ cv_max_concurrent_sessions }}"
      - "  RBAC roles: {{ cv_roles | map(attribute='name') | list | join(', ') }}"
  when: not apply_changes | bool

- name: Save access control artifact
  ansible.builtin.copy:
    content: "{{ ac_artifact | to_nice_json }}"
    dest: "{{ artifacts_dir }}/cv_access_control.json"
    mode: '0640'
  vars:
    ac_artifact:
      timestamp: "{{ ansible_date_time.iso8601 }}"
      center_host: "{{ cv_center_host }}"
      mode: "{{ 'applied' if apply_changes | bool else 'dry_run' }}"
      stig_control: "CISC-ND-000360"
      max_concurrent_sessions: "{{ cv_max_concurrent_sessions }}"
      roles: "{{ cv_roles }}"
