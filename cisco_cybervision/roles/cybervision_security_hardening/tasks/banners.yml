---
# tasks file for cybervision_security_hardening - DoD login banner and system identification
# NIST AC-8, CM-8 | STIG CISC-ND-000080, CISC-ND-001470

- name: PHASE 4 - CISC-ND-000080 - Configure DoD mandatory login banner
  ansible.builtin.uri:
    url: "{{ cv_api_url }}/system/security/banner"
    method: PUT
    headers:
      Authorization: "Bearer {{ cv_api_token }}"
      Content-Type: "application/json"
      Accept: "application/json"
    body_format: json
    body:
      enabled: true
      message: "{{ cv_login_banner }}"
    validate_certs: "{{ cv_validate_certs }}"
    timeout: "{{ cv_timeout }}"
    status_code: [200, 204]
  register: cv_banner_result
  when: apply_changes | bool

- name: PHASE 4 - CISC-ND-001470 - Configure system contact and location
  ansible.builtin.uri:
    url: "{{ cv_api_url }}/system/settings"
    method: PATCH
    headers:
      Authorization: "Bearer {{ cv_api_token }}"
      Content-Type: "application/json"
      Accept: "application/json"
    body_format: json
    body:
      system_contact: "{{ cv_system_contact }}"
      system_location: "{{ cv_system_location }}"
      system_description: "{{ cv_system_description }}"
    validate_certs: "{{ cv_validate_certs }}"
    timeout: "{{ cv_timeout }}"
    status_code: [200, 204]
  register: cv_sysid_result
  when: apply_changes | bool

- name: PHASE 4 - Display banner plan (dry-run)
  ansible.builtin.debug:
    msg:
      - "DRY RUN — would configure:"
      - "  Banner: DoD warning banner ({{ cv_login_banner | length }} chars)"
      - "  System contact:  {{ cv_system_contact }}"
      - "  System location: {{ cv_system_location }}"
  when: not apply_changes | bool

- name: Save banner artifact
  ansible.builtin.copy:
    content: "{{ banner_artifact | to_nice_json }}"
    dest: "{{ artifacts_dir }}/cv_banners.json"
    mode: '0640'
  vars:
    banner_artifact:
      timestamp: "{{ ansible_date_time.iso8601 }}"
      center_host: "{{ cv_center_host }}"
      mode: "{{ 'applied' if apply_changes | bool else 'dry_run' }}"
      stig_controls:
        - id: "CISC-ND-000080"
          description: "DoD mandatory login banner"
          applied: "{{ apply_changes | bool }}"
        - id: "CISC-ND-001470"
          description: "System contact and location"
          contact: "{{ cv_system_contact }}"
          location: "{{ cv_system_location }}"
          applied: "{{ apply_changes | bool }}"
