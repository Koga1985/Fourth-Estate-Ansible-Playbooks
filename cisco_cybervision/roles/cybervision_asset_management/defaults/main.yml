---
# defaults file for cybervision_asset_management
# Cisco Cyber Vision - OT asset discovery, inventory, tagging, and vulnerability tracking

# ============================================================
# Cyber Vision Center API Connection
# ============================================================
cv_center_host: "{{ vault_cv_center_hostname }}"
cv_api_url: "https://{{ cv_center_host }}/api/3.0"
cv_api_token: "{{ vault_cv_api_token }}"
cv_validate_certs: true
cv_use_proxy: false
cv_timeout: 60

# ============================================================
# Deployment Control
# ============================================================
apply_changes: false
artifacts_dir: "/tmp/cv-artifacts"

# ============================================================
# Feature Toggles
# ============================================================
enable_asset_discovery: true
enable_asset_tagging: true
enable_vulnerability_tracking: true
enable_baseline_config: true

# ============================================================
# Asset Discovery Configuration
# ============================================================
cv_discovery_passive: true           # Always enabled — passive traffic analysis
cv_discovery_active: true            # Active probing (ARP/ICMP) — confirm with OT team
cv_active_discovery_rate: "low"      # Options: low, medium, high — use low in OT
cv_discovery_protocols:              # Protocols to actively probe (if active enabled)
  - "arp"
  - "icmp"

# ============================================================
# Asset Tagging / Classification
# ============================================================
# Criticality levels — assign to assets based on OT risk
cv_criticality_levels:
  - name: "critical"
    description: "Safety system or production-critical device"
    color: "#e74c3c"
  - name: "high"
    description: "Primary control or SCADA device"
    color: "#e67e22"
  - name: "medium"
    description: "Auxiliary or monitoring device"
    color: "#f1c40f"
  - name: "low"
    description: "Non-production or lab device"
    color: "#2ecc71"

# Pre-defined asset groups for Fourth Estate OT environment
cv_asset_groups:
  - name: "Safety-Systems"
    description: "Safety Instrumented Systems (SIS) — highest criticality"
    criticality: "critical"
    tags:
      - "sis"
      - "safety"
  - name: "SCADA-Controllers"
    description: "PLCs and RTUs controlling production processes"
    criticality: "critical"
    tags:
      - "plc"
      - "rtu"
      - "scada"
  - name: "HMI-Systems"
    description: "Human-Machine Interface workstations"
    criticality: "high"
    tags:
      - "hmi"
      - "workstation"
  - name: "Engineering-Workstations"
    description: "Engineering and programming workstations"
    criticality: "high"
    tags:
      - "ew"
      - "programming"
  - name: "Historians"
    description: "Data historians and OT/IT bridging systems"
    criticality: "medium"
    tags:
      - "historian"
      - "dmz"
  - name: "Network-Infrastructure"
    description: "OT switches, routers, and firewalls"
    criticality: "high"
    tags:
      - "network"
      - "infrastructure"

# ============================================================
# Vulnerability Tracking
# ============================================================
cv_vuln_enabled: true
cv_vuln_cvss_threshold: 7.0          # Alert on CVSSv3 >= 7.0 (High and Critical)
cv_vuln_auto_acknowledge_low: false  # Do not auto-acknowledge — require analyst review
cv_vuln_report_format: "json"        # Options: json, csv
cv_vuln_report_schedule: "weekly"    # How often to export vulnerability reports

# CVE categories to prioritize for OT/ICS environments
cv_vuln_priority_categories:
  - "remote_code_execution"
  - "authentication_bypass"
  - "denial_of_service"
  - "credential_exposure"

# ============================================================
# Baseline Configuration
# ============================================================
# A baseline captures the current "known good" state of the network.
# Deviations (new assets, new flows) trigger alerts.
cv_baseline_enabled: true
cv_baseline_name: "FourthEstate-Baseline"
cv_baseline_description: "Fourth Estate OT network known-good baseline"
cv_baseline_auto_update: false       # Require manual approval for baseline updates
cv_new_asset_alert: true             # Alert on any previously unseen device
cv_new_flow_alert: false             # Too noisy in most OT environments; enable selectively
