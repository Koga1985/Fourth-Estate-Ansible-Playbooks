---
# tasks file for cybervision_asset_management - Network baseline configuration
# Captures the known-good network state; deviations trigger alerts

- name: PHASE 3 - Query existing baselines
  ansible.builtin.uri:
    url: "{{ cv_api_url }}/baselines"
    method: GET
    headers:
      Authorization: "Bearer {{ cv_api_token }}"
      Accept: "application/json"
    validate_certs: "{{ cv_validate_certs }}"
    timeout: "{{ cv_timeout }}"
    status_code: 200
  register: cv_existing_baselines
  failed_when: false
  when: cv_baseline_enabled | bool

- name: PHASE 3 - Create network baseline
  ansible.builtin.uri:
    url: "{{ cv_api_url }}/baselines"
    method: POST
    headers:
      Authorization: "Bearer {{ cv_api_token }}"
      Content-Type: "application/json"
      Accept: "application/json"
    body_format: json
    body:
      name: "{{ cv_baseline_name }}"
      description: "{{ cv_baseline_description }}"
      auto_update: "{{ cv_baseline_auto_update }}"
      alert_new_asset: "{{ cv_new_asset_alert }}"
      alert_new_flow: "{{ cv_new_flow_alert }}"
    validate_certs: "{{ cv_validate_certs }}"
    timeout: "{{ cv_timeout }}"
    status_code: [200, 201, 409]
  register: cv_baseline_result
  when:
    - apply_changes | bool
    - cv_baseline_enabled | bool

- name: PHASE 3 - Display baseline plan (dry-run)
  ansible.builtin.debug:
    msg:
      - "DRY RUN — would create baseline:"
      - "  Name:          {{ cv_baseline_name }}"
      - "  Auto-update:   {{ cv_baseline_auto_update }}"
      - "  Alert new asset: {{ cv_new_asset_alert }}"
      - "  Alert new flow:  {{ cv_new_flow_alert }}"
  when: not apply_changes | bool and cv_baseline_enabled | bool

- name: Save baseline artifact
  ansible.builtin.copy:
    content: "{{ baseline_artifact | to_nice_json }}"
    dest: "{{ artifacts_dir }}/cv_baseline_config.json"
    mode: '0640'
  vars:
    baseline_artifact:
      timestamp: "{{ ansible_date_time.iso8601 }}"
      center_host: "{{ cv_center_host }}"
      mode: "{{ 'applied' if apply_changes | bool else 'dry_run' }}"
      baseline_enabled: "{{ cv_baseline_enabled }}"
      baseline_name: "{{ cv_baseline_name }}"
      auto_update: "{{ cv_baseline_auto_update }}"
      alert_new_asset: "{{ cv_new_asset_alert }}"
      alert_new_flow: "{{ cv_new_flow_alert }}"
