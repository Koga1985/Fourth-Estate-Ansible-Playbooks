---
# tasks file for cybervision_asset_management
# Cisco Cyber Vision - OT asset discovery, inventory, tagging, and vulnerability tracking

# ============================================================
# Prerequisites (always runs)
# ============================================================
- name: PHASE 3 - Run prerequisites
  ansible.builtin.include_tasks:
    file: prerequisites.yml
    apply:
      tags:
        - always
        - prerequisites
  tags:
    - always
    - prerequisites

# ============================================================
# Asset Discovery Configuration
# Passive (always on) and optional active probing
# ============================================================
- name: PHASE 3 - Asset discovery configuration
  ansible.builtin.include_tasks:
    file: asset_discovery.yml
    apply:
      tags:
        - cybervision
        - assets
        - discovery
        - inventory
        - phase3
  when: enable_asset_discovery | bool
  tags:
    - cybervision
    - assets
    - discovery
    - inventory
    - phase3

# ============================================================
# Asset Tagging and Group Organization
# Criticality levels, OT device groups, tags
# ============================================================
- name: PHASE 3 - Asset tagging and group configuration
  ansible.builtin.include_tasks:
    file: asset_tagging.yml
    apply:
      tags:
        - cybervision
        - assets
        - tagging
        - groups
        - phase3
  when: enable_asset_tagging | bool
  tags:
    - cybervision
    - assets
    - tagging
    - groups
    - phase3

# ============================================================
# Vulnerability Tracking
# CVE threshold configuration and report export
# ============================================================
- name: PHASE 3 - Vulnerability tracking configuration
  ansible.builtin.include_tasks:
    file: vulnerability_tracking.yml
    apply:
      tags:
        - cybervision
        - assets
        - vulnerabilities
        - cve
        - phase3
  when: enable_vulnerability_tracking | bool
  tags:
    - cybervision
    - assets
    - vulnerabilities
    - cve
    - phase3

# ============================================================
# Network Baseline Configuration
# Capture known-good state; alert on deviations
# ============================================================
- name: PHASE 3 - Network baseline configuration
  ansible.builtin.include_tasks:
    file: baseline_config.yml
    apply:
      tags:
        - cybervision
        - assets
        - baseline
        - phase3
  when: enable_baseline_config | bool
  tags:
    - cybervision
    - assets
    - baseline
    - phase3

# ============================================================
# Post-Configuration Validation
# ============================================================
- name: PHASE 3 - Asset management validation
  ansible.builtin.include_tasks:
    file: validation.yml
    apply:
      tags:
        - cybervision
        - assets
        - validation
        - phase3
  tags:
    - cybervision
    - assets
    - validation
    - phase3
