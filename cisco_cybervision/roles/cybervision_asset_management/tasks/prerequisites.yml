---
# tasks file for cybervision_asset_management - Prerequisites

- name: Ensure artifacts directory exists
  ansible.builtin.file:
    path: "{{ artifacts_dir }}"
    state: directory
    mode: '0750'

- name: Verify required vault variables
  ansible.builtin.assert:
    that:
      - vault_cv_center_hostname is defined
      - vault_cv_api_token is defined
    fail_msg: "Required vault variables missing: vault_cv_center_hostname, vault_cv_api_token"
    success_msg: "Asset management vault variables present"

- name: Query current asset count
  ansible.builtin.uri:
    url: "{{ cv_api_url }}/devices?page=1&size=1"
    method: GET
    headers:
      Authorization: "Bearer {{ cv_api_token }}"
      Accept: "application/json"
    validate_certs: "{{ cv_validate_certs }}"
    timeout: "{{ cv_timeout }}"
    status_code: 200
  register: cv_asset_count_check
  failed_when: false

- name: Display asset count and mode
  ansible.builtin.debug:
    msg:
      - "Current OT asset count: {{ cv_asset_count_check.json.total | default('unknown') }}"
      - "Apply changes: {{ apply_changes | bool }}"
