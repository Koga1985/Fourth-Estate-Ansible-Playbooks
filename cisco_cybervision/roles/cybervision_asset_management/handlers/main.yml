---
# handlers file for cybervision_asset_management

- name: notify asset management complete
  ansible.builtin.debug:
    msg:
      - "================================================================"
      - " Cyber Vision Asset Management Complete - Fourth Estate"
      - "================================================================"
      - " Center Host:  {{ cv_center_host }}"
      - " Mode:         {{ 'CHANGES APPLIED' if apply_changes | bool else 'DRY RUN ONLY' }}"
      - " Timestamp:    {{ ansible_date_time.iso8601 }}"
      - " Artifacts:    {{ artifacts_dir }}"
      - "----------------------------------------------------------------"
      - " Modules:"
      - "   Asset Discovery:       {{ enable_asset_discovery | bool }}"
      - "   Asset Tagging:         {{ enable_asset_tagging | bool }}"
      - "   Vulnerability Tracking: {{ enable_vulnerability_tracking | bool }}"
      - "   Baseline Config:       {{ enable_baseline_config | bool }}"
      - "================================================================"

- name: refresh asset inventory
  ansible.builtin.uri:
    url: "{{ cv_api_url }}/devices?page=1&size=1"
    method: GET
    headers:
      Authorization: "Bearer {{ cv_api_token }}"
      Accept: "application/json"
    validate_certs: "{{ cv_validate_certs }}"
    timeout: "{{ cv_timeout }}"
    status_code: 200
  register: cv_asset_refresh
  failed_when: false
