---
# defaults file for cybervision_center_deploy
# Cisco Cyber Vision Center - initial deployment and base configuration

# ============================================================
# Cyber Vision Center API Connection
# ============================================================
cv_center_host: "{{ vault_cv_center_hostname }}"
cv_api_url: "https://{{ cv_center_host }}/api/3.0"
cv_api_token: "{{ vault_cv_api_token }}"         # Bearer token (preferred)
cv_username: "{{ vault_cv_admin_username }}"      # Used for initial setup only
cv_password: "{{ vault_cv_admin_password }}"
cv_validate_certs: true
cv_use_proxy: false
cv_timeout: 60
cv_port: 443

# ============================================================
# Deployment Control
# ============================================================
apply_changes: false
artifacts_dir: "/tmp/cv-artifacts"

# ============================================================
# Fourth Estate Organization
# ============================================================
cv_org_name: "FourthEstate"
cv_org_contact: "{{ vault_fourth_estate_contact }}"
cv_environment: "production"
cv_region: "primary"

# ============================================================
# Feature Toggles
# ============================================================
enable_initial_setup: true
enable_network_config: true
enable_license_activation: true
enable_user_management: true

# ============================================================
# Initial System Setup
# ============================================================
cv_center_name: "FourthEstate-CyberVision"
cv_center_description: "Fourth Estate OT Security Visibility Platform"
cv_center_timezone: "America/New_York"
cv_center_language: "en"

# ============================================================
# Network Configuration
# ============================================================
cv_management_ip: "{{ vault_cv_center_management_ip }}"
cv_management_netmask: "{{ vault_cv_center_management_netmask }}"
cv_management_gateway: "{{ vault_cv_center_management_gateway }}"

cv_dns_servers:
  - "{{ vault_dns_server_primary }}"
  - "{{ vault_dns_server_secondary }}"

cv_ntp_servers:
  - server: "time.nist.gov"
    preferred: true
  - server: "time-a-g.nist.gov"
    preferred: false

cv_domain_name: "fourthestate.local"

# ============================================================
# License Configuration
# ============================================================
cv_license_key: "{{ vault_cv_license_key }}"
cv_license_type: "advantage"    # Options: essentials, advantage, premier

# ============================================================
# Local User Management
# (Initial admin and break-glass accounts — operational users via LDAP)
# ============================================================
cv_local_users:
  - username: "admin"
    role: "Admin"
    email: "{{ vault_cv_admin_email }}"
    password: "{{ vault_cv_admin_password }}"
    description: "Primary admin account"
  - username: "break-glass"
    role: "Admin"
    email: "{{ vault_cv_breakglass_email }}"
    password: "{{ vault_cv_breakglass_password }}"
    description: "Emergency break-glass account — store credentials in sealed vault"

# ============================================================
# HTTPS Certificate Configuration
# ============================================================
cv_cert_type: "self_signed"     # Options: self_signed, uploaded, lets_encrypt
cv_cert_key_size: 4096
cv_cert_validity_days: 365
cv_cert_organization: "Fourth Estate"
cv_cert_common_name: "{{ cv_center_host }}"

# Certificate upload (if cv_cert_type = uploaded)
cv_cert_content: "{{ vault_cv_tls_cert | default('') }}"
cv_cert_key_content: "{{ vault_cv_tls_key | default('') }}"
cv_cert_ca_content: "{{ vault_cv_tls_ca | default('') }}"
