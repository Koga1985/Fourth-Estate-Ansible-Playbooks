---
# tasks file for cybervision_sensor_config
# Cisco Cyber Vision - sensor enrollment, capture modes, and sensor policies

# ============================================================
# Prerequisites (always runs)
# ============================================================
- name: PHASE 2 - Run prerequisites
  ansible.builtin.include_tasks:
    file: prerequisites.yml
    apply:
      tags:
        - always
        - prerequisites
  tags:
    - always
    - prerequisites

# ============================================================
# Sensor Enrollment and Zone (Group) Creation
# ============================================================
- name: PHASE 2 - Sensor enrollment and zone configuration
  ansible.builtin.include_tasks:
    file: sensor_enrollment.yml
    apply:
      tags:
        - cybervision
        - sensors
        - enrollment
        - zones
        - phase2
  when: enable_sensor_enrollment | bool
  tags:
    - cybervision
    - sensors
    - enrollment
    - zones
    - phase2

# ============================================================
# Sensor Reporting Policies
# Protocol decoders, asset reporting, flow reporting
# ============================================================
- name: PHASE 2 - Sensor reporting policies
  ansible.builtin.include_tasks:
    file: sensor_policies.yml
    apply:
      tags:
        - cybervision
        - sensors
        - policies
        - protocols
        - phase2
  when: enable_sensor_policies | bool
  tags:
    - cybervision
    - sensors
    - policies
    - protocols
    - phase2

# ============================================================
# Capture Mode Configuration (SPAN/TAP/IOx)
# ============================================================
- name: PHASE 2 - Capture mode configuration
  ansible.builtin.include_tasks:
    file: capture_modes.yml
    apply:
      tags:
        - cybervision
        - sensors
        - capture
        - span
        - phase2
  when: enable_capture_modes | bool
  tags:
    - cybervision
    - sensors
    - capture
    - span
    - phase2

# ============================================================
# Post-Configuration Validation
# ============================================================
- name: PHASE 2 - Sensor validation
  ansible.builtin.include_tasks:
    file: validation.yml
    apply:
      tags:
        - cybervision
        - sensors
        - validation
        - phase2
  tags:
    - cybervision
    - sensors
    - validation
    - phase2
