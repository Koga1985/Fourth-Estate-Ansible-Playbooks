---
# tasks file for cybervision_sensor_config - Prerequisites

- name: Ensure artifacts directory exists
  ansible.builtin.file:
    path: "{{ artifacts_dir }}"
    state: directory
    mode: '0750'

- name: Verify required vault variables
  ansible.builtin.assert:
    that:
      - vault_cv_center_hostname is defined
      - vault_cv_api_token is defined
    fail_msg: "Required vault variables missing: vault_cv_center_hostname, vault_cv_api_token"
    success_msg: "Sensor config vault variables present"

- name: Query all enrolled sensors from Center
  ansible.builtin.uri:
    url: "{{ cv_api_url }}/sensors"
    method: GET
    headers:
      Authorization: "Bearer {{ cv_api_token }}"
      Accept: "application/json"
    validate_certs: "{{ cv_validate_certs }}"
    timeout: "{{ cv_timeout }}"
    status_code: 200
  register: cv_enrolled_sensors
  failed_when: false

- name: Display sensor inventory
  ansible.builtin.debug:
    msg:
      - "Currently enrolled sensors: {{ cv_enrolled_sensors.json | default([]) | length }}"
      - "Apply changes: {{ apply_changes | bool }}"
