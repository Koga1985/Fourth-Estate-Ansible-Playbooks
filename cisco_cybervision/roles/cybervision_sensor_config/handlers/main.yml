---
# handlers file for cybervision_sensor_config

- name: notify sensor config complete
  ansible.builtin.debug:
    msg:
      - "================================================================"
      - " Cyber Vision Sensor Configuration Complete - Fourth Estate"
      - "================================================================"
      - " Center Host:  {{ cv_center_host }}"
      - " Mode:         {{ 'CHANGES APPLIED' if apply_changes | bool else 'DRY RUN ONLY' }}"
      - " Timestamp:    {{ ansible_date_time.iso8601 }}"
      - " Artifacts:    {{ artifacts_dir }}"
      - "----------------------------------------------------------------"
      - " Modules:"
      - "   Sensor Enrollment: {{ enable_sensor_enrollment | bool }}"
      - "   Sensor Policies:   {{ enable_sensor_policies | bool }}"
      - "   Capture Modes:     {{ enable_capture_modes | bool }}"
      - "================================================================"

- name: refresh sensor list
  ansible.builtin.uri:
    url: "{{ cv_api_url }}/sensors"
    method: GET
    headers:
      Authorization: "Bearer {{ cv_api_token }}"
      Accept: "application/json"
    validate_certs: "{{ cv_validate_certs }}"
    timeout: "{{ cv_timeout }}"
    status_code: 200
  register: cv_sensor_refresh
  failed_when: false
