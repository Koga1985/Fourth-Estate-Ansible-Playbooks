---
# tasks file for cybervision_monitoring - SNMP configuration
# SNMPv3 with auth+priv required per DoD STIG

- name: PHASE 5 - Configure SNMPv3 users
  ansible.builtin.uri:
    url: "{{ cv_api_url }}/system/snmp/users"
    method: PUT
    headers:
      Authorization: "Bearer {{ cv_api_token }}"
      Content-Type: "application/json"
      Accept: "application/json"
    body_format: json
    body:
      version: "{{ cv_snmp_version }}"
      users: "{{ cv_snmp_v3_users }}"
      allowed_hosts: "{{ cv_snmp_allowed_hosts }}"
    validate_certs: "{{ cv_validate_certs }}"
    timeout: "{{ cv_timeout }}"
    status_code: [200, 204]
  register: cv_snmp_users_result
  when: apply_changes | bool
  no_log: true    # SNMP auth/priv passwords in body

- name: PHASE 5 - Configure SNMP trap destinations
  ansible.builtin.uri:
    url: "{{ cv_api_url }}/system/snmp/traps"
    method: PUT
    headers:
      Authorization: "Bearer {{ cv_api_token }}"
      Content-Type: "application/json"
      Accept: "application/json"
    body_format: json
    body:
      destinations: "{{ cv_snmp_trap_destinations }}"
    validate_certs: "{{ cv_validate_certs }}"
    timeout: "{{ cv_timeout }}"
    status_code: [200, 204]
  register: cv_snmp_traps_result
  when: apply_changes | bool

- name: PHASE 5 - Display SNMP plan (dry-run)
  ansible.builtin.debug:
    msg:
      - "DRY RUN — would configure SNMP:"
      - "  Version: {{ cv_snmp_version }}"
      - "  Users:   {{ cv_snmp_v3_users | map(attribute='username') | list | join(', ') }}"
      - "  Traps:   {{ cv_snmp_trap_destinations | map(attribute='host') | list | join(', ') }}"
      - "  Allowed: {{ cv_snmp_allowed_hosts | join(', ') }}"
  when: not apply_changes | bool

- name: Save SNMP artifact
  ansible.builtin.copy:
    content: "{{ snmp_artifact | to_nice_json }}"
    dest: "{{ artifacts_dir }}/cv_snmp_config.json"
    mode: '0640'
  vars:
    snmp_artifact:
      timestamp: "{{ ansible_date_time.iso8601 }}"
      center_host: "{{ cv_center_host }}"
      mode: "{{ 'applied' if apply_changes | bool else 'dry_run' }}"
      snmp_version: "{{ cv_snmp_version }}"
      users: "{{ cv_snmp_v3_users | map(attribute='username') | list }}"
      trap_destinations: "{{ cv_snmp_trap_destinations | map(attribute='host') | list }}"
      allowed_hosts: "{{ cv_snmp_allowed_hosts }}"
