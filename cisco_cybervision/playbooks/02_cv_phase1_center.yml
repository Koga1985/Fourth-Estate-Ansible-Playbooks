---
# Cisco Cyber Vision - Phase 1: Center Initial Deployment
# System setup, network config, license activation, local user management
#
# Usage:
#   ansible-playbook -i inventory playbooks/02_cv_phase1_center.yml --ask-vault-pass
#   ansible-playbook -i inventory playbooks/02_cv_phase1_center.yml \
#     -e "apply_changes=true" --ask-vault-pass

- name: Cyber Vision Phase 1 - Center Deployment
  hosts: localhost
  connection: local
  gather_facts: true

  vars:
    apply_changes: false
    artifacts_dir: "/tmp/cv-artifacts"

  pre_tasks:
    - name: Create artifacts directory
      ansible.builtin.file:
        path: "{{ artifacts_dir }}"
        state: directory
        mode: '0750'
      tags: ['always']

  roles:
    - role: cybervision_center_deploy
      tags: ['center', 'phase1']
