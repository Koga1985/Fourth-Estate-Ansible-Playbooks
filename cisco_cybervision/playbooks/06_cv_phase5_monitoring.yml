---
# Cisco Cyber Vision - Phase 5: Monitoring and Integrations
# Syslog/SIEM, SNMP, alert policies, Cisco ISE pxGrid, health monitoring
#
# Usage:
#   ansible-playbook -i inventory playbooks/06_cv_phase5_monitoring.yml --ask-vault-pass
#   ansible-playbook -i inventory playbooks/06_cv_phase5_monitoring.yml \
#     -e "apply_changes=true" --ask-vault-pass
#
#   # Skip ISE integration
#   ansible-playbook -i inventory playbooks/06_cv_phase5_monitoring.yml \
#     -e "apply_changes=true enable_ise_integration=false" --ask-vault-pass

- name: Cyber Vision Phase 5 - Monitoring and Integrations
  hosts: localhost
  connection: local
  gather_facts: true

  vars:
    apply_changes: false
    artifacts_dir: "/tmp/cv-artifacts"
    enable_syslog: true
    enable_snmp: true
    enable_alerts: true
    enable_ise_integration: true
    enable_health_monitoring: true

  pre_tasks:
    - name: Create artifacts directory
      ansible.builtin.file:
        path: "{{ artifacts_dir }}"
        state: directory
        mode: '0750'
      tags: ['always']

  roles:
    - role: cybervision_monitoring
      tags: ['monitoring', 'siem', 'ise', 'phase5']
