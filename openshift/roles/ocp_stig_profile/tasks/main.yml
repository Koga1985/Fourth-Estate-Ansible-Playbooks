---
# tasks file for ocp_stig_profile

- name: Ensure artifacts directory exists
  ansible.builtin.file:
    path: "{{ artifacts_dir }}"
    state: directory
    mode: "0750"
  delegate_to: localhost
  run_once: true
  changed_when: false
  tags: [always]

- name: Show run mode
  ansible.builtin.debug:
    msg: >-
      ocp_stig_profile ({{ stig_benchmark }} {{ stig_version }}) -
      {{ 'ENFORCING' if apply_changes | bool else 'DRY-RUN / check mode only' }}
  tags: [always]

- name: Cluster-scoped controls (CNTR-OS-000070/000100/000200/000440/000800)
  ansible.builtin.import_tasks: cluster_config.yml
  when: stig_cluster_config | bool
  tags: [stig, cluster]

- name: Namespace security - PSA + default-deny network policy (CNTR-OS-000180)
  ansible.builtin.import_tasks: namespace_security.yml
  when: stig_namespace_security | bool
  tags: [stig, namespace]

- name: Compliance report
  ansible.builtin.import_tasks: compliance_report.yml
  when: stig_compliance_report | bool
  tags: [stig, report]
