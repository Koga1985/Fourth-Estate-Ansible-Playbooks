---
# Example overrides for ocp_stig_profile (-e @vars.example.yml).
apply_changes: false

kubeconfig: "~/.kube/config"

ocp_audit_profile: WriteRequestBodies
ocp_encryption_type: aescbc
ocp_tls_security_profile: Intermediate
ocp_token_inactivity_timeout: "10m0s"
ocp_token_max_age_seconds: 28800
ocp_disable_self_provisioner: true

# Workload namespaces to lock down (NOT openshift-*/kube-*/default).
ocp_target_namespaces:
  - app-prod
  - app-stage
ocp_psa_level: restricted
ocp_apply_default_deny_netpol: true
