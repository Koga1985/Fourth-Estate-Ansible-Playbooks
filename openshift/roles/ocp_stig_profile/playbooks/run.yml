---
# Grab-and-go entry point for the OpenShift 4.x STIG profile role.
#
# Dry-run (default - server-side check, changes nothing):
#   KUBECONFIG=~/.kube/config ansible-playbook run.yml
# Enforce:
#   KUBECONFIG=~/.kube/config ansible-playbook run.yml -e apply_changes=true
- name: Apply OpenShift Container Platform 4.x STIG profile
  hosts: localhost
  connection: local
  gather_facts: true
  any_errors_fatal: true
  collections:
    - kubernetes.core
  roles:
    - role: ocp_stig_profile
