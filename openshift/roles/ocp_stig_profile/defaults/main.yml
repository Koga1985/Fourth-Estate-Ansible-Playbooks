---
# defaults file for ocp_stig_profile
# Red Hat OpenShift Container Platform 4.x STIG (DISA, Ver 2 Rel 4).
# Rule family CNTR-OS-XXXXXX. NIST SP 800-53 Rev 5 aligned.
#
# Applies cluster-scoped and namespace-scoped STIG controls via kubernetes.core.
# Safe by default: apply_changes=false runs every task in check mode (server
# dry-run / no persistence) and writes a JSON findings artifact.

# ============================================================
# Cluster access
# ============================================================
kubeconfig: "{{ lookup('env', 'KUBECONFIG') | default('~/.kube/config', true) }}"

# ============================================================
# Deployment control
# ============================================================
apply_changes: false
artifacts_dir: "/tmp/ocp-stig-artifacts"

# ============================================================
# Control-area toggles
# ============================================================
stig_cluster_config: true
stig_namespace_security: true
stig_compliance_report: true

# ============================================================
# CNTR-OS-000100 - API server audit profile
# ============================================================
ocp_audit_profile: WriteRequestBodies   # Default | WriteRequestBodies | AllRequestBodies

# ============================================================
# CNTR-OS-000800 - etcd / API encryption at rest
# ============================================================
ocp_encryption_type: aescbc             # aescbc | aesgcm

# ============================================================
# CNTR-OS-000440 - TLS security profile
# ============================================================
ocp_tls_security_profile: Intermediate  # Old | Intermediate | Modern

# ============================================================
# CNTR-OS-000070 - OAuth token lifetimes (seconds)
# ============================================================
ocp_token_inactivity_timeout: "10m0s"
ocp_token_max_age_seconds: 28800        # 8 hours

# ============================================================
# CNTR-OS-000200 - Remove cluster self-provisioner from authenticated users
# ============================================================
ocp_disable_self_provisioner: true

# ============================================================
# Namespace security (PSA + default-deny network policy)
# CNTR-OS-000180 (network policy) | CNTR-OS-001xxx (PSA restricted)
# ============================================================
# Namespaces to enforce restricted Pod Security Admission + default-deny netpol.
# Exclude platform namespaces (openshift-*, kube-*, default).
ocp_target_namespaces:
  - app-prod
  - app-stage
ocp_psa_level: restricted               # restricted | baseline
ocp_apply_default_deny_netpol: true

# ============================================================
# Reporting metadata
# ============================================================
compliance_frameworks:
  - dod_stig
  - nist_800_53
  - nist_800_171
stig_benchmark: "Red Hat OpenShift Container Platform 4.x STIG"
stig_version: "V2R4"
