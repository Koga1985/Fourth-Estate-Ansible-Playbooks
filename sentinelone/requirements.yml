---
# Ansible Collections Requirements for SentinelOne EDR Automation
#
# Install with:
#   ansible-galaxy collection install -r requirements.yml
#

collections:
  # Core POSIX/Linux modules (service, package, etc.)
  - name: ansible.posix
    version: ">=1.5.0"

  # Community general modules (rpm_key, uri, etc.)
  - name: community.general
    version: ">=7.0.0"

  # Windows modules (required for Windows agent deployment)
  - name: ansible.windows
    version: ">=2.0.0"

  # Kubernetes modules (required for container agent deployment)
  # - name: kubernetes.core
  #   version: ">=3.0.0"
