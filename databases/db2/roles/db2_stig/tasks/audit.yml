---
# Audit configuration (db2audit)
# DB2X-00-000700 family - generate audit records for the required categories,
# fail closed on audit subsystem error. NIST AU-2, AU-3, AU-5, AU-12

- name: Capture current db2audit configuration
  ansible.builtin.shell: "{{ db2_clp }} db2audit describe"
  args:
    executable: /bin/bash
  become: true
  become_user: "{{ db2_instance_owner }}"
  register: db2_audit_current
  changed_when: false
  check_mode: false
  failed_when: false
  tags: [audit]

- name: Configure db2audit categories (instance scope)
  ansible.builtin.shell: "{{ db2_clp }} db2audit configure scope {{ item }} error type {{ db2_audit_error_type }}"
  args:
    executable: /bin/bash
  become: true
  become_user: "{{ db2_instance_owner }}"
  loop: "{{ db2_audit_categories }}"
  loop_control:
    label: "{{ item }}"
  when: apply_changes | bool
  register: db2_audit_configure
  changed_when: db2_audit_configure.rc == 0
  tags: [audit]

- name: Start db2audit
  ansible.builtin.shell: "{{ db2_clp }} db2audit start"
  args:
    executable: /bin/bash
  become: true
  become_user: "{{ db2_instance_owner }}"
  when: apply_changes | bool
  register: db2_audit_start
  changed_when: db2_audit_start.rc == 0
  tags: [audit]
