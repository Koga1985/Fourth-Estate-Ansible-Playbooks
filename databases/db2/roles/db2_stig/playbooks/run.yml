---
# Grab-and-go entry point for the IBM DB2 V10.5 STIG role.
#
# Dry-run (default - assesses dbm/db cfg, changes nothing):
#   ansible-playbook -i inventory.example run.yml
# Enforce:
#   ansible-playbook -i inventory.example run.yml -e apply_changes=true
- name: Apply IBM DB2 V10.5 STIG hardening
  hosts: db2_servers
  gather_facts: true
  any_errors_fatal: false
  roles:
    - role: db2_stig
