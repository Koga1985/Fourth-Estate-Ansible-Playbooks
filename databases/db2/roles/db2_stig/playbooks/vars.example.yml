---
# Example overrides for db2_stig (-e @vars.example.yml).
apply_changes: false

db2_instance_owner: db2inst1
db2_database: PRODDB
db2_connect_user: db2admin
db2_connect_password: "{{ vault_db2_admin_password }}"

# Use DEFAULT instead of native encryption if the instance is not licensed for it.
db2_db_cfg:
  LOGARCHMETH1: "LOGRETAIN"
  TRACKMOD: "ON"
  ENCRLIB: "libdb2encr.so"
  ENCROPTS: "CIPHER=AES:MODE=CBC:KEYLEN=256"

db2_ssl_enable: true
db2_ssl_svr_label: db2_server_cert
