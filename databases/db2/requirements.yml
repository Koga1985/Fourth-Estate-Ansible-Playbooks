---
# IBM DB2 STIG Ansible Collections Requirements
# Install with: ansible-galaxy collection install -r requirements.yml
#
# The DB2 STIG role uses only ansible.builtin modules (db2 CLI commands are
# executed on the instance host), so no external collections are required.
# The list is kept here so every platform directory installs the same way.

collections: []

# Host prerequisites (on the DB2 instance host):
#   - IBM DB2 V10.5+ with the instance owner account accessible via SSH
#   - Several dbm cfg / SSL changes require an instance restart
#   - Native encryption (ENCRLIB) requires licensing and a configured keystore
# See docs/KNOWN_LIMITATIONS.md and roles/db2_stig/README.md.
