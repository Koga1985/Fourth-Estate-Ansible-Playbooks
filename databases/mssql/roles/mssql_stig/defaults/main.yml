---
# defaults file for mssql_stig
# Microsoft SQL Server STIG (DISA SQL Server 2016 Instance STIG, SQL6-D0-*) -
# the latest published SQL Server benchmark, applicable to later versions
# pending a dedicated STIG. NIST SP 800-53 Rev 5 aligned.
#
# Safe by default: apply_changes=false only queries sys.configurations
# (assessment). With apply_changes=true the sp_configure surface-area settings
# are applied (RECONFIGURE).

# ============================================================
# Connection (community.general.mssql_script - needs pymssql)
# ============================================================
mssql_login_host: "127.0.0.1"
mssql_login_port: 1433
mssql_login_user: "sa"
mssql_login_password: "{{ vault_mssql_sa_password | default('') }}"
mssql_login_db: "master"

# ============================================================
# Deployment control
# ============================================================
apply_changes: false
artifacts_dir: "/tmp/mssql-stig-artifacts"

# ============================================================
# SQL6-D0-* - sp_configure surface-area settings (name -> required value)
# ============================================================
mssql_sp_configure:
  "clr enabled": 0                        # SQL6-D0-008700
  "xp_cmdshell": 0                        # SQL6-D0-006600
  "Ole Automation Procedures": 0          # SQL6-D0-006300
  "remote access": 0                      # SQL6-D0-009700
  "cross db ownership chaining": 0        # SQL6-D0-005700
  "Ad Hoc Distributed Queries": 0         # SQL6-D0-006200
  "scan for startup procs": 0
  "remote admin connections": 0

compliance_frameworks:
  - dod_stig
  - nist_800_53
  - nist_800_171
stig_benchmark: "Microsoft SQL Server 2016 Instance STIG"
stig_version: "V3R1"
