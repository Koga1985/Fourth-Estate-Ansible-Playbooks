---
# Grab-and-go entry point for the SQL Server STIG role.
# Dry-run: ansible-playbook -i inventory.example run.yml -e @vars.example.yml
# Enforce: ansible-playbook -i inventory.example run.yml -e @vars.example.yml -e apply_changes=true
- name: Apply Microsoft SQL Server STIG hardening
  hosts: mssql_servers
  gather_facts: true
  any_errors_fatal: false
  collections:
    - community.general
  roles:
    - role: mssql_stig
