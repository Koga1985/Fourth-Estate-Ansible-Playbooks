---
# Grab-and-go entry point for the Oracle Database STIG role.
# Dry-run: ansible-playbook -i inventory.example run.yml
# Enforce: ansible-playbook -i inventory.example run.yml -e apply_changes=true
- name: Apply Oracle Database STIG hardening
  hosts: oracle_servers
  gather_facts: true
  any_errors_fatal: false
  roles:
    - role: oracle_db_stig
