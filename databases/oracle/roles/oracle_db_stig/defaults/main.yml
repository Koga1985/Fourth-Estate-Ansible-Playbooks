---
# defaults file for oracle_db_stig
# Oracle Database STIG (DISA Oracle Database 12c STIG, applicable to 19c) -
# rule family O121-*. NIST SP 800-53 Rev 5 aligned.
#
# Runs on the database host, becomes the Oracle OS owner, and uses sqlplus
# "/ as sysdba". Safe by default: apply_changes=false only queries (assessment);
# enforcement issues ALTER SYSTEM / ALTER PROFILE (some need a restart for SPFILE).

# ============================================================
# Oracle environment (set in inventory)
# ============================================================
oracle_os_user: "oracle"
oracle_home: "/u01/app/oracle/product/19.0.0/dbhome_1"
oracle_sid: "ORCL"

# ============================================================
# Deployment control
# ============================================================
apply_changes: false
artifacts_dir: "/tmp/oracle-stig-artifacts"

# ============================================================
# O121-* - System (init) parameters, applied with ALTER SYSTEM ... SCOPE=SPFILE
# ============================================================
oracle_system_parameters:
  AUDIT_TRAIL: "DB,EXTENDED"          # O121-C2-019800 - auditing enabled
  O7_DICTIONARY_ACCESSIBILITY: "FALSE"  # O121-C2-019700
  REMOTE_OS_AUTHENT: "FALSE"          # O121-C2-015100
  SEC_CASE_SENSITIVE_LOGON: "TRUE"    # O121-BP-026200
  SEC_MAX_FAILED_LOGIN_ATTEMPTS: "3"  # O121-C2-014600
  GLOBAL_NAMES: "TRUE"                # O121-C2-015000
  REMOTE_LOGIN_PASSWORDFILE: "EXCLUSIVE"  # O121-C2-019900

# ============================================================
# O121-* - Password profile (ALTER PROFILE)
# ============================================================
oracle_profile_name: "DEFAULT"
oracle_profile_settings:
  FAILED_LOGIN_ATTEMPTS: "3"          # O121-C2-014700
  PASSWORD_LIFE_TIME: "60"            # O121-C2-014800
  PASSWORD_REUSE_MAX: "5"             # O121-C2-014900
  PASSWORD_REUSE_TIME: "365"          # O121-C2-015200
  PASSWORD_LOCK_TIME: "1"             # O121-C2-015300
  PASSWORD_GRACE_TIME: "5"
  INACTIVE_ACCOUNT_TIME: "35"

compliance_frameworks:
  - dod_stig
  - nist_800_53
  - nist_800_171
stig_benchmark: "Oracle Database 12c STIG (applicable to 19c)"
stig_version: "V2R5"
