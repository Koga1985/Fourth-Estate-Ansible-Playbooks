---
# defaults file for postgresql_stig
# PostgreSQL STIG (DISA, Crunchy Data PostgreSQL) - rule family PGS9-00-XXXXXX.
# NIST SP 800-53 Rev 5 aligned.
#
# Safe by default: apply_changes=false runs postgresql_set in check mode (reports
# drift, changes nothing). With apply_changes=true the server parameters are set
# (some require a reload/restart - flagged in the result).

# ============================================================
# Connection (community.postgresql)
# ============================================================
pg_login_host: "127.0.0.1"
pg_login_port: 5432
pg_login_user: "postgres"
pg_login_password: "{{ vault_pg_admin_password | default('') }}"
pg_login_db: "postgres"

# ============================================================
# Deployment control
# ============================================================
apply_changes: false
artifacts_dir: "/tmp/postgresql-stig-artifacts"

# ============================================================
# PGS9-00-* - Server parameters (GUCs) set per STIG
# ============================================================
pg_parameters:
  ssl: "on"                                   # PGS9-00-008600 (encrypt in transit)
  password_encryption: "scram-sha-256"        # PGS9-00-000600
  logging_collector: "on"                      # PGS9-00-004900
  log_destination: "stderr,csvlog"            # PGS9-00-004600
  log_connections: "on"                        # PGS9-00-004400
  log_disconnections: "on"                     # PGS9-00-004500
  log_line_prefix: "%m [%p] %q%u@%d/%a "      # PGS9-00-006600 (who/when/where)
  log_truncate_on_rotation: "on"
  log_error_verbosity: "default"
  client_min_messages: "error"                 # PGS9-00-009100
  statement_timeout: "0"
  log_statement: "ddl"                         # PGS9-00-009200 (audit DDL)

# ============================================================
# Reporting metadata
# ============================================================
compliance_frameworks:
  - dod_stig
  - nist_800_53
  - nist_800_171
stig_benchmark: "Crunchy Data PostgreSQL STIG"
stig_version: "V2R5"
