---
# Grab-and-go entry point for the MongoDB STIG role.
# Dry-run (template diff, no write/restart): ansible-playbook -i inventory.example run.yml
# Enforce:                                   ansible-playbook -i inventory.example run.yml -e apply_changes=true
- name: Apply MongoDB Enterprise STIG hardening
  hosts: mongodb_servers
  become: true
  gather_facts: true
  any_errors_fatal: false
  roles:
    - role: mongodb_stig
