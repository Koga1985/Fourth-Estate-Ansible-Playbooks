---
# defaults file for mongodb_stig
# MongoDB Enterprise STIG (DISA) hardening + assessment - manages the security-
# relevant settings of mongod.conf. NIST SP 800-53 Rev 5 aligned.
#
# Safe by default: apply_changes=false renders the managed mongod.conf and shows
# the diff in check mode WITHOUT writing or restarting. With apply_changes=true
# the file is written (a timestamped backup is kept) and mongod is restarted.

# ============================================================
# Target (runs on the MongoDB host)
# ============================================================
mongod_conf_path: /etc/mongod.conf
mongodb_service_name: mongod

# ============================================================
# Deployment control
# ============================================================
apply_changes: false
restart_mongod_when_changed: true
artifacts_dir: "/tmp/mongodb-stig-artifacts"

# ============================================================
# Baseline (site-specific) - keep your existing paths/ports
# ============================================================
mongodb_storage_dbpath: /var/lib/mongo
mongodb_systemlog_path: /var/log/mongodb/mongod.log
mongodb_bind_ip: "127.0.0.1"          # MUST NOT be 0.0.0.0 - bind to mgmt IP(s)
mongodb_port: 27017

# ============================================================
# STIG security controls
# ============================================================
mongodb_authorization: "enabled"       # security.authorization (RBAC on)
mongodb_javascript_enabled: false      # security.javascriptEnabled off
# TLS for client/cluster transport
mongodb_tls_mode: "requireTLS"         # net.tls.mode
mongodb_tls_cert_key_file: "/etc/ssl/mongodb.pem"
mongodb_tls_ca_file: "/etc/ssl/mongodbCA.pem"
mongodb_tls_disabled_protocols: "TLS1_0,TLS1_1"
# Auditing
mongodb_audit_destination: "file"      # auditLog.destination
mongodb_audit_format: "BSON"
mongodb_audit_path: "/var/log/mongodb/audit.bson"
# Authentication mechanism
mongodb_auth_mechanisms: "SCRAM-SHA-256"

compliance_frameworks:
  - dod_stig
  - nist_800_53
  - nist_800_171
stig_benchmark: "MongoDB Enterprise Advanced STIG"
stig_version: "V1R4"
