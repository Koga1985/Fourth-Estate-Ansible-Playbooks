---
# Cisco Platform Ansible Collections Requirements
# Last Updated: 2026-03-16
#
# Install all collections:
#   ansible-galaxy collection install -r requirements.yml
#
# Install Python dependencies:
#   pip install -r requirements-python.txt
#   (or manually: pip install acicobra acimodel ciscoisesdk ucsmsdk intersight requests paramiko)

collections:

  # --- Cisco ACI (Application Centric Infrastructure) ---
  # Requires: pip install acicobra acimodel
  - name: cisco.aci
    version: ">=2.9.0"

  # --- Cisco ISE (Identity Services Engine) ---
  # Requires: pip install ciscoisesdk
  - name: cisco.ise
    version: ">=2.9.0"

  # --- Cisco UCS (Unified Computing System / UCS Manager) ---
  # Requires: pip install ucsmsdk
  - name: cisco.ucs
    version: ">=1.10.0"

  # --- Cisco Intersight (UCS X-Series, HyperFlex) ---
  # Requires: pip install intersight
  - name: cisco.intersight
    version: ">=2.0.0"

  # --- Cisco Catalyst Center / DNA Center ---
  # Requires: pip install dnacentersdk
  - name: cisco.dnac
    version: ">=6.13.0"

  # --- Cisco NX-OS (Nexus Switches) ---
  - name: cisco.nxos
    version: ">=5.3.0"

  # --- Cisco IOS / IOS-XE ---
  - name: cisco.ios
    version: ">=5.3.0"

  # --- General-purpose utilities ---
  - name: community.general
    version: ">=9.0.0"

  # --- POSIX system helpers ---
  - name: ansible.posix
    version: ">=1.5.0"

  # --- Network utility filters / IP address manipulation ---
  - name: ansible.utils
    version: ">=4.0.0"

  # --- Netcommon shared network modules ---
  - name: ansible.netcommon
    version: ">=6.1.0"
