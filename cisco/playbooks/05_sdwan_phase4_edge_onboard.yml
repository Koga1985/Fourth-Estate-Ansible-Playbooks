---
# Cisco SD-WAN Phase 18: Edge Device Onboarding
# Onboard vEdge and cEdge routers to the SD-WAN fabric
# Prerequisite: Phase 17 must be complete

- name: Phase 18 - SD-WAN Edge Device Onboarding
  hosts: localhost
  gather_facts: false
  any_errors_fatal: true
  connection: local

  vars:
    apply_changes: false
    sdwan_artifacts_dir: "/tmp/sdwan-fourth-estate-artifacts/phase18"
    fourth_estate_org_name: "FourthEstate"

  pre_tasks:
    - name: Display Phase 18 banner
      ansible.builtin.debug:
        msg: |
          ════════════════════════════════════════════════════════════════
          PHASE 18: Edge Device Onboarding
          ════════════════════════════════════════════════════════════════
          Onboarding:
            ✓ Device registration in vManage inventory
            ✓ Day-0 bootstrap configuration generation
            ✓ Device template attachment
            ✓ Variable injection per device
            ✓ Sync status validation
          ════════════════════════════════════════════════════════════════
          Mode: {{ apply_changes | ternary('APPLYING CHANGES', 'DRY RUN') }}
          ════════════════════════════════════════════════════════════════

    - name: Create Phase 18 artifacts directory
      ansible.builtin.file:
        path: "{{ sdwan_artifacts_dir }}"
        state: directory
        mode: '0750'

  tasks:
    - name: Onboard edge devices
      ansible.builtin.include_role:
        name: sdwan_vedge_onboard

  post_tasks:
    - name: Generate Phase 18 completion report
      ansible.builtin.copy:
        dest: "{{ sdwan_artifacts_dir }}/phase18_complete.txt"
        mode: '0640'
        content: |
          Phase 18: Edge Device Onboarding - COMPLETE
          ══════════════════════════════════════════════════
          Completed: {{ ansible_date_time.iso8601 }}
          Mode: {{ apply_changes | ternary('APPLIED', 'DRY RUN') }}

          Devices Onboarded: {{ sdwan_edge_devices | default([]) | length }}
          Bootstrap configs saved to: {{ sdwan_artifacts_dir }}/

          Next Phase: Run 06_sdwan_phase5_security_hardening.yml

    - name: Display next steps
      ansible.builtin.debug:
        msg: |
          Phase 18 Complete!
          Bootstrap configs saved to: {{ sdwan_artifacts_dir }}/
          Next: ansible-playbook cisco/playbooks/06_sdwan_phase5_security_hardening.yml
