---
# Cisco Cyber Vision - Phase 4: Security Hardening (DoD STIG / NIST 800-53)
# Authentication, TLS, RBAC, session management, audit logging, banners
#
# Usage:
#   # Dry-run (shows what would change)
#   ansible-playbook -i inventory playbooks/05_cv_phase4_security.yml --ask-vault-pass
#
#   # Apply all STIG controls
#   ansible-playbook -i inventory playbooks/05_cv_phase4_security.yml \
#     -e "apply_changes=true" --ask-vault-pass
#
#   # Apply only CAT I (critical) controls
#   ansible-playbook -i inventory playbooks/05_cv_phase4_security.yml \
#     --tags stig_cat1 -e "apply_changes=true" --ask-vault-pass

- name: Cyber Vision Phase 4 - Security Hardening
  hosts: localhost
  connection: local
  gather_facts: true

  vars:
    apply_changes: false
    artifacts_dir: "/tmp/cv-artifacts"
    stig_cat1_enabled: true
    stig_cat2_enabled: true
    stig_cat3_enabled: true

  pre_tasks:
    - name: Create artifacts directory
      ansible.builtin.file:
        path: "{{ artifacts_dir }}"
        state: directory
        mode: '0750'
      tags: ['always']

  roles:
    - role: cybervision_security_hardening
      tags: ['security', 'stig', 'nist', 'phase4']
