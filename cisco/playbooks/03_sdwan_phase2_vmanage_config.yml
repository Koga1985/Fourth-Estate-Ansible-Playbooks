---
# Cisco SD-WAN Phase 16: vManage Configuration
# Configure users, templates, and policies on vManage
# Prerequisite: Phase 15 (02_sdwan_phase1_vmanage_deploy.yml) must be complete

- name: Phase 16 - SD-WAN vManage Configuration
  hosts: localhost
  gather_facts: false
  any_errors_fatal: true
  connection: local

  vars:
    apply_changes: false
    sdwan_artifacts_dir: "/tmp/sdwan-fourth-estate-artifacts/phase16"
    fourth_estate_org_name: "FourthEstate"

  pre_tasks:
    - name: Display Phase 16 banner
      ansible.builtin.debug:
        msg: |
          ════════════════════════════════════════════════════════════════
          PHASE 16: vManage Configuration
          ════════════════════════════════════════════════════════════════
          Configuring:
            ✓ User groups (netadmin, operator, readonly)
            ✓ Local service accounts
            ✓ Feature templates (STIG-compliant baseline)
            ✓ Device templates (vEdge-cloud, cEdge)
            ✓ Centralized SD-WAN policies
          ════════════════════════════════════════════════════════════════
          Mode: {{ apply_changes | ternary('APPLYING CHANGES', 'DRY RUN') }}
          ════════════════════════════════════════════════════════════════

    - name: Create Phase 16 artifacts directory
      ansible.builtin.file:
        path: "{{ sdwan_artifacts_dir }}"
        state: directory
        mode: '0750'

  tasks:
    - name: Configure vManage
      ansible.builtin.include_role:
        name: sdwan_vmanage_config

  post_tasks:
    - name: Generate Phase 16 completion report
      ansible.builtin.copy:
        dest: "{{ sdwan_artifacts_dir }}/phase16_complete.txt"
        mode: '0640'
        content: |
          Phase 16: vManage Configuration - COMPLETE
          ══════════════════════════════════════════════════
          Completed: {{ ansible_date_time.iso8601 }}
          Mode: {{ apply_changes | ternary('APPLIED', 'DRY RUN') }}

          Components Configured:
            ✓ RBAC user groups
            ✓ Local service accounts
            ✓ Feature templates (STIG baseline)
            ✓ Device templates
            ✓ SD-WAN policies

          Next Phase: Run 04_sdwan_phase3_controllers.yml

    - name: Display next steps
      ansible.builtin.debug:
        msg: |
          Phase 16 Complete!
          Next: ansible-playbook cisco/playbooks/04_sdwan_phase3_controllers.yml
