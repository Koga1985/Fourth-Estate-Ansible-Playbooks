---
# Cisco Cyber Vision - Phase 3: OT Asset Management
# Asset discovery, group/tag organization, vulnerability tracking, baseline
#
# Usage:
#   ansible-playbook -i inventory playbooks/04_cv_phase3_assets.yml --ask-vault-pass
#   ansible-playbook -i inventory playbooks/04_cv_phase3_assets.yml \
#     -e "apply_changes=true" --ask-vault-pass

- name: Cyber Vision Phase 3 - OT Asset Management
  hosts: localhost
  connection: local
  gather_facts: true
  any_errors_fatal: true

  vars:
    apply_changes: false
    artifacts_dir: "/tmp/cv-artifacts"

  pre_tasks:
    - name: Create artifacts directory
      ansible.builtin.file:
        path: "{{ artifacts_dir }}"
        state: directory
        mode: '0750'
      tags: ['always']

  roles:
    - role: cybervision_asset_management
      tags: ['assets', 'phase3']
