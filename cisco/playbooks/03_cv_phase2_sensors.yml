---
# Cisco Cyber Vision - Phase 2: Sensor Configuration
# Sensor enrollment, zone creation, reporting policies, capture modes
#
# Usage:
#   ansible-playbook -i inventory playbooks/03_cv_phase2_sensors.yml --ask-vault-pass
#   ansible-playbook -i inventory playbooks/03_cv_phase2_sensors.yml \
#     -e "apply_changes=true" --ask-vault-pass

- name: Cyber Vision Phase 2 - Sensor Configuration
  hosts: localhost
  connection: local
  gather_facts: true
  any_errors_fatal: true

  vars:
    apply_changes: false
    artifacts_dir: "/tmp/cv-artifacts"

  pre_tasks:
    - name: Create artifacts directory
      ansible.builtin.file:
        path: "{{ artifacts_dir }}"
        state: directory
        mode: '0750'
      tags: ['always']

  roles:
    - role: cybervision_sensor_config
      tags: ['sensors', 'phase2']
