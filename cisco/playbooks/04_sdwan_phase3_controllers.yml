---
# Cisco SD-WAN Phase 17: Controller Configuration
# Configure vBond orchestrator and vSmart controller
# Prerequisite: Phase 16 must be complete

- name: Phase 17 - SD-WAN Controller Configuration
  hosts: localhost
  gather_facts: false
  any_errors_fatal: true
  connection: local

  vars:
    apply_changes: false
    sdwan_artifacts_dir: "/tmp/sdwan-fourth-estate-artifacts/phase17"
    fourth_estate_org_name: "FourthEstate"

  pre_tasks:
    - name: Display Phase 17 banner
      ansible.builtin.debug:
        msg: |
          ════════════════════════════════════════════════════════════════
          PHASE 17: vBond / vSmart Controller Configuration
          ════════════════════════════════════════════════════════════════
          Configuring:
            ✓ vBond orchestrator registration
            ✓ vSmart controller registration
            ✓ Device certificate issuance (NIST SC-17 / IA-3)
            ✓ OMP route distribution
            ✓ vSmart control policies
          ════════════════════════════════════════════════════════════════
          Mode: {{ apply_changes | ternary('APPLYING CHANGES', 'DRY RUN') }}
          ════════════════════════════════════════════════════════════════

    - name: Create Phase 17 artifacts directory
      ansible.builtin.file:
        path: "{{ sdwan_artifacts_dir }}"
        state: directory
        mode: '0750'

  tasks:
    - name: Configure SD-WAN controllers
      ansible.builtin.include_role:
        name: sdwan_controllers_config

  post_tasks:
    - name: Generate Phase 17 completion report
      ansible.builtin.copy:
        dest: "{{ sdwan_artifacts_dir }}/phase17_complete.txt"
        mode: '0640'
        content: |
          Phase 17: Controller Configuration - COMPLETE
          ══════════════════════════════════════════════════
          Completed: {{ ansible_date_time.iso8601 }}
          Mode: {{ apply_changes | ternary('APPLIED', 'DRY RUN') }}

          Components Configured:
            ✓ vBond orchestrator
            ✓ vSmart controller
            ✓ Device certificates
            ✓ OMP route distribution
            ✓ Control policies

          Next Phase: Run 05_sdwan_phase4_edge_onboard.yml

    - name: Display next steps
      ansible.builtin.debug:
        msg: |
          Phase 17 Complete!
          Next: ansible-playbook cisco/playbooks/05_sdwan_phase4_edge_onboard.yml
