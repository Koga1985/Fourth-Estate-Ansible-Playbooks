---
# Cisco SD-WAN Phase 20: Monitoring and Telemetry
# Configure SNMPv3, syslog, streaming telemetry, and alerts
# Prerequisite: Phases 15-19 must be complete

- name: Phase 20 - SD-WAN Monitoring and Telemetry
  hosts: localhost
  gather_facts: false
  any_errors_fatal: true
  connection: local

  vars:
    apply_changes: false
    sdwan_artifacts_dir: "/tmp/sdwan-fourth-estate-artifacts/phase20"
    fourth_estate_org_name: "FourthEstate"

  pre_tasks:
    - name: Display Phase 20 banner
      ansible.builtin.debug:
        msg: |
          ════════════════════════════════════════════════════════════════
          PHASE 20: Monitoring and Telemetry
          ════════════════════════════════════════════════════════════════
          Configuring:
            ✓ SNMPv3 authPriv (STIG CISC-ND-000090 / NIST SC-8)
            ✓ Remote syslog to SIEM (STIG CISC-ND-000700 / NIST AU-2)
            ✓ Model-driven streaming telemetry
            ✓ vManage alert rules
            ✓ Fabric health monitoring
          ════════════════════════════════════════════════════════════════
          Mode: {{ apply_changes | ternary('APPLYING CHANGES', 'DRY RUN') }}
          ════════════════════════════════════════════════════════════════

    - name: Create Phase 20 artifacts directory
      ansible.builtin.file:
        path: "{{ sdwan_artifacts_dir }}"
        state: directory
        mode: '0750'

  tasks:
    - name: Configure SD-WAN monitoring
      ansible.builtin.include_role:
        name: sdwan_monitoring

  post_tasks:
    - name: Generate Phase 20 completion report
      ansible.builtin.copy:
        dest: "{{ sdwan_artifacts_dir }}/phase20_complete.txt"
        mode: '0640'
        content: |
          Phase 20: Monitoring and Telemetry - COMPLETE
          ══════════════════════════════════════════════════
          Completed: {{ ansible_date_time.iso8601 }}
          Mode: {{ apply_changes | ternary('APPLIED', 'DRY RUN') }}

          Components Configured:
            ✓ SNMPv3 authPriv monitoring
            ✓ Remote syslog to SIEM
            ✓ Streaming telemetry
            ✓ Alert rules
            ✓ Health monitoring

          SD-WAN Deployment Complete!
          Run compliance audit: ansible-playbook cisco/playbooks/11_sdwan_compliance_audit.yml

    - name: Display final deployment message
      ansible.builtin.debug:
        msg: |
          SD-WAN Deployment Complete — All 6 Phases Finished!
          Run full compliance audit: ansible-playbook cisco/playbooks/11_sdwan_compliance_audit.yml
