---
# tasks file for cybervision_security_hardening - TLS and cryptographic controls
# NIST SC-8 | STIG CISC-ND-001440

- name: PHASE 4 - CISC-ND-001440 - Configure TLS settings
  ansible.builtin.uri:
    url: "{{ cv_api_url }}/system/security/tls"
    method: PUT
    headers:
      Authorization: "Bearer {{ cv_api_token }}"
      Content-Type: "application/json"
      Accept: "application/json"
    body_format: json
    body:
      https_only: "{{ cv_https_only }}"
      min_tls_version: "{{ cv_min_tls_version }}"
      allowed_ciphers: "{{ cv_allowed_ciphers }}"
    validate_certs: "{{ cv_validate_certs }}"
    timeout: "{{ cv_timeout }}"
    status_code: [200, 204]
  register: cv_tls_result
  when: apply_changes | bool

- name: PHASE 4 - Display TLS plan (dry-run)
  ansible.builtin.debug:
    msg:
      - "DRY RUN — would configure TLS:"
      - "  HTTPS only:   {{ cv_https_only }} (STIG requires HTTP disabled)"
      - "  Min TLS:      {{ cv_min_tls_version }} (STIG requires >= TLSv1.2)"
      - "  Ciphers:      {{ cv_allowed_ciphers | length }} allowed"
  when: not apply_changes | bool

- name: Save TLS artifact
  ansible.builtin.copy:
    content: "{{ tls_artifact | to_nice_json }}"
    dest: "{{ artifacts_dir }}/cv_crypto_tls.json"
    mode: '0640'
  vars:
    tls_artifact:
      timestamp: "{{ ansible_date_time.iso8601 }}"
      center_host: "{{ cv_center_host }}"
      mode: "{{ 'applied' if apply_changes | bool else 'dry_run' }}"
      stig_control: "CISC-ND-001440"
      https_only: "{{ cv_https_only }}"
      min_tls_version: "{{ cv_min_tls_version }}"
      allowed_ciphers: "{{ cv_allowed_ciphers }}"
