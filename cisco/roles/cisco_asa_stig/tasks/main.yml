---
# tasks file for cisco_asa_stig

- name: Ensure local artifacts directory exists
  ansible.builtin.file:
    path: "{{ artifacts_dir }}"
    state: directory
    mode: "0750"
  delegate_to: localhost
  run_once: true
  changed_when: false
  tags: [always]

- name: Show run mode
  ansible.builtin.debug:
    msg: >-
      cisco_asa_stig on {{ inventory_hostname }} -
      {{ 'ENFORCING' if apply_changes | bool else 'DRY-RUN / check mode only' }}
  tags: [always]

- name: AAA, banner, password policy (CASA-ND-000100/000190/001440)
  ansible.builtin.import_tasks: ndm_auth.yml
  when: stig_ndm_auth | bool
  tags: [stig, ndm, auth]

- name: Management access - SSH, timeouts, ACL (CASA-ND-000160/001130/001150)
  ansible.builtin.import_tasks: ndm_mgmt_access.yml
  when: stig_ndm_mgmt_access | bool
  tags: [stig, ndm, ssh]

- name: Logging and authenticated NTP (CASA-ND-000610/001200)
  ansible.builtin.import_tasks: ndm_logging_ntp.yml
  when: stig_ndm_logging_ntp | bool
  tags: [stig, ndm, logging, ntp]

- name: SNMPv3 only (CASA-ND-001210)
  ansible.builtin.import_tasks: ndm_snmp.yml
  when: stig_ndm_snmp | bool
  tags: [stig, ndm, snmp]

- name: Firewall policy - threat detection and ACL logging (CASA-FW-XXXXXX)
  ansible.builtin.import_tasks: fw_policy.yml
  when: stig_fw_policy | bool
  tags: [stig, firewall]

- name: Compliance report
  ansible.builtin.import_tasks: compliance_report.yml
  when: stig_compliance_report | bool
  tags: [stig, report]
