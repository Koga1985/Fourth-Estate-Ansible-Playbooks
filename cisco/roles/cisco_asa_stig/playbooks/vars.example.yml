---
# Example overrides for cisco_asa_stig (-e @vars.example.yml).
apply_changes: false

asa_mgmt_interface: management
asa_tacacs_servers:
  - host: 10.0.0.10
    key: "{{ vault_asa_tacacs_key }}"
asa_management_subnets:
  - "10.0.0.0 255.255.255.0"
asa_logging_hosts:
  - 10.0.0.20
asa_ntp_servers:
  - 10.0.0.30
asa_snmp_host: 10.0.0.20

# Name the ACLs that should receive an explicit logged deny-any-any.
asa_logged_acls:
  - OUTSIDE_IN
