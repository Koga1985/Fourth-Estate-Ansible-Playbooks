---
# Grab-and-go entry point for the Cisco ASA STIG role.
#
# Dry-run (default): ansible-playbook -i inventory.example run.yml
# Enforce:           ansible-playbook -i inventory.example run.yml -e apply_changes=true
- name: Apply Cisco ASA (NDM + Firewall) STIG hardening
  hosts: asa_firewalls
  gather_facts: false
  any_errors_fatal: true
  collections:
    - cisco.asa
    - ansible.netcommon
  roles:
    - role: cisco_asa_stig
