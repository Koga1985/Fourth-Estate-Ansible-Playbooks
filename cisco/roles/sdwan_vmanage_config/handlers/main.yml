---
# handlers file for sdwan_vmanage_config

- name: notify vmanage config complete
  ansible.builtin.debug:
    msg:
      - "════════════════════════════════════════════════════════════════"
      - " vManage Configuration Complete - Fourth Estate"
      - "════════════════════════════════════════════════════════════════"
      - " vManage: {{ sdwan_vmanage_host }}"
      - " Mode: {{ apply_changes | ternary('CHANGES APPLIED', 'DRY RUN ONLY') }}"
      - " Next: Run 04_sdwan_phase3_controllers.yml"
      - "════════════════════════════════════════════════════════════════"
