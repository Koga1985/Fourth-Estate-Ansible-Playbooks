---
# tasks file: policies.yml for sdwan_vmanage_config
# Configure centralized and localized SD-WAN policies

- name: Query existing SD-WAN policies
  ansible.builtin.uri:
    url: "https://{{ sdwan_vmanage_host }}:{{ sdwan_vmanage_port }}/dataservice/template/policy/vedge"
    method: GET
    headers:
      Cookie: "{{ sdwan_session_cookie }}"
      X-XSRF-TOKEN: "{{ sdwan_csrf_token }}"
    validate_certs: "{{ sdwan_vmanage_verify_ssl }}"
    timeout: "{{ sdwan_vmanage_timeout }}"
  register: sdwan_existing_policies
  check_mode: false
  tags: [sdwan, vmanage, policies, phase16]

- name: Display policy status
  ansible.builtin.debug:
    msg:
      - "Existing vEdge policies: {{ sdwan_existing_policies.json.data | length | default(0) }}"
      - "Status: {{ apply_changes | ternary('WILL APPLY', 'CHECK ONLY') }}"
  tags: [sdwan, vmanage, policies, phase16]
