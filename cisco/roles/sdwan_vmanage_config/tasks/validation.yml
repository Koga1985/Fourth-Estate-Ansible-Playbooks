---
# tasks file: validation.yml for sdwan_vmanage_config

- name: Verify vManage user groups
  ansible.builtin.uri:
    url: "https://{{ sdwan_vmanage_host }}:{{ sdwan_vmanage_port }}/dataservice/admin/usergroup"
    method: GET
    headers:
      Cookie: "{{ sdwan_session_cookie }}"
      X-XSRF-TOKEN: "{{ sdwan_csrf_token }}"
    validate_certs: "{{ sdwan_vmanage_verify_ssl }}"
    timeout: "{{ sdwan_vmanage_timeout }}"
  register: sdwan_val_groups
  check_mode: false
  tags: [sdwan, vmanage, validation, phase16]

- name: Display vManage config validation summary
  ansible.builtin.debug:
    msg:
      - "════════════════════════════════════════════════════════════════"
      - " vManage Phase 16 Configuration - Validation"
      - "════════════════════════════════════════════════════════════════"
      - " vManage: {{ sdwan_vmanage_host }}"
      - " User groups: {{ sdwan_val_groups.json.data | length | default(0) }}"
      - " Mode: {{ apply_changes | ternary('CHANGES APPLIED', 'DRY RUN') }}"
      - " Next: Run 04_sdwan_phase3_controllers.yml"
      - "════════════════════════════════════════════════════════════════"
  tags: [sdwan, vmanage, validation, phase16]
