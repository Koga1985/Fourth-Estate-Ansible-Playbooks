---
# tasks file: device_templates.yml for sdwan_vmanage_config
# Create composite device templates from feature templates

- name: Query existing device templates
  ansible.builtin.uri:
    url: "https://{{ sdwan_vmanage_host }}:{{ sdwan_vmanage_port }}/dataservice/template/device"
    method: GET
    headers:
      Cookie: "{{ sdwan_session_cookie }}"
      X-XSRF-TOKEN: "{{ sdwan_csrf_token }}"
    validate_certs: "{{ sdwan_vmanage_verify_ssl }}"
    timeout: "{{ sdwan_vmanage_timeout }}"
  register: sdwan_existing_device_templates
  check_mode: false
  tags: [sdwan, vmanage, templates, device-templates, phase16]

- name: Display device template status
  ansible.builtin.debug:
    msg:
      - "Existing device templates: {{ sdwan_existing_device_templates.json.data | length | default(0) }}"
      - "Device templates to create: {{ sdwan_device_templates | length }}"
      - "Status: {{ apply_changes | ternary('WILL APPLY', 'CHECK ONLY') }}"
  tags: [sdwan, vmanage, templates, device-templates, phase16]
