---
# tasks file for sdwan_vmanage_config
# Cisco SD-WAN vManage Configuration
# Configures users, feature templates, device templates, and policies

# ============================================================
# Prerequisites and Validation (always runs)
# ============================================================
- name: Include prerequisites validation
  ansible.builtin.include_tasks:
    file: prerequisites.yml
    apply:
      tags:
        - always
        - prerequisites
  tags:
    - always
    - prerequisites

# ============================================================
# Phase 16 - User Groups and RBAC
# NIST AC-2, AC-3, AC-6 | CISC-ND-000360
# ============================================================
- name: PHASE 16 - Configure user groups and RBAC
  ansible.builtin.include_tasks:
    file: users.yml
    apply:
      tags:
        - sdwan
        - vmanage
        - users
        - rbac
        - phase16
  when: enable_user_config | bool
  tags:
    - sdwan
    - vmanage
    - users
    - rbac
    - phase16

# ============================================================
# Phase 16 - Feature Templates
# DoD-baseline feature templates for SD-WAN devices
# ============================================================
- name: PHASE 16 - Deploy feature templates
  ansible.builtin.include_tasks:
    file: feature_templates.yml
    apply:
      tags:
        - sdwan
        - vmanage
        - templates
        - feature-templates
        - phase16
  when: enable_feature_templates | bool
  tags:
    - sdwan
    - vmanage
    - templates
    - feature-templates
    - phase16

# ============================================================
# Phase 16 - Device Templates
# Composite device templates from feature templates
# ============================================================
- name: PHASE 16 - Deploy device templates
  ansible.builtin.include_tasks:
    file: device_templates.yml
    apply:
      tags:
        - sdwan
        - vmanage
        - templates
        - device-templates
        - phase16
  when: enable_device_templates | bool
  tags:
    - sdwan
    - vmanage
    - templates
    - device-templates
    - phase16

# ============================================================
# Phase 16 - SD-WAN Policies (centralized and localized)
# ============================================================
- name: PHASE 16 - Configure SD-WAN policies
  ansible.builtin.include_tasks:
    file: policies.yml
    apply:
      tags:
        - sdwan
        - vmanage
        - policies
        - phase16
  when: enable_policy_config | bool
  tags:
    - sdwan
    - vmanage
    - policies
    - phase16

# ============================================================
# Phase 16 - Validation
# ============================================================
- name: PHASE 16 - Validate vManage configuration
  ansible.builtin.include_tasks:
    file: validation.yml
    apply:
      tags:
        - sdwan
        - vmanage
        - validation
        - phase16
  tags:
    - sdwan
    - vmanage
    - validation
    - phase16
