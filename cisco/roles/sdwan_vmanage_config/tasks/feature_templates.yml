---
# tasks file: feature_templates.yml for sdwan_vmanage_config
# Create feature templates that embed DoD STIG baseline settings

- name: Query existing feature templates
  ansible.builtin.uri:
    url: "https://{{ sdwan_vmanage_host }}:{{ sdwan_vmanage_port }}/dataservice/template/feature"
    method: GET
    headers:
      Cookie: "{{ sdwan_session_cookie }}"
      X-XSRF-TOKEN: "{{ sdwan_csrf_token }}"
    validate_certs: "{{ sdwan_vmanage_verify_ssl }}"
    timeout: "{{ sdwan_vmanage_timeout }}"
  register: sdwan_existing_templates
  check_mode: false
  tags: [sdwan, vmanage, templates, feature-templates, phase16]

- name: Display feature template inventory
  ansible.builtin.debug:
    msg:
      - "Existing feature templates: {{ sdwan_existing_templates.json.data | length | default(0) }}"
      - "Templates to create: {{ sdwan_feature_templates | length }}"
      - "Status: {{ apply_changes | ternary('WILL APPLY', 'CHECK ONLY') }}"
      - "Note: Feature templates contain embedded STIG-compliant baseline settings."
      - "      Configure full template payloads per your device model requirements."
  tags: [sdwan, vmanage, templates, feature-templates, phase16]
