---
# defaults file for sdwan_vmanage_config
# Cisco SD-WAN vManage Configuration
# Configures users, device templates, feature templates, and policies
# Last Updated: 2026-04-08

# ============================================================
# vManage Connection Parameters
# ============================================================
sdwan_vmanage_host: "{{ vault_sdwan_vmanage_host }}"
sdwan_vmanage_port: 443
sdwan_vmanage_username: "{{ vault_sdwan_vmanage_username }}"
sdwan_vmanage_password: "{{ vault_sdwan_vmanage_password }}"
sdwan_vmanage_verify_ssl: true
sdwan_vmanage_timeout: 30

# ============================================================
# Deployment Control
# ============================================================
apply_changes: false
sdwan_artifacts_dir: "/tmp/sdwan-artifacts"

# ============================================================
# Fourth Estate Organization
# ============================================================
fourth_estate_org: "FourthEstate"
fourth_estate_contact: "{{ vault_fourth_estate_contact }}"
fourth_estate_environment: "production"
fourth_estate_region: "primary"

# ============================================================
# Feature Toggles
# ============================================================
enable_user_config: true
enable_feature_templates: true
enable_device_templates: true
enable_policy_config: true
enable_vedge_lists: true

# ============================================================
# vManage User Groups (RBAC)
# NIST AC-2, AC-3, AC-6 | STIG CISC-ND-000360
# ============================================================
sdwan_vmanage_user_groups:
  - name: "netadmin"
    description: "Network admin - full SD-WAN management"
  - name: "operator"
    description: "Operations - read and limited write"
  - name: "readonly"
    description: "Read-only access for auditors"

# ============================================================
# vManage Local Users (break-glass and automation only)
# ============================================================
sdwan_vmanage_users:
  - username: "break-glass-admin"
    password: "{{ vault_sdwan_breakglass_password }}"
    group: "netadmin"
    description: "Emergency break-glass account"
  - username: "ansible-automation"
    password: "{{ vault_sdwan_ansible_password }}"
    group: "netadmin"
    description: "Ansible automation service account"

# ============================================================
# Feature Templates
# Standard Fourth Estate SD-WAN feature template set
# ============================================================
sdwan_feature_templates:
  - name: "FourthEstate-VPN0-Transport"
    model: "vedge-cloud"
    template_type: "vpn"
    description: "Transport VPN (VPN 0) - WAN connectivity"

  - name: "FourthEstate-VPN512-Mgmt"
    model: "vedge-cloud"
    template_type: "vpn"
    description: "Management VPN (VPN 512) - OOB management"

  - name: "FourthEstate-System"
    model: "vedge-cloud"
    template_type: "system-vedge"
    description: "System template - DoD STIG compliant baseline"

  - name: "FourthEstate-Logging"
    model: "vedge-cloud"
    template_type: "logging"
    description: "Syslog to SIEM - STIG AU-2 compliance"

  - name: "FourthEstate-NTP"
    model: "vedge-cloud"
    template_type: "ntp"
    description: "Authenticated NTP - STIG AU-8 compliance"

  - name: "FourthEstate-Banner"
    model: "vedge-cloud"
    template_type: "banner"
    description: "DoD login banner - STIG AC-8 compliance"

  - name: "FourthEstate-AAA"
    model: "vedge-cloud"
    template_type: "aaa"
    description: "TACACS+ AAA - STIG IA-2 compliance"

  - name: "FourthEstate-SNMP"
    model: "vedge-cloud"
    template_type: "snmp"
    description: "SNMPv3 authPriv - STIG SC-8 compliance"

  - name: "FourthEstate-Security"
    model: "vedge-cloud"
    template_type: "security-vsmart"
    description: "vSmart security policies"

# ============================================================
# Device Templates
# ============================================================
sdwan_device_templates:
  - name: "FourthEstate-vEdge-Branch"
    device_type: "vedge-cloud"
    description: "Branch vEdge device template - DoD baseline"
    feature_templates:
      - "FourthEstate-System"
      - "FourthEstate-VPN0-Transport"
      - "FourthEstate-VPN512-Mgmt"
      - "FourthEstate-Logging"
      - "FourthEstate-NTP"
      - "FourthEstate-Banner"
      - "FourthEstate-AAA"
      - "FourthEstate-SNMP"

  - name: "FourthEstate-cEdge-Branch"
    device_type: "vedge-C8000V"
    description: "Branch cEdge (IOS XE) device template - DoD baseline"
    feature_templates:
      - "FourthEstate-System"
      - "FourthEstate-VPN0-Transport"
      - "FourthEstate-VPN512-Mgmt"
      - "FourthEstate-Logging"
      - "FourthEstate-NTP"
      - "FourthEstate-Banner"
      - "FourthEstate-AAA"
      - "FourthEstate-SNMP"

# ============================================================
# Compliance Frameworks
# ============================================================
compliance_frameworks:
  - "dod_stig"
  - "nist_800_53"
  - "nist_800_171"
  - "fisma_moderate"
  - "fisma_high"
