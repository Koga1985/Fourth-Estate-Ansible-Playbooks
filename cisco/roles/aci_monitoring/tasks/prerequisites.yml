---
# tasks file for aci_monitoring - Prerequisites and Validation
# Validates connectivity, required variables, and creates artifact directory

- name: PHASE 5 - Display aci_monitoring role banner
  ansible.builtin.debug:
    msg:
      - "================================================================"
      - " Cisco ACI Monitoring - Fourth Estate"
      - "================================================================"
      - " Role:          aci_monitoring"
      - " APIC Host:     {{ aci_host }}"
      - " Apply Changes: {{ apply_changes }}"
      - " Artifacts:     {{ artifacts_dir }}"
      - " Compliance:    {{ compliance_frameworks | join(', ') }}"
      - "----------------------------------------------------------------"
      - " Features Enabled:"
      - "   SNMP:              {{ enable_snmp }}"
      - "   Syslog:            {{ enable_syslog }}"
      - "   Call Home:         {{ enable_callhome }}"
      - "   Health Monitoring: {{ enable_health_monitoring }}"
      - "   Fault Management:  {{ enable_fault_management }}"
      - "================================================================"
      - " {{ 'DRY RUN MODE - No changes will be applied' if not (apply_changes | bool) else 'LIVE MODE - Changes WILL be applied' }}"
      - "================================================================"
  tags:
    - always
    - prerequisites

- name: PHASE 5 - Validate required APIC connection variables are defined
  ansible.builtin.assert:
    that:
      - aci_host is defined
      - aci_host | length > 0
      - aci_username is defined
      - aci_username | length > 0
      - aci_password is defined
      - aci_password | length > 0
    fail_msg: "Required APIC connection parameters (aci_host, aci_username, aci_password) must be defined"
    quiet: true
  tags:
    - always
    - prerequisites
    - validation

- name: PHASE 5 - Validate monitoring configuration variables are defined
  ansible.builtin.assert:
    that:
      - artifacts_dir is defined
      - artifacts_dir | length > 0
      - aci_health_warn_threshold is defined
      - aci_health_critical_threshold is defined
      - aci_health_warn_threshold > aci_health_critical_threshold
    fail_msg: "Monitoring configuration variables must be defined and health warn threshold must be greater than critical threshold"
    quiet: true
  tags:
    - always
    - prerequisites
    - validation

- name: PHASE 5 - Test APIC connectivity
  cisco.aci.aci_rest:
    host: "{{ aci_host }}"
    username: "{{ aci_username }}"
    password: "{{ aci_password }}"
    validate_certs: "{{ aci_verify_ssl }}"
    use_proxy: "{{ aci_use_proxy }}"
    path: /api/mo/uni.json
    method: get
  register: aci_connectivity_check
  failed_when: false
  tags:
    - always
    - prerequisites
    - validation

- name: PHASE 5 - Assert APIC is reachable
  ansible.builtin.assert:
    that:
      - aci_connectivity_check is defined
      - aci_connectivity_check.status is defined
      - aci_connectivity_check.status == 200
    fail_msg: "Unable to reach APIC at {{ aci_host }} - check connectivity and credentials"
    quiet: true
  tags:
    - always
    - prerequisites
    - validation

- name: PHASE 5 - Create artifacts directory
  ansible.builtin.file:
    path: "{{ artifacts_dir }}"
    state: directory
    mode: "0750"
  tags:
    - always
    - prerequisites

- name: PHASE 5 - Record monitoring deployment start time
  ansible.builtin.set_fact:
    aci_monitoring_start_time: "{{ ansible_date_time.iso8601 }}"
    aci_monitoring_epoch: "{{ ansible_date_time.epoch }}"
  tags:
    - always
    - prerequisites

- name: PHASE 5 - Save monitoring deployment metadata artifact
  ansible.builtin.copy:
    dest: "{{ artifacts_dir }}/aci_monitoring_metadata.json"
    mode: "0640"
    content: "{{ monitoring_metadata | to_nice_json }}"
  vars:
    monitoring_metadata:
      role: "aci_monitoring"
      timestamp: "{{ aci_monitoring_start_time }}"
      apic_host: "{{ aci_host }}"
      apply_changes: "{{ apply_changes | bool }}"
      fourth_estate_org: "{{ fourth_estate_org }}"
      fourth_estate_environment: "{{ fourth_estate_environment }}"
      features_enabled:
        snmp: "{{ enable_snmp | bool }}"
        syslog: "{{ enable_syslog | bool }}"
        callhome: "{{ enable_callhome | bool }}"
        health_monitoring: "{{ enable_health_monitoring | bool }}"
        fault_management: "{{ enable_fault_management | bool }}"
      health_thresholds:
        warning: "{{ aci_health_warn_threshold }}"
        critical: "{{ aci_health_critical_threshold }}"
      compliance_frameworks: "{{ compliance_frameworks }}"
  tags:
    - always
    - prerequisites
