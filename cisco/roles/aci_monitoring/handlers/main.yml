---
# handlers file for aci_monitoring
# Backup, fault query, and monitoring deployment completion notification handlers

- name: backup aci configuration
  cisco.aci.aci_rest:
    host: "{{ aci_host }}"
    username: "{{ aci_username }}"
    password: "{{ aci_password }}"
    validate_certs: "{{ aci_verify_ssl }}"
    use_proxy: "{{ aci_use_proxy }}"
    path: /api/mo/uni/fabric/configexp-FourthEstate-Backup.json
    method: post
    content:
      configExportP:
        attributes:
          dn: uni/fabric/configexp-FourthEstate-Backup
          name: "FourthEstate-Backup"
          adminSt: "triggered"
          format: "json"
          includeSecureFields: "yes"
          snapshot: "yes"
  no_log: true
  when: apply_changes | bool

- name: query aci faults
  cisco.aci.aci_rest:
    host: "{{ aci_host }}"
    username: "{{ aci_username }}"
    password: "{{ aci_password }}"
    validate_certs: "{{ aci_verify_ssl }}"
    use_proxy: "{{ aci_use_proxy }}"
    path: /api/class/faultInst.json?query-target-filter=eq(faultInst.severity,"critical")&page-size=20
    method: get
  no_log: true
  register: aci_handler_faults
  failed_when: false

- name: notify monitoring complete
  ansible.builtin.debug:
    msg:
      - "================================================================"
      - " ACI Monitoring Configuration Complete - Fourth Estate"
      - "================================================================"
      - " APIC Host:     {{ aci_host }}"
      - " Mode:          {{ 'CHANGES APPLIED' if apply_changes | bool else 'DRY RUN ONLY' }}"
      - " Timestamp:     {{ ansible_date_time.iso8601 }}"
      - " Artifacts:     {{ artifacts_dir }}"
      - "----------------------------------------------------------------"
      - " Features Configured:"
      - "   SNMP:              {{ enable_snmp | bool }}"
      - "   Syslog:            {{ enable_syslog | bool }}"
      - "   Call Home:         {{ enable_callhome | bool }}"
      - "   Health Monitoring: {{ enable_health_monitoring | bool }}"
      - "   Fault Management:  {{ enable_fault_management | bool }}"
      - "================================================================"

- name: refresh snmp policy
  cisco.aci.aci_rest:
    host: "{{ aci_host }}"
    username: "{{ aci_username }}"
    password: "{{ aci_password }}"
    validate_certs: "{{ aci_verify_ssl }}"
    use_proxy: "{{ aci_use_proxy }}"
    path: /api/mo/uni/fabric/snmppol-default.json
    method: get
  no_log: true
  register: aci_snmp_refresh
  failed_when: false
  when: apply_changes | bool

- name: refresh syslog policy
  cisco.aci.aci_rest:
    host: "{{ aci_host }}"
    username: "{{ aci_username }}"
    password: "{{ aci_password }}"
    validate_certs: "{{ aci_verify_ssl }}"
    use_proxy: "{{ aci_use_proxy }}"
    path: /api/mo/uni/fabric/slgroup-FourthEstate-Syslog.json
    method: get
  no_log: true
  register: aci_syslog_refresh
  failed_when: false
  when: apply_changes | bool
