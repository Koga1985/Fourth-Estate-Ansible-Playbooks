---
# defaults file for aci_tenant_config
# Cisco ACI Tenant Configuration - VRF, BD, App Profile, EPG, Contracts, Filters

# ============================================================
# APIC Connection Parameters
# ============================================================
aci_host: "{{ vault_aci_apic_hostname }}"
aci_username: "{{ vault_aci_apic_username }}"
aci_password: "{{ vault_aci_apic_password }}"
aci_verify_ssl: true
aci_use_proxy: false
aci_timeout: 30
aci_port: 443

# ============================================================
# Deployment Control
# ============================================================
apply_changes: false
artifacts_dir: "/tmp/aci-artifacts"

# ============================================================
# Fourth Estate Organization
# ============================================================
fourth_estate_org: "FourthEstate"
fourth_estate_contact: "{{ vault_fourth_estate_contact }}"
fourth_estate_environment: "production"
fourth_estate_region: "primary"

# ============================================================
# Feature Toggles
# ============================================================
enable_tenants: true
enable_vrfs: true
enable_bridge_domains: true
enable_app_profiles: true
enable_epgs: true
enable_contracts: true
enable_filters: true
enable_static_paths: false

# ============================================================
# Tenant Definitions
# ============================================================
aci_tenants:
  - name: "FourthEstate-Prod"
    description: "Fourth Estate Production Tenant"
    security_domain: "all"
    enabled: true
  - name: "FourthEstate-Dev"
    description: "Fourth Estate Development Tenant"
    security_domain: "all"
    enabled: true
  - name: "FourthEstate-Mgmt"
    description: "Fourth Estate Management Tenant"
    security_domain: "all"
    enabled: true
  - name: "FourthEstate-DMZ"
    description: "Fourth Estate DMZ Tenant"
    security_domain: "all"
    enabled: true

# ============================================================
# VRF Definitions
# ============================================================
aci_vrfs:
  - name: "Prod-VRF"
    tenant: "FourthEstate-Prod"
    description: "Production VRF - policy enforced"
    policy_control_preference: enforced
    policy_control_direction: ingress
    preferred_group: false
    bgp_timers_policy: ""
    ospf_timers_policy: ""
  - name: "Dev-VRF"
    tenant: "FourthEstate-Dev"
    description: "Development VRF - policy enforced"
    policy_control_preference: enforced
    policy_control_direction: ingress
    preferred_group: false
  - name: "Mgmt-VRF"
    tenant: "FourthEstate-Mgmt"
    description: "Management VRF - policy enforced"
    policy_control_preference: enforced
    policy_control_direction: ingress
    preferred_group: false
  - name: "DMZ-VRF"
    tenant: "FourthEstate-DMZ"
    description: "DMZ VRF - policy enforced"
    policy_control_preference: enforced
    policy_control_direction: ingress
    preferred_group: false

# ============================================================
# Bridge Domain Definitions
# ============================================================
aci_bridge_domains:
  - name: "Prod-App-BD"
    tenant: "FourthEstate-Prod"
    vrf: "Prod-VRF"
    description: "Production Application Bridge Domain"
    gateway_ip: "10.10.10.1/24"
    scope: "private"
    unicast_routing: true
    arp_flooding: false
    l2_unknown_unicast: "proxy"
    l3_unknown_multicast_flooding: "flood"
    multi_dest_flooding: "bd-flood"
    ip_learning: true
    limit_ip_learn: true
  - name: "Prod-DB-BD"
    tenant: "FourthEstate-Prod"
    vrf: "Prod-VRF"
    description: "Production Database Bridge Domain"
    gateway_ip: "10.10.20.1/24"
    scope: "private"
    unicast_routing: true
    arp_flooding: false
    l2_unknown_unicast: "proxy"
    l3_unknown_multicast_flooding: "flood"
    multi_dest_flooding: "bd-flood"
    ip_learning: true
    limit_ip_learn: true
  - name: "Dev-App-BD"
    tenant: "FourthEstate-Dev"
    vrf: "Dev-VRF"
    description: "Development Application Bridge Domain"
    gateway_ip: "10.20.10.1/24"
    scope: "private"
    unicast_routing: true
    arp_flooding: false
    l2_unknown_unicast: "proxy"
    l3_unknown_multicast_flooding: "flood"
    multi_dest_flooding: "bd-flood"
    ip_learning: true
    limit_ip_learn: true
  - name: "Mgmt-OOB-BD"
    tenant: "FourthEstate-Mgmt"
    vrf: "Mgmt-VRF"
    description: "Management Out-of-Band Bridge Domain"
    gateway_ip: "10.0.10.1/24"
    scope: "public"
    unicast_routing: true
    arp_flooding: false
    l2_unknown_unicast: "proxy"
    l3_unknown_multicast_flooding: "flood"
    multi_dest_flooding: "bd-flood"
    ip_learning: true
    limit_ip_learn: true
  - name: "DMZ-Ext-BD"
    tenant: "FourthEstate-DMZ"
    vrf: "DMZ-VRF"
    description: "DMZ External Bridge Domain"
    gateway_ip: "172.16.10.1/24"
    scope: "public"
    unicast_routing: true
    arp_flooding: false
    l2_unknown_unicast: "proxy"
    l3_unknown_multicast_flooding: "flood"
    multi_dest_flooding: "bd-flood"
    ip_learning: true
    limit_ip_learn: true

# ============================================================
# Application Profile Definitions
# ============================================================
aci_app_profiles:
  - name: "Prod-App"
    tenant: "FourthEstate-Prod"
    description: "Production Application Profile"
  - name: "Prod-DB"
    tenant: "FourthEstate-Prod"
    description: "Production Database Application Profile"
  - name: "Dev-App"
    tenant: "FourthEstate-Dev"
    description: "Development Application Profile"
  - name: "Mgmt-App"
    tenant: "FourthEstate-Mgmt"
    description: "Management Application Profile"
  - name: "DMZ-App"
    tenant: "FourthEstate-DMZ"
    description: "DMZ Application Profile"

# ============================================================
# EPG Definitions
# ============================================================
aci_epgs:
  - name: "Web-EPG"
    app_profile: "Prod-App"
    tenant: "FourthEstate-Prod"
    bridge_domain: "Prod-App-BD"
    description: "Production Web Servers EPG"
    preferred_group: false
    flood_in_encap: "disabled"
    intra_epg_isolation: "unenforced"
    proxy_arp: false
  - name: "App-EPG"
    app_profile: "Prod-App"
    tenant: "FourthEstate-Prod"
    bridge_domain: "Prod-App-BD"
    description: "Production Application Servers EPG"
    preferred_group: false
    flood_in_encap: "disabled"
    intra_epg_isolation: "unenforced"
    proxy_arp: false
  - name: "DB-EPG"
    app_profile: "Prod-DB"
    tenant: "FourthEstate-Prod"
    bridge_domain: "Prod-DB-BD"
    description: "Production Database Servers EPG"
    preferred_group: false
    flood_in_encap: "disabled"
    intra_epg_isolation: "enforced"
    proxy_arp: false
  - name: "Dev-Web-EPG"
    app_profile: "Dev-App"
    tenant: "FourthEstate-Dev"
    bridge_domain: "Dev-App-BD"
    description: "Development Web Servers EPG"
    preferred_group: false
    flood_in_encap: "disabled"
    intra_epg_isolation: "unenforced"
    proxy_arp: false
  - name: "Mgmt-EPG"
    app_profile: "Mgmt-App"
    tenant: "FourthEstate-Mgmt"
    bridge_domain: "Mgmt-OOB-BD"
    description: "Management Servers EPG"
    preferred_group: false
    flood_in_encap: "disabled"
    intra_epg_isolation: "unenforced"
    proxy_arp: false
  - name: "DMZ-Web-EPG"
    app_profile: "DMZ-App"
    tenant: "FourthEstate-DMZ"
    bridge_domain: "DMZ-Ext-BD"
    description: "DMZ Web Servers EPG"
    preferred_group: false
    flood_in_encap: "disabled"
    intra_epg_isolation: "unenforced"
    proxy_arp: false

# ============================================================
# Filter Definitions
# ============================================================
aci_filters:
  - name: "Filter-HTTP"
    tenant: "FourthEstate-Prod"
    description: "HTTP and HTTPS traffic filter"
    filter_entries:
      - name: "HTTP"
        ether_type: "ip"
        ip_protocol: "tcp"
        dst_port: "http"
        stateful: false
      - name: "HTTPS"
        ether_type: "ip"
        ip_protocol: "tcp"
        dst_port: "https"
        stateful: false
  - name: "Filter-DB"
    tenant: "FourthEstate-Prod"
    description: "Database traffic filter"
    filter_entries:
      - name: "MSSQL"
        ether_type: "ip"
        ip_protocol: "tcp"
        dst_port: "1433"
        stateful: false
      - name: "MySQL"
        ether_type: "ip"
        ip_protocol: "tcp"
        dst_port: "3306"
        stateful: false
      - name: "PostgreSQL"
        ether_type: "ip"
        ip_protocol: "tcp"
        dst_port: "5432"
        stateful: false
  - name: "Filter-ICMP"
    tenant: "FourthEstate-Prod"
    description: "ICMP filter for health checks"
    filter_entries:
      - name: "ICMP"
        ether_type: "ip"
        ip_protocol: "icmp"
        stateful: false
  - name: "Filter-SSH"
    tenant: "FourthEstate-Mgmt"
    description: "SSH management access filter"
    filter_entries:
      - name: "SSH"
        ether_type: "ip"
        ip_protocol: "tcp"
        dst_port: "22"
        stateful: false

# ============================================================
# Contract Definitions
# ============================================================
aci_contracts:
  - name: "Contract-WebToApp"
    tenant: "FourthEstate-Prod"
    description: "Allow web tier to application tier traffic"
    scope: "tenant"
    subjects:
      - name: "Subj-HTTP"
        filter: "Filter-HTTP"
        bidirectional: true
        apply_both_directions: true
  - name: "Contract-AppToDB"
    tenant: "FourthEstate-Prod"
    description: "Allow application tier to database tier traffic"
    scope: "tenant"
    subjects:
      - name: "Subj-DB"
        filter: "Filter-DB"
        bidirectional: true
        apply_both_directions: true
  - name: "Contract-ICMP"
    tenant: "FourthEstate-Prod"
    description: "Allow ICMP for health monitoring"
    scope: "tenant"
    subjects:
      - name: "Subj-ICMP"
        filter: "Filter-ICMP"
        bidirectional: true
        apply_both_directions: true
  - name: "Contract-Mgmt-SSH"
    tenant: "FourthEstate-Mgmt"
    description: "Allow SSH management access"
    scope: "tenant"
    subjects:
      - name: "Subj-SSH"
        filter: "Filter-SSH"
        bidirectional: true
        apply_both_directions: true

# ============================================================
# Static Path Bindings (empty by default - configure per environment)
# ============================================================
aci_static_paths: []
# Example:
# aci_static_paths:
#   - tenant: "FourthEstate-Prod"
#     app_profile: "Prod-App"
#     epg: "Web-EPG"
#     pod_id: 1
#     leaf_id: 201
#     interface: "1/1"
#     encap: "vlan-100"
#     mode: "regular"
#     interface_type: "switch_port"

# ============================================================
# Compliance Frameworks
# ============================================================
compliance_frameworks:
  - "dod_stig"
  - "nist_800_53"
  - "nist_800_171"
  - "fisma_moderate"
  - "fisma_high"
