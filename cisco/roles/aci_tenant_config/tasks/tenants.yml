---
# tasks file for aci_tenant_config - Tenant Creation
# Creates ACI tenants using cisco.aci.aci_tenant

- name: PHASE 2 - Create ACI tenants
  cisco.aci.aci_tenant:
    host: "{{ aci_host }}"
    username: "{{ aci_username }}"
    password: "{{ aci_password }}"
    validate_certs: "{{ aci_verify_ssl }}"
    use_proxy: "{{ aci_use_proxy }}"
    tenant: "{{ item.name }}"
    description: "{{ item.description | default('') }}"
    state: "{{ 'present' if apply_changes | bool else 'query' }}"
  no_log: true
  changed_when: not (apply_changes | bool)
  loop: "{{ aci_tenants }}"
  loop_control:
    label: "{{ item.name }}"
  when: item.enabled | default(true)
  register: tenant_creation_results
  notify:
    - backup aci configuration
  tags:
    - aci
    - tenants
    - phase2

- name: PHASE 2 - Query tenant creation results
  cisco.aci.aci_tenant:
    host: "{{ aci_host }}"
    username: "{{ aci_username }}"
    password: "{{ aci_password }}"
    validate_certs: "{{ aci_verify_ssl }}"
    use_proxy: "{{ aci_use_proxy }}"
    state: query
  no_log: true
  changed_when: false
  register: aci_tenant_query_all
  tags:
    - aci
    - tenants
    - phase2
    - validation

- name: PHASE 2 - Display tenant creation summary
  ansible.builtin.debug:
    msg:
      - "=== Tenant Creation Summary ==="
      - "Configured tenants: {{ aci_tenants | length }}"
      - "Enabled tenants:    {{ aci_tenants | selectattr('enabled', 'defined') | selectattr('enabled') | list | length }}"
      - "Apply changes:      {{ apply_changes | bool }}"
  tags:
    - aci
    - tenants
    - phase2

- name: PHASE 2 - Save tenant creation artifact
  ansible.builtin.copy:
    dest: "{{ artifacts_dir }}/aci_tenants.json"
    mode: "0640"
    content: "{{ tenants_artifact | to_nice_json }}"
  vars:
    tenants_artifact:
      timestamp: "{{ ansible_date_time.iso8601 }}"
      configured_tenants: "{{ aci_tenants }}"
      tenant_query_results: "{{ aci_tenant_query_all.current | default([]) | length }}"
      apply_changes: "{{ apply_changes | bool }}"
  tags:
    - aci
    - tenants
    - phase2
