---
# tasks file for aci_tenant_config
# Cisco ACI Tenant Configuration - tenant, VRF, BD, EPG, contract, filter automation

# ============================================================
# Prerequisites and Validation (always runs)
# ============================================================
- name: PHASE 2 - Run prerequisites and validation
  ansible.builtin.include_tasks:
    file: prerequisites.yml
    apply:
      tags:
        - always
        - prerequisites
        - validation
  tags:
    - always
    - prerequisites
    - validation

# ============================================================
# Tenant Creation
# ============================================================
- name: PHASE 2 - Create tenants
  ansible.builtin.include_tasks:
    file: tenants.yml
    apply:
      tags:
        - aci
        - tenants
        - phase2
  when: enable_tenants | bool
  tags:
    - aci
    - tenants
    - phase2

# ============================================================
# VRF Configuration
# ============================================================
- name: PHASE 2 - Configure VRFs
  ansible.builtin.include_tasks:
    file: vrfs.yml
    apply:
      tags:
        - aci
        - tenants
        - vrfs
        - phase2
  when: enable_vrfs | bool
  tags:
    - aci
    - tenants
    - vrfs
    - phase2

# ============================================================
# Bridge Domain Configuration
# ============================================================
- name: PHASE 2 - Configure bridge domains
  ansible.builtin.include_tasks:
    file: bridge_domains.yml
    apply:
      tags:
        - aci
        - tenants
        - bridge_domains
        - phase2
  when: enable_bridge_domains | bool
  tags:
    - aci
    - tenants
    - bridge_domains
    - phase2

# ============================================================
# Application Profile Configuration
# ============================================================
- name: PHASE 2 - Configure application profiles
  ansible.builtin.include_tasks:
    file: application_profiles.yml
    apply:
      tags:
        - aci
        - tenants
        - app_profiles
        - phase2
  when: enable_app_profiles | bool
  tags:
    - aci
    - tenants
    - app_profiles
    - phase2

# ============================================================
# EPG Configuration
# ============================================================
- name: PHASE 2 - Configure endpoint groups (EPGs)
  ansible.builtin.include_tasks:
    file: epgs.yml
    apply:
      tags:
        - aci
        - tenants
        - epgs
        - phase2
  when: enable_epgs | bool
  tags:
    - aci
    - tenants
    - epgs
    - phase2

# ============================================================
# Filter Configuration
# ============================================================
- name: PHASE 2 - Configure filters
  ansible.builtin.include_tasks:
    file: filters.yml
    apply:
      tags:
        - aci
        - tenants
        - filters
        - phase2
  when: enable_filters | bool
  tags:
    - aci
    - tenants
    - filters
    - phase2

# ============================================================
# Contract Configuration
# ============================================================
- name: PHASE 2 - Configure contracts
  ansible.builtin.include_tasks:
    file: contracts.yml
    apply:
      tags:
        - aci
        - tenants
        - contracts
        - phase2
  when: enable_contracts | bool
  tags:
    - aci
    - tenants
    - contracts
    - phase2

# ============================================================
# Static Path Bindings
# ============================================================
- name: PHASE 2 - Configure static path bindings
  ansible.builtin.include_tasks:
    file: static_paths.yml
    apply:
      tags:
        - aci
        - tenants
        - static_paths
        - phase2
  when: enable_static_paths | bool
  tags:
    - aci
    - tenants
    - static_paths
    - phase2

# ============================================================
# Validation and Verification
# ============================================================
- name: PHASE 2 - Validate tenant configuration
  ansible.builtin.include_tasks:
    file: validation.yml
    apply:
      tags:
        - validation
        - verification
        - phase2
  tags:
    - validation
    - verification
    - phase2
