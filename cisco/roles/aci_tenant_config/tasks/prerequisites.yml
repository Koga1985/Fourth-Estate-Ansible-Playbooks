---
# tasks file for aci_tenant_config - Prerequisites and Validation
# Validates connectivity, required variables, and creates artifact directory

- name: PHASE 2 - Display aci_tenant_config role banner
  ansible.builtin.debug:
    msg:
      - "================================================================"
      - " Cisco ACI Tenant Configuration - Fourth Estate"
      - "================================================================"
      - " Role:          aci_tenant_config"
      - " APIC Host:     {{ aci_host }}"
      - " Tenants:       {{ aci_tenants | map(attribute='name') | join(', ') }}"
      - " Apply Changes: {{ apply_changes }}"
      - " Artifacts:     {{ artifacts_dir }}"
      - " Compliance:    {{ compliance_frameworks | join(', ') }}"
      - "================================================================"
      - " {{ 'DRY RUN MODE - No changes will be applied' if not (apply_changes | bool) else 'LIVE MODE - Changes WILL be applied' }}"
      - "================================================================"
  tags:
    - always
    - prerequisites

- name: PHASE 2 - Validate required APIC connection variables are defined
  ansible.builtin.assert:
    that:
      - aci_host is defined
      - aci_host | length > 0
      - aci_username is defined
      - aci_username | length > 0
      - aci_password is defined
      - aci_password | length > 0
    fail_msg: "Required APIC connection parameters (aci_host, aci_username, aci_password) must be defined"
    quiet: true
  tags:
    - always
    - prerequisites
    - validation

- name: PHASE 2 - Validate tenant configuration variables are defined
  ansible.builtin.assert:
    that:
      - aci_tenants is defined
      - aci_tenants | length > 0
    fail_msg: "Required variable aci_tenants must be defined and non-empty"
    quiet: true
  tags:
    - always
    - prerequisites
    - validation

- name: PHASE 2 - Test APIC connectivity
  cisco.aci.aci_rest:
    host: "{{ aci_host }}"
    username: "{{ aci_username }}"
    password: "{{ aci_password }}"
    validate_certs: "{{ aci_verify_ssl }}"
    use_proxy: "{{ aci_use_proxy }}"
    path: /api/mo/uni.json
    method: get
  no_log: true
  register: aci_tenant_connectivity_check
  failed_when: false
  tags:
    - always
    - prerequisites
    - validation

- name: PHASE 2 - Assert APIC is reachable
  ansible.builtin.assert:
    that:
      - aci_tenant_connectivity_check is defined
      - aci_tenant_connectivity_check.status is defined
      - aci_tenant_connectivity_check.status == 200
    fail_msg: "Unable to reach APIC at {{ aci_host }} - check connectivity and credentials"
    quiet: true
  tags:
    - always
    - prerequisites
    - validation

- name: PHASE 2 - Create artifacts directory
  ansible.builtin.file:
    path: "{{ artifacts_dir }}"
    state: directory
    mode: "0750"
  tags:
    - always
    - prerequisites

- name: PHASE 2 - Record tenant deployment start time
  ansible.builtin.set_fact:
    aci_tenant_deploy_start_time: "{{ ansible_date_time.iso8601 }}"
    aci_tenant_deploy_epoch: "{{ ansible_date_time.epoch }}"
  tags:
    - always
    - prerequisites

- name: PHASE 2 - Save tenant deployment metadata artifact
  ansible.builtin.copy:
    dest: "{{ artifacts_dir }}/aci_tenant_config_metadata.json"
    mode: "0640"
    content: "{{ tenant_metadata | to_nice_json }}"
  vars:
    tenant_metadata:
      role: "aci_tenant_config"
      timestamp: "{{ aci_tenant_deploy_start_time }}"
      apic_host: "{{ aci_host }}"
      apply_changes: "{{ apply_changes | bool }}"
      tenant_count: "{{ aci_tenants | length }}"
      tenant_names: "{{ aci_tenants | map(attribute='name') | list }}"
      vrf_count: "{{ aci_vrfs | length }}"
      bridge_domain_count: "{{ aci_bridge_domains | length }}"
      epg_count: "{{ aci_epgs | length }}"
      contract_count: "{{ aci_contracts | length }}"
      compliance_frameworks: "{{ compliance_frameworks }}"
      fourth_estate_org: "{{ fourth_estate_org }}"
      fourth_estate_environment: "{{ fourth_estate_environment }}"
  tags:
    - always
    - prerequisites
