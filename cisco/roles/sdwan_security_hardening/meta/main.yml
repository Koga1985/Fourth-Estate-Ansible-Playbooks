---
galaxy_info:
  role_name: sdwan_security_hardening
  author: "Fourth Estate Infrastructure Team"
  description: >
    Cisco SD-WAN Security Hardening - DoD STIG and NIST 800-53 Rev 5 compliance.
    Hardens vManage, vBond, vSmart controllers and vEdge/cEdge edge devices against
    Cisco IOS XE SD-WAN Router NDM STIG V2R1 and Cisco SD-WAN vManage NDM STIG V1R1.
  company: "Fourth Estate"
  license: MIT
  min_ansible_version: "2.15"

  platforms:
    - name: EL
      versions:
        - "8"
        - "9"
    - name: Ubuntu
      versions:
        - focal
        - jammy

  galaxy_tags:
    - cisco
    - sdwan
    - catalystwan
    - security
    - hardening
    - disa_stig
    - nist
    - nist_800_53
    - compliance
    - fourth_estate
    - dod
    - fisma

dependencies: []

collections:
  - ansible.builtin
  - ansible.utils
