---
# tasks file: password_policy.yml for sdwan_security_hardening
# Enforce DoD-compliant password policy on vManage
# STIG: CISC-ND-000530, CISC-ND-000570 | NIST IA-5
# CAT: I | SRG: SRG-APP-000166-NDM-000252, SRG-APP-000170-NDM-000257

- name: "STIG IA-5 [CISC-ND-000530 / CISC-ND-000570] - Enforce vManage password policy"
  ansible.builtin.uri:
    url: "https://{{ sdwan_vmanage_host }}:{{ sdwan_vmanage_port }}/dataservice/settings/configuration/password"
    method: PUT
    headers:
      Cookie: "{{ sdwan_session_cookie }}"
      X-XSRF-TOKEN: "{{ sdwan_csrf_token }}"
      Content-Type: "application/json"
    body_format: json
    body:
      passwordMinLen: "{{ sdwan_password_min_length }}"
      passwordMinUpper: "{{ sdwan_password_min_uppercase }}"
      passwordMinLower: "{{ sdwan_password_min_lowercase }}"
      passwordMinNum: "{{ sdwan_password_min_digits }}"
      passwordMinSpecial: "{{ sdwan_password_min_special }}"
      passwordHistory: "{{ sdwan_password_history_count }}"
      passwordExpire: "{{ sdwan_password_max_age_days }}"
      noChangeInterval: "{{ sdwan_password_no_change_interval_hours }}"
      passwordStrength: "{{ sdwan_password_strength_check | lower }}"
    validate_certs: "{{ sdwan_vmanage_verify_ssl }}"
    timeout: "{{ sdwan_vmanage_timeout }}"
    status_code: [200, 201]
  when: apply_changes | bool
  no_log: true
  register: sdwan_password_policy_result
  tags: [sdwan, security, stig, stig_cat1, passwords, nist_ia]

- name: "STIG IA-5 - Verify password policy settings (dry run)"
  ansible.builtin.uri:
    url: "https://{{ sdwan_vmanage_host }}:{{ sdwan_vmanage_port }}/dataservice/settings/configuration/password"
    method: GET
    headers:
      Cookie: "{{ sdwan_session_cookie }}"
      X-XSRF-TOKEN: "{{ sdwan_csrf_token }}"
    validate_certs: "{{ sdwan_vmanage_verify_ssl }}"
    timeout: "{{ sdwan_vmanage_timeout }}"
  when: not apply_changes | bool
  register: sdwan_password_check
  check_mode: false
  tags: [sdwan, security, stig, stig_cat1, passwords, nist_ia]

- name: Display password policy compliance status
  ansible.builtin.debug:
    msg:
      - "STIG Controls: CISC-ND-000530, CISC-ND-000570 (IA-5 - Authenticator Management)"
      - "Min length: {{ sdwan_password_min_length }} (DoD minimum: 15)"
      - "Min uppercase: {{ sdwan_password_min_uppercase }}"
      - "Min lowercase: {{ sdwan_password_min_lowercase }}"
      - "Min digits: {{ sdwan_password_min_digits }}"
      - "Min special: {{ sdwan_password_min_special }}"
      - "Password history: {{ sdwan_password_history_count }} (DoD minimum: 5)"
      - "Max age: {{ sdwan_password_max_age_days }} days (DoD maximum: 60)"
      - "Status: {{ apply_changes | ternary('APPLIED', 'CHECK ONLY') }}"
  tags: [sdwan, security, stig, stig_cat1, passwords, nist_ia]
