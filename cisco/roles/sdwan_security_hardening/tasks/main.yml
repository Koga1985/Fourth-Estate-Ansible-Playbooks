---
# tasks file for sdwan_security_hardening
# Cisco SD-WAN Security Hardening - DoD STIG and NIST 800-53 Rev 5 compliance
# STIG References:
#   - Cisco IOS XE SD-WAN Router NDM STIG V2R1
#   - Cisco SD-WAN vManage NDM STIG V1R1

# ============================================================
# Prerequisites and Validation (always runs)
# ============================================================
- name: Include prerequisites validation
  ansible.builtin.include_tasks:
    file: prerequisites.yml
    apply:
      tags:
        - always
        - prerequisites
  tags:
    - always
    - prerequisites

# ============================================================
# STIG CAT III - DoD Login Banner
# NIST AC-8 | CISC-ND-000080
# Required on ALL SD-WAN components (vManage, vBond, vSmart, vEdge/cEdge)
# ============================================================
- name: STIG CAT III - Configure DoD login banner
  ansible.builtin.include_tasks:
    file: banner.yml
    apply:
      tags:
        - sdwan
        - security
        - stig
        - stig_cat3
        - nist_ac
        - banners
        - phase19
  when: enable_banners | bool and stig_cat3_enabled | bool
  tags:
    - sdwan
    - security
    - stig
    - stig_cat3
    - nist_ac
    - banners
    - phase19

# ============================================================
# STIG CAT I - Authentication Hardening (TACACS+/RADIUS)
# NIST IA-2, IA-3 | CISC-ND-001190
# DoD requires AAA with TACACS+ or RADIUS; local-only is non-compliant
# ============================================================
- name: STIG CAT I - Configure AAA authentication
  ansible.builtin.include_tasks:
    file: authentication.yml
    apply:
      tags:
        - sdwan
        - security
        - stig
        - stig_cat1
        - nist_ia
        - authentication
        - aaa
        - phase19
  when: enable_auth_hardening | bool and stig_cat1_enabled | bool
  tags:
    - sdwan
    - security
    - stig
    - stig_cat1
    - nist_ia
    - authentication
    - aaa
    - phase19

# ============================================================
# STIG CAT I - Password Policy
# NIST IA-5 | CISC-ND-000530, CISC-ND-000570
# Minimum 15 chars, complexity, history, age
# ============================================================
- name: STIG CAT I - Enforce password policy
  ansible.builtin.include_tasks:
    file: password_policy.yml
    apply:
      tags:
        - sdwan
        - security
        - stig
        - stig_cat1
        - nist_ia
        - passwords
        - phase19
  when: enable_password_policy | bool and stig_cat1_enabled | bool
  tags:
    - sdwan
    - security
    - stig
    - stig_cat1
    - nist_ia
    - passwords
    - phase19

# ============================================================
# STIG CAT II - Access Control and RBAC
# NIST AC-2, AC-3, AC-6 | CISC-ND-000360
# Least privilege; separate admin, operator, read-only roles
# ============================================================
- name: STIG CAT II - Configure access control and RBAC
  ansible.builtin.include_tasks:
    file: access_control.yml
    apply:
      tags:
        - sdwan
        - security
        - stig
        - stig_cat2
        - nist_ac
        - rbac
        - phase19
  when: enable_access_control | bool and stig_cat2_enabled | bool
  tags:
    - sdwan
    - security
    - stig
    - stig_cat2
    - nist_ac
    - rbac
    - phase19

# ============================================================
# STIG CAT II - Account Lockout
# NIST AC-7 | CISC-ND-000370
# Lock account after 3 failed attempts for 15 minutes
# ============================================================
# (Lockout is configured as part of authentication.yml)

# ============================================================
# STIG CAT II - Session Management
# NIST AC-11, AC-12 | CISC-ND-000200, CISC-ND-000390
# 10-minute idle timeout on all management interfaces
# ============================================================
- name: STIG CAT II - Configure session management
  ansible.builtin.include_tasks:
    file: session_management.yml
    apply:
      tags:
        - sdwan
        - security
        - stig
        - stig_cat2
        - nist_ac
        - sessions
        - phase19
  when: enable_session_management | bool and stig_cat2_enabled | bool
  tags:
    - sdwan
    - security
    - stig
    - stig_cat2
    - nist_ac
    - sessions
    - phase19

# ============================================================
# STIG CAT I - TLS/Cryptographic Controls
# NIST SC-8, SC-28 | CISC-ND-001440
# TLS 1.2+ only; FIPS-approved ciphers; disable HTTP
# ============================================================
- name: STIG CAT I - Configure TLS and cryptographic controls
  ansible.builtin.include_tasks:
    file: encryption.yml
    apply:
      tags:
        - sdwan
        - security
        - stig
        - stig_cat1
        - nist_sc
        - crypto
        - tls
        - fips
        - phase19
  when: enable_crypto_tls | bool and stig_cat1_enabled | bool
  tags:
    - sdwan
    - security
    - stig
    - stig_cat1
    - nist_sc
    - crypto
    - tls
    - fips
    - phase19

# ============================================================
# STIG CAT II - SSH Hardening
# NIST AC-17, SC-8 | CISC-ND-001400
# SSHv2 only; disable telnet; FIPS-approved algorithms
# ============================================================
- name: STIG CAT II - Harden SSH configuration
  ansible.builtin.include_tasks:
    file: ssh_hardening.yml
    apply:
      tags:
        - sdwan
        - security
        - stig
        - stig_cat2
        - nist_ac
        - nist_sc
        - ssh
        - phase19
  when: enable_ssh_hardening | bool and stig_cat2_enabled | bool
  tags:
    - sdwan
    - security
    - stig
    - stig_cat2
    - nist_ac
    - nist_sc
    - ssh
    - phase19

# ============================================================
# STIG CAT II - SNMP Security (SNMPv3 required)
# NIST SC-8 | CISC-ND-000090
# Disable SNMPv1/v2c; require SNMPv3 authPriv with AES/SHA
# ============================================================
- name: STIG CAT II - Configure SNMPv3 security
  ansible.builtin.include_tasks:
    file: snmp.yml
    apply:
      tags:
        - sdwan
        - security
        - stig
        - stig_cat2
        - nist_sc
        - snmp
        - phase19
  when: enable_snmp_security | bool and stig_cat2_enabled | bool
  tags:
    - sdwan
    - security
    - stig
    - stig_cat2
    - nist_sc
    - snmp
    - phase19

# ============================================================
# STIG CAT II - Audit Logging
# NIST AU-2, AU-3, AU-9, AU-12 | CISC-ND-000700/710/720
# Remote syslog to SIEM; capture all auth and config events
# ============================================================
- name: STIG CAT II - Configure audit logging
  ansible.builtin.include_tasks:
    file: logging.yml
    apply:
      tags:
        - sdwan
        - security
        - stig
        - stig_cat2
        - nist_au
        - audit
        - logging
        - phase19
  when: enable_audit_logging | bool and stig_cat2_enabled | bool
  tags:
    - sdwan
    - security
    - stig
    - stig_cat2
    - nist_au
    - audit
    - logging
    - phase19

# ============================================================
# STIG CAT II - NTP Authentication
# NIST AU-8 | CISC-ND-001290, CISC-ND-001420
# Authenticated NTP; DoD-approved sources (time.nist.gov)
# ============================================================
- name: STIG CAT II - Configure authenticated NTP
  ansible.builtin.include_tasks:
    file: ntp.yml
    apply:
      tags:
        - sdwan
        - security
        - stig
        - stig_cat2
        - nist_au
        - ntp
        - phase19
  when: enable_ntp_hardening | bool and stig_cat2_enabled | bool
  tags:
    - sdwan
    - security
    - stig
    - stig_cat2
    - nist_au
    - ntp
    - phase19

# ============================================================
# STIG CAT II - Disable Unused Services
# NIST CM-7 | CISC-ND-001200, CISC-ND-001210
# Disable HTTP, telnet, finger, TCP/UDP small servers
# ============================================================
- name: STIG CAT II - Disable unused services
  ansible.builtin.include_tasks:
    file: unused_services.yml
    apply:
      tags:
        - sdwan
        - security
        - stig
        - stig_cat2
        - nist_cm
        - services
        - phase19
  when: enable_unused_services | bool and stig_cat2_enabled | bool
  tags:
    - sdwan
    - security
    - stig
    - stig_cat2
    - nist_cm
    - services
    - phase19

# ============================================================
# Compliance Report Generation
# ============================================================
- name: Generate STIG compliance report
  ansible.builtin.include_tasks:
    file: compliance_report.yml
    apply:
      tags:
        - sdwan
        - security
        - compliance
        - report
        - artifact
        - always
  when: enable_compliance_report | bool
  tags:
    - sdwan
    - security
    - compliance
    - report
    - artifact
    - always
