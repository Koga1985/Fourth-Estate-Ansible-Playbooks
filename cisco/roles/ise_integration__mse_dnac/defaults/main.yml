---
# defaults file for ise_integration__mse_dnac
# Cisco ISE integration with MSE and DNA Center

# ISE Connection Parameters
ise_hostname: "{{ vault_ise_hostname }}"
ise_username: "{{ vault_ise_username }}"
ise_password: "{{ vault_ise_password }}"
ise_verify_ssl: true
ise_use_proxy: false
ise_debug: false

# Deployment Control
apply_changes: false
ise_artifacts_dir: "/tmp/ise-artifacts"

# Fourth Estate Configuration
fourth_estate_org: "FourthEstate"
fourth_estate_contact: "{{ vault_fourth_estate_contact }}"

# pxGrid Settings
pxgrid_auto_approval: false

# DNA Center Integration
dnac_integration_enabled: false
dnac_hostname: ""
dnac_auth_token: "{{ vault_dnac_auth_token | default('') }}"
dnac_ise_shared_secret: "{{ vault_dnac_ise_shared_secret | default('') }}"

# MSE Integration
mse_integration_enabled: false
mse_hostname: ""
mse_username: "{{ vault_mse_username | default('') }}"
mse_password: "{{ vault_mse_password | default('') }}"
mse_verify_ssl: true
mse_ise_shared_secret: "{{ vault_mse_ise_shared_secret | default('') }}"

# Feature Configuration
ise_integration__mse_dnac_enabled: true

# DISA STIG Compliance
enable_disa_stig_compliance: true

# Compliance Frameworks
compliance_frameworks:
  - "dod_stig"
  - "nist_800_53"
  - "nist_800_171"
  - "fisma_moderate"

# Logging
ise_integration__mse_dnac_log_level: "INFO"
ise_integration__mse_dnac_log_to_syslog: true
ise_integration__mse_dnac_syslog_server: "{{ vault_syslog_server }}"

# Notification Settings
ise_integration__mse_dnac_notify_on_completion: false
ise_integration__mse_dnac_notification_email: "{{ vault_security_team_email }}"

# Backup Settings
ise_integration__mse_dnac_auto_backup: true
