---
# tasks file for cybervision_monitoring
# Cisco Cyber Vision - SIEM/syslog, SNMP, alerts, ISE integration, health monitoring

# ============================================================
# Prerequisites (always runs)
# ============================================================
- name: PHASE 5 - Run prerequisites
  ansible.builtin.include_tasks:
    file: prerequisites.yml
    apply:
      tags:
        - always
        - prerequisites
  tags:
    - always
    - prerequisites

# ============================================================
# Syslog / SIEM Integration
# Forwards events to SIEM in CEF format
# ============================================================
- name: PHASE 5 - Syslog/SIEM integration
  ansible.builtin.include_tasks:
    file: syslog.yml
    apply:
      tags:
        - cybervision
        - monitoring
        - syslog
        - siem
        - logging
        - phase5
  when: enable_syslog | bool
  tags:
    - cybervision
    - monitoring
    - syslog
    - siem
    - logging
    - phase5

# ============================================================
# SNMP Configuration (SNMPv3 required)
# ============================================================
- name: PHASE 5 - SNMP configuration
  ansible.builtin.include_tasks:
    file: snmp.yml
    apply:
      tags:
        - cybervision
        - monitoring
        - snmp
        - phase5
  when: enable_snmp | bool
  tags:
    - cybervision
    - monitoring
    - snmp
    - phase5

# ============================================================
# Alert Policy Configuration
# OT-specific alert rules and email notifications
# ============================================================
- name: PHASE 5 - Alert policy configuration
  ansible.builtin.include_tasks:
    file: alerts.yml
    apply:
      tags:
        - cybervision
        - monitoring
        - alerts
        - notifications
        - phase5
  when: enable_alerts | bool
  tags:
    - cybervision
    - monitoring
    - alerts
    - notifications
    - phase5

# ============================================================
# Cisco ISE pxGrid Integration
# Publishes OT asset context for TrustSec segmentation
# ============================================================
- name: PHASE 5 - Cisco ISE pxGrid integration
  ansible.builtin.include_tasks:
    file: ise_integration.yml
    apply:
      tags:
        - cybervision
        - monitoring
        - ise
        - pxgrid
        - segmentation
        - phase5
  when: enable_ise_integration | bool
  tags:
    - cybervision
    - monitoring
    - ise
    - pxgrid
    - segmentation
    - phase5

# ============================================================
# Health Monitoring
# Center and sensor health metrics
# ============================================================
- name: PHASE 5 - Health monitoring
  ansible.builtin.include_tasks:
    file: health_monitoring.yml
    apply:
      tags:
        - cybervision
        - monitoring
        - health
        - phase5
  when: enable_health_monitoring | bool
  tags:
    - cybervision
    - monitoring
    - health
    - phase5

# ============================================================
# Post-Configuration Validation
# ============================================================
- name: PHASE 5 - Monitoring validation
  ansible.builtin.include_tasks:
    file: validation.yml
    apply:
      tags:
        - cybervision
        - monitoring
        - validation
        - phase5
  tags:
    - cybervision
    - monitoring
    - validation
    - phase5
