---
# tasks file for aci_network_config - Prerequisites and Validation
# Validates connectivity, required variables, and creates artifact directory

- name: PHASE 3 - Display aci_network_config role banner
  ansible.builtin.debug:
    msg:
      - "================================================================"
      - " Cisco ACI Network Configuration - Fourth Estate"
      - "================================================================"
      - " Role:            aci_network_config"
      - " APIC Host:       {{ aci_host }}"
      - " Apply Changes:   {{ apply_changes }}"
      - " Artifacts:       {{ artifacts_dir }}"
      - " Enable L3Out:    {{ enable_l3out }}"
      - " Enable L2Out:    {{ enable_l2out }}"
      - " Enable ExtEPGs:  {{ enable_external_epgs }}"
      - " Enable Routes:   {{ enable_static_routes }}"
      - " Enable BGP:      {{ enable_bgp_peers }}"
      - " Enable OSPF:     {{ enable_ospf_peers }}"
      - " Compliance:      {{ compliance_frameworks | join(', ') }}"
      - "================================================================"
      - " {{ 'DRY RUN MODE - No changes will be applied' if not (apply_changes | bool) else 'LIVE MODE - Changes WILL be applied' }}"
      - "================================================================"
  tags:
    - always
    - prerequisites

- name: PHASE 3 - Validate required APIC connection variables are defined
  ansible.builtin.assert:
    that:
      - aci_host is defined
      - aci_host | length > 0
      - aci_username is defined
      - aci_username | length > 0
      - aci_password is defined
      - aci_password | length > 0
    fail_msg: "Required APIC connection parameters (aci_host, aci_username, aci_password) must be defined"
    quiet: true
  tags:
    - always
    - prerequisites
    - validation

- name: PHASE 3 - Validate L3Out configuration variables when enabled
  ansible.builtin.assert:
    that:
      - aci_l3outs is defined
      - aci_l3outs | length > 0
    fail_msg: "aci_l3outs must be defined and non-empty when enable_l3out is true"
    quiet: true
  when: enable_l3out | bool
  tags:
    - always
    - prerequisites
    - validation

- name: PHASE 3 - Validate L2Out configuration variables when enabled
  ansible.builtin.assert:
    that:
      - aci_l2outs is defined
      - aci_l2outs | length > 0
    fail_msg: "aci_l2outs must be defined and non-empty when enable_l2out is true"
    quiet: true
  when: enable_l2out | bool
  tags:
    - always
    - prerequisites
    - validation

- name: PHASE 3 - Validate static route configuration variables when enabled
  ansible.builtin.assert:
    that:
      - aci_static_routes is defined
      - aci_static_routes | length > 0
    fail_msg: "aci_static_routes must be defined and non-empty when enable_static_routes is true"
    quiet: true
  when: enable_static_routes | bool
  tags:
    - always
    - prerequisites
    - validation

- name: PHASE 3 - Test APIC connectivity
  cisco.aci.aci_rest:
    host: "{{ aci_host }}"
    username: "{{ aci_username }}"
    password: "{{ aci_password }}"
    validate_certs: "{{ aci_verify_ssl }}"
    use_proxy: "{{ aci_use_proxy }}"
    path: /api/mo/uni.json
    method: get
  no_log: true
  register: aci_connectivity_check
  failed_when: false
  tags:
    - always
    - prerequisites
    - validation

- name: PHASE 3 - Assert APIC is reachable
  ansible.builtin.assert:
    that:
      - aci_connectivity_check is defined
      - aci_connectivity_check.status is defined
      - aci_connectivity_check.status == 200
    fail_msg: "Unable to reach APIC at {{ aci_host }} - check connectivity and credentials"
    quiet: true
  tags:
    - always
    - prerequisites
    - validation

- name: PHASE 3 - Create artifacts directory
  ansible.builtin.file:
    path: "{{ artifacts_dir }}"
    state: directory
    mode: "0750"
  tags:
    - always
    - prerequisites

- name: PHASE 3 - Record role start time
  ansible.builtin.set_fact:
    aci_network_config_start_time: "{{ ansible_date_time.iso8601 }}"
    aci_network_config_epoch: "{{ ansible_date_time.epoch }}"
  tags:
    - always
    - prerequisites

- name: PHASE 3 - Save deployment metadata artifact
  ansible.builtin.copy:
    dest: "{{ artifacts_dir }}/aci_network_config_metadata.json"
    mode: "0640"
    content: "{{ deployment_metadata | to_nice_json }}"
  vars:
    deployment_metadata:
      role: "aci_network_config"
      timestamp: "{{ aci_network_config_start_time }}"
      apic_host: "{{ aci_host }}"
      apply_changes: "{{ apply_changes | bool }}"
      features:
        enable_l3out: "{{ enable_l3out | bool }}"
        enable_l2out: "{{ enable_l2out | bool }}"
        enable_external_epgs: "{{ enable_external_epgs | bool }}"
        enable_static_routes: "{{ enable_static_routes | bool }}"
        enable_bgp_peers: "{{ enable_bgp_peers | bool }}"
        enable_ospf_peers: "{{ enable_ospf_peers | bool }}"
      l3out_count: "{{ aci_l3outs | length }}"
      l2out_count: "{{ aci_l2outs | length }}"
      static_route_count: "{{ aci_static_routes | length }}"
      compliance_frameworks: "{{ compliance_frameworks }}"
      fourth_estate_org: "{{ fourth_estate_org }}"
      fourth_estate_environment: "{{ fourth_estate_environment }}"
  tags:
    - always
    - prerequisites
