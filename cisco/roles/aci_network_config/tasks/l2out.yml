---
# tasks file for aci_network_config - L2Out Configuration
# Configures L2Out bridged external connectivity and external EPGs

- name: PHASE 3 - Create L2Out bridged connectivity objects
  cisco.aci.aci_l2out:
    host: "{{ aci_host }}"
    username: "{{ aci_username }}"
    password: "{{ aci_password }}"
    validate_certs: "{{ aci_verify_ssl }}"
    use_proxy: "{{ aci_use_proxy }}"
    tenant: "{{ item.tenant }}"
    l2out: "{{ item.name }}"
    domain: "{{ item.domain }}"
    description: "{{ item.description | default('') }}"
    state: "{{ 'present' if apply_changes | bool else 'query' }}"
  no_log: true
  changed_when: not (apply_changes | bool)
  loop: "{{ aci_l2outs }}"
  loop_control:
    label: "{{ item.tenant }}/{{ item.name }}"
  register: l2out_results
  tags:
    - aci
    - network
    - l2out
    - phase3

- name: PHASE 3 - Create L2Out node profile
  cisco.aci.aci_rest:
    host: "{{ aci_host }}"
    username: "{{ aci_username }}"
    password: "{{ aci_password }}"
    validate_certs: "{{ aci_verify_ssl }}"
    use_proxy: "{{ aci_use_proxy }}"
    path: "/api/mo/uni/tn-{{ item.tenant }}/l2out-{{ item.name }}/lnodep-NodeProfile-{{ item.name }}.json"
    method: "{{ 'post' if apply_changes | bool else 'get' }}"
    content:
      l2extLNodeP:
        attributes:
          dn: "uni/tn-{{ item.tenant }}/l2out-{{ item.name }}/lnodep-NodeProfile-{{ item.name }}"
          name: "NodeProfile-{{ item.name }}"
          descr: "Node profile for L2Out {{ item.name }}"
        children:
          - l2extLIfP:
              attributes:
                name: "IntProfile-{{ item.name }}"
                descr: "Interface profile for L2Out {{ item.name }}"
  no_log: true
  loop: "{{ aci_l2outs }}"
  loop_control:
    label: "{{ item.tenant }}/{{ item.name }}"
  register: l2out_node_profile_results
  tags:
    - aci
    - network
    - l2out
    - phase3

- name: PHASE 3 - Configure L2Out paths
  cisco.aci.aci_rest:
    host: "{{ aci_host }}"
    username: "{{ aci_username }}"
    password: "{{ aci_password }}"
    validate_certs: "{{ aci_verify_ssl }}"
    use_proxy: "{{ aci_use_proxy }}"
    path: "/api/mo/uni/tn-{{ item.0.tenant }}/l2out-{{ item.0.name }}/lnodep-NodeProfile-{{ item.0.name }}/lifp-IntProfile-{{ item.0.name }}/rspathL2OutAtt-[{{ item.1.path_dn }}].json"
    method: "{{ 'post' if apply_changes | bool else 'get' }}"
    content:
      l2extRsPathL2OutAtt:
        attributes:
          dn: "uni/tn-{{ item.0.tenant }}/l2out-{{ item.0.name }}/lnodep-NodeProfile-{{ item.0.name }}/lifp-IntProfile-{{ item.0.name }}/rspathL2OutAtt-[{{ item.1.path_dn }}]"
          tnPathEPDn: "{{ item.1.path_dn }}"
          encap: "{{ item.1.encap }}"
  no_log: true
  loop: "{{ aci_l2outs | subelements('paths') }}"
  loop_control:
    label: "{{ item.0.tenant }}/{{ item.0.name }} path {{ item.1.path_dn }}"
  register: l2out_path_results
  tags:
    - aci
    - network
    - l2out
    - phase3

- name: PHASE 3 - Create L2Out external EPGs
  cisco.aci.aci_l2out_extepg:
    host: "{{ aci_host }}"
    username: "{{ aci_username }}"
    password: "{{ aci_password }}"
    validate_certs: "{{ aci_verify_ssl }}"
    use_proxy: "{{ aci_use_proxy }}"
    tenant: "{{ item.0.tenant }}"
    l2out: "{{ item.0.name }}"
    extepg: "{{ item.1.name }}"
    description: "{{ item.1.description | default('') }}"
    state: "{{ 'present' if apply_changes | bool else 'query' }}"
  no_log: true
  changed_when: not (apply_changes | bool)
  loop: "{{ aci_l2outs | subelements('external_epgs') }}"
  loop_control:
    label: "{{ item.0.tenant }}/{{ item.0.name }}/{{ item.1.name }}"
  register: l2out_extepg_results
  tags:
    - aci
    - network
    - l2out
    - phase3

- name: PHASE 3 - Save L2Out configuration artifact
  ansible.builtin.copy:
    dest: "{{ artifacts_dir }}/aci_l2out_config.json"
    mode: "0640"
    content: "{{ l2out_artifact | to_nice_json }}"
  vars:
    l2out_artifact:
      timestamp: "{{ ansible_date_time.iso8601 }}"
      apic_host: "{{ aci_host }}"
      apply_changes: "{{ apply_changes | bool }}"
      l2outs_configured: "{{ aci_l2outs | map(attribute='name') | list }}"
      l2out_count: "{{ aci_l2outs | length }}"
      external_epg_count: "{{ aci_l2outs | map(attribute='external_epgs') | map('length') | sum }}"
      compliance_frameworks: "{{ compliance_frameworks }}"
  tags:
    - aci
    - network
    - l2out
    - phase3
