---
# tasks file for cybervision_asset_management - Asset discovery configuration
# Configures passive and (optionally) active discovery settings

- name: PHASE 3 - Query current discovery settings
  ansible.builtin.uri:
    url: "{{ cv_api_url }}/system/discovery"
    method: GET
    headers:
      Authorization: "Bearer {{ cv_api_token }}"
      Accept: "application/json"
    validate_certs: "{{ cv_validate_certs }}"
    timeout: "{{ cv_timeout }}"
    status_code: 200
  register: cv_discovery_settings
  failed_when: false

- name: PHASE 3 - Configure asset discovery settings
  ansible.builtin.uri:
    url: "{{ cv_api_url }}/system/discovery"
    method: PUT
    headers:
      Authorization: "Bearer {{ cv_api_token }}"
      Content-Type: "application/json"
      Accept: "application/json"
    body_format: json
    body:
      passive_discovery: "{{ cv_discovery_passive }}"
      active_discovery: "{{ cv_discovery_active }}"
      active_rate: "{{ cv_active_discovery_rate }}"
      active_protocols: "{{ cv_discovery_protocols }}"
    validate_certs: "{{ cv_validate_certs }}"
    timeout: "{{ cv_timeout }}"
    status_code: [200, 204]
  register: cv_discovery_result
  when: apply_changes | bool

- name: PHASE 3 - Display discovery plan (dry-run)
  ansible.builtin.debug:
    msg:
      - "DRY RUN — would configure discovery:"
      - "  Passive: {{ cv_discovery_passive }}"
      - "  Active:  {{ cv_discovery_active }} (rate: {{ cv_active_discovery_rate }})"
      - "  Active protocols: {{ cv_discovery_protocols | join(', ') }}"
  when: not apply_changes | bool

- name: PHASE 3 - Export full asset inventory
  ansible.builtin.uri:
    url: "{{ cv_api_url }}/devices?page=1&size=1000"
    method: GET
    headers:
      Authorization: "Bearer {{ cv_api_token }}"
      Accept: "application/json"
    validate_certs: "{{ cv_validate_certs }}"
    timeout: "{{ cv_timeout }}"
    status_code: 200
  register: cv_asset_inventory
  failed_when: false

- name: Save asset inventory artifact
  ansible.builtin.copy:
    content: "{{ inventory_artifact | to_nice_json }}"
    dest: "{{ artifacts_dir }}/cv_asset_inventory.json"
    mode: '0640'
  vars:
    inventory_artifact:
      timestamp: "{{ ansible_date_time.iso8601 }}"
      center_host: "{{ cv_center_host }}"
      total_assets: "{{ cv_asset_inventory.json.total | default(0) }}"
      assets: "{{ cv_asset_inventory.json.items | default([]) }}"
