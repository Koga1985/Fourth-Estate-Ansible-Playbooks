---
# handlers file for cybervision_center_deploy

- name: notify center deploy complete
  ansible.builtin.debug:
    msg:
      - "================================================================"
      - " Cyber Vision Center Deployment Complete - Fourth Estate"
      - "================================================================"
      - " Center Host:   {{ cv_center_host }}"
      - " Mode:          {{ 'CHANGES APPLIED' if apply_changes | bool else 'DRY RUN ONLY' }}"
      - " Timestamp:     {{ ansible_date_time.iso8601 }}"
      - " Artifacts:     {{ artifacts_dir }}"
      - "----------------------------------------------------------------"
      - " Phases:"
      - "   Initial Setup:   {{ enable_initial_setup | bool }}"
      - "   Network Config:  {{ enable_network_config | bool }}"
      - "   License:         {{ enable_license_activation | bool }}"
      - "   User Management: {{ enable_user_management | bool }}"
      - "================================================================"

- name: restart cybervision services
  ansible.builtin.uri:
    url: "{{ cv_api_url }}/system/restart"
    method: POST
    headers:
      Authorization: "Bearer {{ cv_api_token }}"
      Content-Type: "application/json"
      Accept: "application/json"
    validate_certs: "{{ cv_validate_certs }}"
    timeout: "{{ cv_timeout }}"
    status_code: [200, 202, 204]
  register: cv_restart_result
  failed_when: false
  when: apply_changes | bool
