---
# tasks file for cybervision_center_deploy - Network configuration
# Configures management interface, DNS, and NTP

- name: PHASE 1 - Query current network settings
  ansible.builtin.uri:
    url: "{{ cv_api_url }}/system/network"
    method: GET
    headers:
      Authorization: "Bearer {{ cv_api_token }}"
      Accept: "application/json"
    validate_certs: "{{ cv_validate_certs }}"
    timeout: "{{ cv_timeout }}"
    status_code: 200
  register: cv_current_network
  failed_when: false

- name: PHASE 1 - Configure DNS servers
  ansible.builtin.uri:
    url: "{{ cv_api_url }}/system/network/dns"
    method: PUT
    headers:
      Authorization: "Bearer {{ cv_api_token }}"
      Content-Type: "application/json"
      Accept: "application/json"
    body_format: json
    body:
      servers: "{{ cv_dns_servers }}"
      search_domains:
        - "{{ cv_domain_name }}"
    validate_certs: "{{ cv_validate_certs }}"
    timeout: "{{ cv_timeout }}"
    status_code: [200, 204]
  register: cv_dns_result
  when: apply_changes | bool

- name: PHASE 1 - Configure NTP servers
  ansible.builtin.uri:
    url: "{{ cv_api_url }}/system/network/ntp"
    method: PUT
    headers:
      Authorization: "Bearer {{ cv_api_token }}"
      Content-Type: "application/json"
      Accept: "application/json"
    body_format: json
    body:
      servers: "{{ cv_ntp_servers }}"
    validate_certs: "{{ cv_validate_certs }}"
    timeout: "{{ cv_timeout }}"
    status_code: [200, 204]
  register: cv_ntp_result
  when: apply_changes | bool

- name: PHASE 1 - Display planned network config (dry-run)
  ansible.builtin.debug:
    msg:
      - "DRY RUN — would configure:"
      - "  DNS servers:    {{ cv_dns_servers | join(', ') }}"
      - "  NTP servers:    {{ cv_ntp_servers | map(attribute='server') | join(', ') }}"
      - "  Domain:         {{ cv_domain_name }}"
  when: not apply_changes | bool

- name: Save network config artifact
  ansible.builtin.copy:
    content: "{{ network_artifact | to_nice_json }}"
    dest: "{{ artifacts_dir }}/cv_network_config.json"
    mode: '0640'
  vars:
    network_artifact:
      timestamp: "{{ ansible_date_time.iso8601 }}"
      center_host: "{{ cv_center_host }}"
      mode: "{{ 'applied' if apply_changes | bool else 'dry_run' }}"
      dns_servers: "{{ cv_dns_servers }}"
      ntp_servers: "{{ cv_ntp_servers }}"
      domain: "{{ cv_domain_name }}"
