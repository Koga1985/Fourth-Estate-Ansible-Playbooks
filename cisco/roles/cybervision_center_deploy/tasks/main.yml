---
# tasks file for cybervision_center_deploy
# Cisco Cyber Vision Center - initial deployment and base configuration

# ============================================================
# Prerequisites and Validation (always runs)
# ============================================================
- name: PHASE 1 - Run prerequisites and validation
  ansible.builtin.include_tasks:
    file: prerequisites.yml
    apply:
      tags:
        - always
        - prerequisites
        - validation
  tags:
    - always
    - prerequisites
    - validation

# ============================================================
# Initial System Setup
# Center name, timezone, language
# ============================================================
- name: PHASE 1 - Initial system setup
  ansible.builtin.include_tasks:
    file: initial_setup.yml
    apply:
      tags:
        - cybervision
        - center
        - setup
        - phase1
  when: enable_initial_setup | bool
  tags:
    - cybervision
    - center
    - setup
    - phase1

# ============================================================
# Network Configuration
# DNS, NTP, management interface
# ============================================================
- name: PHASE 1 - Network configuration (DNS, NTP)
  ansible.builtin.include_tasks:
    file: network_config.yml
    apply:
      tags:
        - cybervision
        - center
        - network
        - dns
        - ntp
        - phase1
  when: enable_network_config | bool
  tags:
    - cybervision
    - center
    - network
    - dns
    - ntp
    - phase1

# ============================================================
# License Activation
# ============================================================
- name: PHASE 1 - License activation
  ansible.builtin.include_tasks:
    file: license_activation.yml
    apply:
      tags:
        - cybervision
        - center
        - license
        - phase1
  when: enable_license_activation | bool
  tags:
    - cybervision
    - center
    - license
    - phase1

# ============================================================
# Local User Management
# Admin and break-glass accounts only — operational users via LDAP
# ============================================================
- name: PHASE 1 - Local user management
  ansible.builtin.include_tasks:
    file: user_management.yml
    apply:
      tags:
        - cybervision
        - center
        - users
        - phase1
  when: enable_user_management | bool
  tags:
    - cybervision
    - center
    - users
    - phase1

# ============================================================
# Post-Deployment Validation
# ============================================================
- name: PHASE 1 - Post-deployment validation
  ansible.builtin.include_tasks:
    file: validation.yml
    apply:
      tags:
        - cybervision
        - center
        - validation
        - phase1
  tags:
    - cybervision
    - center
    - validation
    - phase1
