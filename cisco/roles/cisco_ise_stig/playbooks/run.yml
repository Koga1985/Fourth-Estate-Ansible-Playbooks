---
# Grab-and-go entry point for the Cisco ISE NDM STIG role.
# Assess (default): ansible-playbook -i inventory.example run.yml
# Enforce:          ansible-playbook -i inventory.example run.yml -e apply_changes=true -e @vars.example.yml
- name: Assess / enforce Cisco ISE NDM STIG
  hosts: ise
  gather_facts: true
  any_errors_fatal: true
  roles:
    - role: cisco_ise_stig
