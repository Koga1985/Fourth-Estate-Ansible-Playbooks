---
galaxy_info:
  role_name: sdwan_vedge_onboard
  author: "Fourth Estate Infrastructure Team"
  description: >
    Cisco SD-WAN vEdge/cEdge Device Onboarding.
    Registers devices in vManage inventory, generates bootstrap configurations,
    and attaches DoD-compliant device templates to edge devices.
  company: "Fourth Estate"
  license: MIT
  min_ansible_version: "2.15"

  platforms:
    - name: EL
      versions:
        - "8"
        - "9"

  galaxy_tags:
    - cisco
    - sdwan
    - vedge
    - cedge
    - onboarding
    - fourth_estate

dependencies: []

collections:
  - ansible.builtin
  - ansible.utils
