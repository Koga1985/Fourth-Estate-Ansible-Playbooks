---
# tasks file for sdwan_vedge_onboard
# Cisco SD-WAN vEdge / cEdge Device Onboarding

# ============================================================
# Prerequisites and Validation (always runs)
# ============================================================
- name: Include prerequisites validation
  ansible.builtin.include_tasks:
    file: prerequisites.yml
    apply:
      tags:
        - always
        - prerequisites
  tags:
    - always
    - prerequisites

# ============================================================
# Phase 18 - Device Inventory Registration
# Register devices in vManage inventory before onboarding
# ============================================================
- name: PHASE 18 - Register devices in vManage inventory
  ansible.builtin.include_tasks:
    file: device_inventory.yml
    apply:
      tags:
        - sdwan
        - vedge
        - inventory
        - phase18
  when: enable_device_inventory | bool
  tags:
    - sdwan
    - vedge
    - inventory
    - phase18

# ============================================================
# Phase 18 - Bootstrap Configuration Generation
# Create Day-0 bootstrap configs for each edge device
# ============================================================
- name: PHASE 18 - Generate bootstrap configurations
  ansible.builtin.include_tasks:
    file: bootstrap.yml
    apply:
      tags:
        - sdwan
        - vedge
        - bootstrap
        - phase18
  when: enable_bootstrap_config | bool
  tags:
    - sdwan
    - vedge
    - bootstrap
    - phase18

# ============================================================
# Phase 18 - Device Template Attachment
# Attach device templates and push variables to each device
# ============================================================
- name: PHASE 18 - Attach device templates
  ansible.builtin.include_tasks:
    file: attach_template.yml
    apply:
      tags:
        - sdwan
        - vedge
        - templates
        - attach
        - phase18
  when: enable_template_attach | bool
  tags:
    - sdwan
    - vedge
    - templates
    - attach
    - phase18

# ============================================================
# Phase 18 - Device Validation
# Verify devices are connected and operational
# ============================================================
- name: PHASE 18 - Validate edge device onboarding
  ansible.builtin.include_tasks:
    file: validation.yml
    apply:
      tags:
        - sdwan
        - vedge
        - validation
        - phase18
  when: enable_device_validation | bool
  tags:
    - sdwan
    - vedge
    - validation
    - phase18
