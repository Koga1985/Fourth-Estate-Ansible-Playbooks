---
# tasks file: validation.yml for sdwan_vedge_onboard

- name: Check edge device sync status in vManage
  ansible.builtin.uri:
    url: "https://{{ sdwan_vmanage_host }}:{{ sdwan_vmanage_port }}/dataservice/system/device/vedges"
    method: GET
    headers:
      Cookie: "{{ sdwan_session_cookie }}"
      X-XSRF-TOKEN: "{{ sdwan_csrf_token }}"
    validate_certs: "{{ sdwan_vmanage_verify_ssl }}"
    timeout: "{{ sdwan_vmanage_timeout }}"
  register: sdwan_val_vedges
  check_mode: false
  tags: [sdwan, vedge, validation, phase18]

- name: Display edge device validation summary
  ansible.builtin.debug:
    msg:
      - "════════════════════════════════════════════════════════════════"
      - " SD-WAN Edge Device Onboarding - Validation"
      - "════════════════════════════════════════════════════════════════"
      - " Total registered devices: {{ sdwan_val_vedges.json.data | length | default(0) }}"
      - " Mode: {{ apply_changes | ternary('CHANGES APPLIED', 'DRY RUN') }}"
      - " Next: Run 06_sdwan_phase5_security_hardening.yml"
      - "════════════════════════════════════════════════════════════════"
  tags: [sdwan, vedge, validation, phase18]
