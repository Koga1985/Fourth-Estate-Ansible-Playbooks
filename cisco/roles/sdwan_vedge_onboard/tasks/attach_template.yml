---
# tasks file: attach_template.yml for sdwan_vedge_onboard
# Attach device templates to edge devices and push configuration

- name: Query device template IDs
  ansible.builtin.uri:
    url: "https://{{ sdwan_vmanage_host }}:{{ sdwan_vmanage_port }}/dataservice/template/device"
    method: GET
    headers:
      Cookie: "{{ sdwan_session_cookie }}"
      X-XSRF-TOKEN: "{{ sdwan_csrf_token }}"
    validate_certs: "{{ sdwan_vmanage_verify_ssl }}"
    timeout: "{{ sdwan_vmanage_timeout }}"
  register: sdwan_template_list
  check_mode: false
  tags: [sdwan, vedge, templates, attach, phase18]

- name: Display template attachment status
  ansible.builtin.debug:
    msg:
      - "Template attachment:"
      - "  Available templates: {{ sdwan_template_list.json.data | length | default(0) }}"
      - "  Devices to attach: {{ sdwan_edge_devices | length }}"
      - "  Status: {{ apply_changes | ternary('WILL APPLY', 'CHECK ONLY') }}"
      - "  Note: Template attachment requires device UUIDs and variable values."
      - "        Verify sdwan_edge_devices[].variables match your template input fields."
  tags: [sdwan, vedge, templates, attach, phase18]
