---
# handlers file for sdwan_vedge_onboard

- name: notify vedge onboard complete
  ansible.builtin.debug:
    msg:
      - "════════════════════════════════════════════════════════════════"
      - " SD-WAN Edge Device Onboarding Complete - Fourth Estate"
      - "════════════════════════════════════════════════════════════════"
      - " Devices onboarded: {{ sdwan_edge_devices | length }}"
      - " Mode: {{ apply_changes | ternary('CHANGES APPLIED', 'DRY RUN ONLY') }}"
      - " Next: Run 06_sdwan_phase5_security_hardening.yml"
      - "════════════════════════════════════════════════════════════════"
