---
# defaults file for sdwan_vedge_onboard
# Cisco SD-WAN vEdge / cEdge Device Onboarding
# Onboards edge routers to the SD-WAN fabric via vManage
# Last Updated: 2026-04-08

# ============================================================
# vManage Connection Parameters
# ============================================================
sdwan_vmanage_host: "{{ vault_sdwan_vmanage_host }}"
sdwan_vmanage_port: 443
sdwan_vmanage_username: "{{ vault_sdwan_vmanage_username }}"
sdwan_vmanage_password: "{{ vault_sdwan_vmanage_password }}"
sdwan_vmanage_verify_ssl: true
sdwan_vmanage_timeout: 30

# ============================================================
# Deployment Control
# ============================================================
apply_changes: false
sdwan_artifacts_dir: "/tmp/sdwan-artifacts"

# ============================================================
# Fourth Estate Organization
# ============================================================
fourth_estate_org: "FourthEstate"
fourth_estate_contact: "{{ vault_fourth_estate_contact }}"
fourth_estate_environment: "production"
fourth_estate_region: "primary"

# ============================================================
# Feature Toggles
# ============================================================
enable_device_inventory: true
enable_bootstrap_config: true
enable_template_attach: true
enable_device_validation: true

# ============================================================
# Edge Device Inventory
# List of vEdge/cEdge devices to onboard
# ============================================================
sdwan_edge_devices:
  - hostname: "branch-01-vedge"
    system_ip: "10.10.1.1"
    site_id: 100
    uuid: "{{ vault_sdwan_branch01_uuid }}"
    token: "{{ vault_sdwan_branch01_otp }}"
    device_type: "vedge-cloud"
    template: "FourthEstate-vEdge-Branch"
    variables:
      vpn0_interface: "ge0/0"
      vpn0_ip: "{{ vault_sdwan_branch01_wan_ip }}"
      vpn0_mask: "{{ vault_sdwan_branch01_wan_mask }}"
      vpn0_gateway: "{{ vault_sdwan_branch01_wan_gw }}"
      vpn512_interface: "eth0"
      vpn512_ip: "{{ vault_sdwan_branch01_mgmt_ip }}"
      vpn512_mask: "{{ vault_sdwan_branch01_mgmt_mask }}"
      vpn512_gateway: "{{ vault_sdwan_branch01_mgmt_gw }}"
      system_hostname: "branch-01-vedge"
      system_site_id: 100
      system_system_ip: "10.10.1.1"
  # Add additional devices following the same pattern

# ============================================================
# Bootstrap Configuration Settings
# ============================================================
sdwan_bootstrap_transport: "cloud-init"   # Options: cloud-init, bootp, ztp
sdwan_bootstrap_include_certs: true
sdwan_bootstrap_include_vbond: true
sdwan_bootstrap_include_templates: false  # Push templates via vManage instead

# ============================================================
# Compliance Frameworks
# ============================================================
compliance_frameworks:
  - "dod_stig"
  - "nist_800_53"
  - "nist_800_171"
  - "fisma_moderate"
  - "fisma_high"
