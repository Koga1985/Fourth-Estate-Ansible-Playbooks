---
# Example overrides for cisco_aci_router_stig (-e @vars.example.yml).
# Discover the exact DNs first:
#   GET https://<apic>/api/class/bgpPeerP.json
#   GET https://<apic>/api/class/ospfIfP.json
#   GET https://<apic>/api/class/l3extOut.json
apply_changes: false

aci_bgp_peers:
  - dn: "uni/tn-PROD/out-L3OUT1/lnodep-NODES/lifp-INT/peerP-[10.1.1.2]"
    addr: "10.1.1.2"
    password: "{{ vault_aci_bgp_md5_key }}"
    ttl: 2
    allowed_self_as_cnt: 1

aci_ospf_auth_interfaces:
  - dn: "uni/tn-PROD/out-L3OUT1/lnodep-NODES/lifp-INT/ospfIfP"
    auth_key: "{{ vault_aci_ospf_md5_key }}"
    auth_key_id: 1
    auth_type: md5

aci_l3outs_enforce_route_control:
  - dn: "uni/tn-PROD/out-L3OUT1"
    name: "L3OUT1"
    tenant: "PROD"
