---
# Grab-and-go entry point for the Cisco ACI Router STIG role.
#
# Dry-run (default): ansible-playbook -i inventory.example run.yml
# Enforce:           ansible-playbook -i inventory.example run.yml -e apply_changes=true -e @vars.example.yml
- name: Apply Cisco ACI Router (CISC-RT) STIG hardening
  hosts: apic
  connection: local
  gather_facts: true
  any_errors_fatal: true
  collections:
    - cisco.aci
  roles:
    - role: cisco_aci_router_stig
