---
galaxy_info:
  role_name: sdwan_controllers_config
  author: "Fourth Estate Infrastructure Team"
  description: >
    Cisco SD-WAN Controller Configuration.
    Configures vBond orchestrator and vSmart controller, issues certificates,
    and configures OMP route distribution and control policies.
  company: "Fourth Estate"
  license: MIT
  min_ansible_version: "2.15"

  platforms:
    - name: EL
      versions:
        - "8"
        - "9"

  galaxy_tags:
    - cisco
    - sdwan
    - vbond
    - vsmart
    - controllers
    - omp
    - fourth_estate

dependencies: []

collections:
  - ansible.builtin
  - ansible.utils
