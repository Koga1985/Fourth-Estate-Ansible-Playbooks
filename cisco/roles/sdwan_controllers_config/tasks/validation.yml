---
# tasks file: validation.yml for sdwan_controllers_config

- name: Verify controllers are registered in vManage
  ansible.builtin.uri:
    url: "https://{{ sdwan_vmanage_host }}:{{ sdwan_vmanage_port }}/dataservice/system/device/controllers"
    method: GET
    headers:
      Cookie: "{{ sdwan_session_cookie }}"
      X-XSRF-TOKEN: "{{ sdwan_csrf_token }}"
    validate_certs: "{{ sdwan_vmanage_verify_ssl }}"
    timeout: "{{ sdwan_vmanage_timeout }}"
  register: sdwan_val_controllers
  check_mode: false
  tags: [sdwan, controllers, validation, phase17]

- name: Display controller validation summary
  ansible.builtin.debug:
    msg:
      - "════════════════════════════════════════════════════════════════"
      - " SD-WAN Controller Configuration - Validation"
      - "════════════════════════════════════════════════════════════════"
      - " Controllers registered: {{ sdwan_val_controllers.json.data | length | default(0) }}"
      - " Mode: {{ apply_changes | ternary('CHANGES APPLIED', 'DRY RUN') }}"
      - " Next: Run 05_sdwan_phase4_edge_onboard.yml"
      - "════════════════════════════════════════════════════════════════"
  tags: [sdwan, controllers, validation, phase17]
