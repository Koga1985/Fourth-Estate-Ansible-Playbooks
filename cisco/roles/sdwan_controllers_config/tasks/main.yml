---
# tasks file for sdwan_controllers_config
# Cisco SD-WAN Controller Configuration (vBond and vSmart)

# ============================================================
# Prerequisites and Validation (always runs)
# ============================================================
- name: Include prerequisites validation
  ansible.builtin.include_tasks:
    file: prerequisites.yml
    apply:
      tags:
        - always
        - prerequisites
  tags:
    - always
    - prerequisites

# ============================================================
# Phase 17 - vBond Orchestrator Configuration
# ============================================================
- name: PHASE 17 - Configure vBond orchestrator
  ansible.builtin.include_tasks:
    file: vbond.yml
    apply:
      tags:
        - sdwan
        - controllers
        - vbond
        - phase17
  when: enable_vbond_config | bool
  tags:
    - sdwan
    - controllers
    - vbond
    - phase17

# ============================================================
# Phase 17 - vSmart Controller Configuration
# ============================================================
- name: PHASE 17 - Configure vSmart controller
  ansible.builtin.include_tasks:
    file: vsmart.yml
    apply:
      tags:
        - sdwan
        - controllers
        - vsmart
        - phase17
  when: enable_vsmart_config | bool
  tags:
    - sdwan
    - controllers
    - vsmart
    - phase17

# ============================================================
# Phase 17 - Controller Certificates
# NIST SC-17, IA-3 | Device identity certificates
# ============================================================
- name: PHASE 17 - Issue controller certificates
  ansible.builtin.include_tasks:
    file: controller_certificates.yml
    apply:
      tags:
        - sdwan
        - controllers
        - certificates
        - pki
        - phase17
  when: enable_controller_certificates | bool
  tags:
    - sdwan
    - controllers
    - certificates
    - pki
    - phase17

# ============================================================
# Phase 17 - OMP Configuration
# ============================================================
- name: PHASE 17 - Configure OMP route distribution
  ansible.builtin.include_tasks:
    file: omp_config.yml
    apply:
      tags:
        - sdwan
        - controllers
        - omp
        - routing
        - phase17
  when: enable_omp_config | bool
  tags:
    - sdwan
    - controllers
    - omp
    - routing
    - phase17

# ============================================================
# Phase 17 - Control Policies
# ============================================================
- name: PHASE 17 - Apply vSmart control policies
  ansible.builtin.include_tasks:
    file: control_policies.yml
    apply:
      tags:
        - sdwan
        - controllers
        - policies
        - phase17
  when: enable_control_policies | bool
  tags:
    - sdwan
    - controllers
    - policies
    - phase17

# ============================================================
# Phase 17 - Validation
# ============================================================
- name: PHASE 17 - Validate controller configuration
  ansible.builtin.include_tasks:
    file: validation.yml
    apply:
      tags:
        - sdwan
        - controllers
        - validation
        - phase17
  tags:
    - sdwan
    - controllers
    - validation
    - phase17
