---
# tasks file: control_policies.yml for sdwan_controllers_config
# Configure vSmart control policies for topology enforcement

- name: Query existing control policies
  ansible.builtin.uri:
    url: "https://{{ sdwan_vmanage_host }}:{{ sdwan_vmanage_port }}/dataservice/template/policy/vsmart"
    method: GET
    headers:
      Cookie: "{{ sdwan_session_cookie }}"
      X-XSRF-TOKEN: "{{ sdwan_csrf_token }}"
    validate_certs: "{{ sdwan_vmanage_verify_ssl }}"
    timeout: "{{ sdwan_vmanage_timeout }}"
  register: sdwan_control_policies_result
  check_mode: false
  tags: [sdwan, controllers, policies, phase17]

- name: Display control policy status
  ansible.builtin.debug:
    msg:
      - "Control policies:"
      - "  Existing: {{ sdwan_control_policies_result.json.data | length | default(0) }}"
      - "  To configure: {{ sdwan_control_policies | length }}"
      - "  Status: {{ apply_changes | ternary('WILL APPLY', 'CHECK ONLY') }}"
  tags: [sdwan, controllers, policies, phase17]
