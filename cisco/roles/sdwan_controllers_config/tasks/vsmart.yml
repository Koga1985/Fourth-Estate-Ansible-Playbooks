---
# tasks file: vsmart.yml for sdwan_controllers_config
# Configure vSmart controller via vManage API

- name: Add vSmart controller to vManage
  ansible.builtin.uri:
    url: "https://{{ sdwan_vmanage_host }}:{{ sdwan_vmanage_port }}/dataservice/system/device/controllers"
    method: POST
    headers:
      Cookie: "{{ sdwan_session_cookie }}"
      X-XSRF-TOKEN: "{{ sdwan_csrf_token }}"
      Content-Type: "application/json"
    body_format: json
    body:
      deviceIP: "{{ sdwan_vsmart_system_ip }}"
      username: "{{ sdwan_vsmart_username }}"
      password: "{{ sdwan_vsmart_password }}"
      generateCSR: true
      personality: "vsmart"
    validate_certs: "{{ sdwan_vmanage_verify_ssl }}"
    timeout: "{{ sdwan_vmanage_timeout }}"
    status_code: [200, 201, 409]
  when: apply_changes | bool
  no_log: true
  register: sdwan_vsmart_add_result
  tags: [sdwan, controllers, vsmart, phase17]

- name: Display vSmart configuration status
  ansible.builtin.debug:
    msg:
      - "vSmart configuration:"
      - "  vSmart host: {{ sdwan_vsmart_host }}"
      - "  System IP: {{ sdwan_vsmart_system_ip }}"
      - "  Site ID: {{ sdwan_vsmart_site_id }}"
      - "  Status: {{ apply_changes | ternary('APPLIED', 'CHECK ONLY') }}"
  tags: [sdwan, controllers, vsmart, phase17]
