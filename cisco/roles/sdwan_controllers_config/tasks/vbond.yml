---
# tasks file: vbond.yml for sdwan_controllers_config
# Configure vBond orchestrator settings via vManage API

- name: Add vBond controller to vManage
  ansible.builtin.uri:
    url: "https://{{ sdwan_vmanage_host }}:{{ sdwan_vmanage_port }}/dataservice/system/device/controllers"
    method: POST
    headers:
      Cookie: "{{ sdwan_session_cookie }}"
      X-XSRF-TOKEN: "{{ sdwan_csrf_token }}"
      Content-Type: "application/json"
    body_format: json
    body:
      deviceIP: "{{ sdwan_vbond_system_ip }}"
      username: "{{ sdwan_vmanage_username }}"
      password: "{{ sdwan_vmanage_password }}"
      generateCSR: true
      personality: "vbond"
    validate_certs: "{{ sdwan_vmanage_verify_ssl }}"
    timeout: "{{ sdwan_vmanage_timeout }}"
    status_code: [200, 201, 409]
  when: apply_changes | bool
  no_log: true
  register: sdwan_vbond_add_result
  tags: [sdwan, controllers, vbond, phase17]

- name: Display vBond configuration status
  ansible.builtin.debug:
    msg:
      - "vBond configuration:"
      - "  vBond host: {{ sdwan_vbond_host }}"
      - "  System IP: {{ sdwan_vbond_system_ip }}"
      - "  Site ID: {{ sdwan_vbond_site_id }}"
      - "  Status: {{ apply_changes | ternary('APPLIED', 'CHECK ONLY') }}"
  tags: [sdwan, controllers, vbond, phase17]
