---
# tasks file: omp_config.yml for sdwan_controllers_config
# Configure OMP (Overlay Management Protocol) on vSmart

- name: Configure OMP settings on vSmart via vManage
  ansible.builtin.uri:
    url: "https://{{ sdwan_vmanage_host }}:{{ sdwan_vmanage_port }}/dataservice/template/feature"
    method: GET
    headers:
      Cookie: "{{ sdwan_session_cookie }}"
      X-XSRF-TOKEN: "{{ sdwan_csrf_token }}"
    validate_certs: "{{ sdwan_vmanage_verify_ssl }}"
    timeout: "{{ sdwan_vmanage_timeout }}"
  register: sdwan_omp_templates
  check_mode: false
  tags: [sdwan, controllers, omp, routing, phase17]

- name: Display OMP configuration status
  ansible.builtin.debug:
    msg:
      - "OMP configuration:"
      - "  Send path limit: {{ sdwan_omp_config.send_path_limit }}"
      - "  ECMP limit: {{ sdwan_omp_config.ecmp_limit }}"
      - "  Graceful restart: {{ sdwan_omp_config.graceful_restart }}"
      - "  Graceful restart timer: {{ sdwan_omp_config.graceful_restart_timer }}s"
      - "  Status: {{ apply_changes | ternary('WILL APPLY', 'CHECK ONLY') }}"
  tags: [sdwan, controllers, omp, routing, phase17]
