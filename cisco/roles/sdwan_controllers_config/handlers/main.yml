---
# handlers file for sdwan_controllers_config

- name: notify controllers config complete
  ansible.builtin.debug:
    msg:
      - "════════════════════════════════════════════════════════════════"
      - " SD-WAN Controllers Configuration Complete - Fourth Estate"
      - "════════════════════════════════════════════════════════════════"
      - " vBond: {{ sdwan_vbond_host }}"
      - " vSmart: {{ sdwan_vsmart_host }}"
      - " Mode: {{ apply_changes | ternary('CHANGES APPLIED', 'DRY RUN ONLY') }}"
      - " Next: Run 05_sdwan_phase4_edge_onboard.yml"
      - "════════════════════════════════════════════════════════════════"
