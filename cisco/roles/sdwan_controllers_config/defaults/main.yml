---
# defaults file for sdwan_controllers_config
# Cisco SD-WAN Controller Configuration (vBond and vSmart)
# Last Updated: 2026-04-08

# ============================================================
# vManage Connection Parameters (used for controller config via API)
# ============================================================
sdwan_vmanage_host: "{{ vault_sdwan_vmanage_host }}"
sdwan_vmanage_port: 443
sdwan_vmanage_username: "{{ vault_sdwan_vmanage_username }}"
sdwan_vmanage_password: "{{ vault_sdwan_vmanage_password }}"
sdwan_vmanage_verify_ssl: true
sdwan_vmanage_timeout: 30

# ============================================================
# vBond Direct Connection
# ============================================================
sdwan_vbond_host: "{{ vault_sdwan_vbond_host }}"
sdwan_vbond_port: 12346
sdwan_vbond_system_ip: "{{ vault_sdwan_vbond_system_ip }}"
sdwan_vbond_site_id: "{{ vault_sdwan_vbond_site_id }}"

# ============================================================
# vSmart Direct Connection
# ============================================================
sdwan_vsmart_host: "{{ vault_sdwan_vsmart_host }}"
sdwan_vsmart_port: 443
sdwan_vsmart_username: "{{ vault_sdwan_vsmart_username }}"
sdwan_vsmart_password: "{{ vault_sdwan_vsmart_password }}"
sdwan_vsmart_system_ip: "{{ vault_sdwan_vsmart_system_ip }}"
sdwan_vsmart_site_id: "{{ vault_sdwan_vsmart_site_id }}"

# ============================================================
# Deployment Control
# ============================================================
apply_changes: false
sdwan_artifacts_dir: "/tmp/sdwan-artifacts"

# ============================================================
# Fourth Estate Organization
# ============================================================
fourth_estate_org: "FourthEstate"
fourth_estate_contact: "{{ vault_fourth_estate_contact }}"
fourth_estate_environment: "production"
fourth_estate_region: "primary"

# ============================================================
# Feature Toggles
# ============================================================
enable_vbond_config: true
enable_vsmart_config: true
enable_controller_certificates: true
enable_omp_config: true
enable_control_policies: true

# ============================================================
# vBond Configuration
# ============================================================
sdwan_vbond_system_config:
  timezone: "UTC"
  hostname: "{{ vault_sdwan_vbond_hostname }}"
  system_description: "Fourth Estate SD-WAN vBond - DoD Baseline"
  domain_id: 1
  org_name: "{{ vault_sdwan_org_name }}"

# ============================================================
# vSmart Configuration
# ============================================================
sdwan_vsmart_system_config:
  timezone: "UTC"
  hostname: "{{ vault_sdwan_vsmart_hostname }}"
  system_description: "Fourth Estate SD-WAN vSmart - DoD Baseline"
  domain_id: 1
  org_name: "{{ vault_sdwan_org_name }}"

# ============================================================
# OMP (Overlay Management Protocol) Configuration
# Controls route distribution across the SD-WAN fabric
# ============================================================
sdwan_omp_config:
  send_path_limit: 4
  ecmp_limit: 4
  graceful_restart: true
  graceful_restart_timer: 43200       # 12 hours
  send_omp_limit: 4
  advertise:
    - protocol: "bgp"
      route: "external"
    - protocol: "ospf"
      route: "external"
    - protocol: "static"

# ============================================================
# Control Policies (vSmart)
# ============================================================
sdwan_control_policies:
  - name: "FourthEstate-Hub-Spoke"
    description: "Hub-and-spoke topology policy"
    sequence_type: "tloc-action"

# ============================================================
# Compliance Frameworks
# ============================================================
compliance_frameworks:
  - "dod_stig"
  - "nist_800_53"
  - "nist_800_171"
  - "fisma_moderate"
  - "fisma_high"
