---
# tasks file for aci_security_hardening
# Cisco ACI Security Hardening - DoD STIG and NIST 800-53 compliance

# ============================================================
# Prerequisites and Validation (always runs)
# ============================================================
- name: Include prerequisites validation
  ansible.builtin.include_tasks:
    file: prerequisites.yml
    apply:
      tags:
        - always
        - prerequisites
  tags:
    - always
    - prerequisites

# ============================================================
# STIG CAT I - Authentication Hardening
# NIST IA-2, IA-5 | CISC-ND-001190, CISC-ND-000530, CISC-ND-000570
# ============================================================
- name: STIG CAT I - Authentication hardening
  ansible.builtin.include_tasks:
    file: authentication.yml
    apply:
      tags:
        - aci
        - security
        - stig
        - stig_cat1
        - nist_ia
        - authentication
        - phase4
  when: enable_auth_hardening | bool and stig_cat1_enabled | bool
  tags:
    - aci
    - security
    - stig
    - stig_cat1
    - nist_ia
    - authentication
    - phase4

# ============================================================
# STIG CAT I - TLS/Cryptographic Controls
# NIST SC-8, SC-28 | CISC-ND-001440, CISC-ND-001400
# ============================================================
- name: STIG CAT I - TLS/Cryptographic controls
  ansible.builtin.include_tasks:
    file: crypto_tls.yml
    apply:
      tags:
        - aci
        - security
        - stig
        - stig_cat1
        - nist_sc
        - crypto
        - tls
        - phase4
  when: enable_crypto_tls | bool and stig_cat1_enabled | bool
  tags:
    - aci
    - security
    - stig
    - stig_cat1
    - nist_sc
    - crypto
    - tls
    - phase4

# ============================================================
# STIG CAT II - Access Control and RBAC
# NIST AC-2, AC-3, AC-6, AC-7 | CISC-ND-000370, CISC-ND-000360
# ============================================================
- name: STIG CAT II - Access control and RBAC
  ansible.builtin.include_tasks:
    file: access_control.yml
    apply:
      tags:
        - aci
        - security
        - stig
        - stig_cat2
        - nist_ac
        - rbac
        - phase4
  when: enable_access_control | bool and stig_cat2_enabled | bool
  tags:
    - aci
    - security
    - stig
    - stig_cat2
    - nist_ac
    - rbac
    - phase4

# ============================================================
# STIG CAT II - Session Management
# NIST AC-11, AC-12 | CISC-ND-000390
# ============================================================
- name: STIG CAT II - Session management
  ansible.builtin.include_tasks:
    file: session_management.yml
    apply:
      tags:
        - aci
        - security
        - stig
        - stig_cat2
        - nist_ac
        - sessions
        - phase4
  when: enable_session_management | bool and stig_cat2_enabled | bool
  tags:
    - aci
    - security
    - stig
    - stig_cat2
    - nist_ac
    - sessions
    - phase4

# ============================================================
# STIG CAT II - Audit Logging
# NIST AU-2, AU-3, AU-9, AU-12 | CISC-ND-000700, CISC-ND-000710, CISC-ND-000720
# ============================================================
- name: STIG CAT II - Audit logging
  ansible.builtin.include_tasks:
    file: audit_logging.yml
    apply:
      tags:
        - aci
        - security
        - stig
        - stig_cat2
        - nist_au
        - audit
        - logging
        - phase4
  when: enable_audit_logging | bool and stig_cat2_enabled | bool
  tags:
    - aci
    - security
    - stig
    - stig_cat2
    - nist_au
    - audit
    - logging
    - phase4

# ============================================================
# STIG CAT II - SNMP Security (SNMPv3 required)
# NIST SC-8 | CISC-ND-000090
# ============================================================
- name: STIG CAT II - SNMP security (SNMPv3)
  ansible.builtin.include_tasks:
    file: snmp_security.yml
    apply:
      tags:
        - aci
        - security
        - stig
        - stig_cat2
        - nist_sc
        - snmp
        - phase4
  when: enable_snmp_security | bool and stig_cat2_enabled | bool
  tags:
    - aci
    - security
    - stig
    - stig_cat2
    - nist_sc
    - snmp
    - phase4

# ============================================================
# STIG CAT II/III - NTP and DNS Configuration
# NIST AU-8 | CISC-ND-001290, CISC-ND-001420
# ============================================================
- name: STIG CAT II - NTP and DNS configuration
  ansible.builtin.include_tasks:
    file: ntp_dns.yml
    apply:
      tags:
        - aci
        - security
        - stig
        - stig_cat2
        - nist_au
        - ntp
        - dns
        - phase4
  when: enable_ntp_dns | bool and stig_cat2_enabled | bool
  tags:
    - aci
    - security
    - stig
    - stig_cat2
    - nist_au
    - ntp
    - dns
    - phase4

# ============================================================
# STIG CAT III - DoD Login Banner
# NIST AC-8 | CISC-ND-000080
# ============================================================
- name: STIG CAT III - DoD login banner
  ansible.builtin.include_tasks:
    file: banners.yml
    apply:
      tags:
        - aci
        - security
        - stig
        - stig_cat3
        - nist_ac
        - banners
        - phase4
  when: enable_banners | bool and stig_cat3_enabled | bool
  tags:
    - aci
    - security
    - stig
    - stig_cat3
    - nist_ac
    - banners
    - phase4

# ============================================================
# Compliance Report Generation (always generates when enabled)
# ============================================================
- name: Generate compliance report
  ansible.builtin.include_tasks:
    file: compliance_report.yml
    apply:
      tags:
        - aci
        - security
        - compliance
        - report
        - artifact
        - always
  when: enable_compliance_report | bool
  tags:
    - aci
    - security
    - compliance
    - report
    - artifact
    - always
