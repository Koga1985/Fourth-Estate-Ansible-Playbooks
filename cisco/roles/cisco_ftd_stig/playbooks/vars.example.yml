---
# Example overrides for cisco_ftd_stig (-e @vars.example.yml).
apply_changes: false

# Expected posture thresholds for the assessment.
ftd_required_platform_settings_assigned: true
ftd_required_syslog_alert: true

# ------------------------------------------------------------
# Enforcement operations (data-driven; runs only with apply_changes=true).
#
# Each entry is an explicit FMC config-API call so it stays correct across
# FMC versions. `endpoint` is appended to:
#   https://{{fmc_host}}/api/fmc_config/v1/domain/{{domain}}/
#
# VALIDATE each operation against your FMC version's API explorer
# (https://{{fmc_host}}/api/api-explorer) before enabling in production -
# child resources of platform-settings policies vary by release. Leave this
# list empty to run assessment-only.
# ------------------------------------------------------------
ftd_stig_operations: []
#
# Example - create a new Platform Settings policy skeleton that you then
# populate with banner/timeout/syslog/SNMP/NTP and assign to devices:
#
# ftd_stig_operations:
#   - id: "CISC-ND-mgmt"
#     title: "Create STIG platform settings policy"
#     severity: "CAT II"
#     method: POST
#     endpoint: "policy/ftdplatformsettings"
#     status_code: [201, 200]
#     body:
#       type: "FTDPlatformSettingsPolicy"
#       name: "STIG-Platform-Settings"
#       description: "DoD STIG baseline - banner, timeout, syslog, SNMPv3, NTP, SSH ACL"
