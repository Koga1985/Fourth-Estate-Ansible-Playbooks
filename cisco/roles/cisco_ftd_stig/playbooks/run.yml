---
# Grab-and-go entry point for the Cisco FTD (via FMC) STIG role.
#
# Assessment only (default - read-only GETs against FMC):
#   ansible-playbook -i inventory.example run.yml
# Enforce defined operations:
#   ansible-playbook -i inventory.example run.yml -e apply_changes=true -e @vars.example.yml
- name: Assess / enforce Cisco FTD STIG via FMC
  hosts: fmc
  gather_facts: true
  any_errors_fatal: true
  roles:
    - role: cisco_ftd_stig
