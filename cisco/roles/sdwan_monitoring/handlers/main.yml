---
# handlers file for sdwan_monitoring

- name: notify monitoring config complete
  ansible.builtin.debug:
    msg:
      - "════════════════════════════════════════════════════════════════"
      - " SD-WAN Monitoring Configuration Complete - Fourth Estate"
      - "════════════════════════════════════════════════════════════════"
      - " vManage: {{ sdwan_vmanage_host }}"
      - " Mode: {{ apply_changes | ternary('CHANGES APPLIED', 'DRY RUN ONLY') }}"
      - "════════════════════════════════════════════════════════════════"
