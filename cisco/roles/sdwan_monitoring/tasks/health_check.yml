---
# tasks file: health_check.yml for sdwan_monitoring
# Configure health monitoring intervals

- name: Check fabric health status
  ansible.builtin.uri:
    url: "https://{{ sdwan_vmanage_host }}:{{ sdwan_vmanage_port }}/dataservice/device/counters"
    method: GET
    headers:
      Cookie: "{{ sdwan_session_cookie }}"
      X-XSRF-TOKEN: "{{ sdwan_csrf_token }}"
    validate_certs: "{{ sdwan_vmanage_verify_ssl }}"
    timeout: "{{ sdwan_vmanage_timeout }}"
  register: sdwan_health_result
  check_mode: false
  tags: [sdwan, monitoring, health, phase20]

- name: Display health check summary
  ansible.builtin.debug:
    msg:
      - "SD-WAN Fabric Health:"
      - "  Total devices: {{ sdwan_health_result.json.data[0].totalCount | default('unknown') }}"
      - "  Reachable: {{ sdwan_health_result.json.data[0].reachableCount | default('unknown') }}"
      - "  Unreachable: {{ sdwan_health_result.json.data[0].unreachableCount | default('unknown') }}"
      - "  Health check interval: {{ sdwan_health_check_interval }}s"
  tags: [sdwan, monitoring, health, phase20]
