---
# tasks file for sdwan_monitoring
# Cisco SD-WAN Monitoring and Telemetry Configuration

# ============================================================
# Prerequisites and Validation (always runs)
# ============================================================
- name: Include prerequisites validation
  ansible.builtin.include_tasks:
    file: prerequisites.yml
    apply:
      tags:
        - always
        - prerequisites
  tags:
    - always
    - prerequisites

# ============================================================
# Phase 20 - SNMP Monitoring (SNMPv3 only)
# NIST SC-8 | CISC-ND-000090
# ============================================================
- name: PHASE 20 - Configure SNMPv3 monitoring
  ansible.builtin.include_tasks:
    file: snmp.yml
    apply:
      tags:
        - sdwan
        - monitoring
        - snmp
        - phase20
  when: enable_snmp_monitoring | bool
  tags:
    - sdwan
    - monitoring
    - snmp
    - phase20

# ============================================================
# Phase 20 - Syslog and Audit Logging
# NIST AU-2, AU-12 | CISC-ND-000700
# ============================================================
- name: PHASE 20 - Configure syslog monitoring
  ansible.builtin.include_tasks:
    file: syslog.yml
    apply:
      tags:
        - sdwan
        - monitoring
        - syslog
        - logging
        - phase20
  when: enable_syslog_monitoring | bool
  tags:
    - sdwan
    - monitoring
    - syslog
    - logging
    - phase20

# ============================================================
# Phase 20 - Streaming Telemetry
# Model-driven telemetry for real-time metrics
# ============================================================
- name: PHASE 20 - Configure streaming telemetry
  ansible.builtin.include_tasks:
    file: streaming.yml
    apply:
      tags:
        - sdwan
        - monitoring
        - telemetry
        - streaming
        - phase20
  when: enable_streaming_telemetry | bool
  tags:
    - sdwan
    - monitoring
    - telemetry
    - streaming
    - phase20

# ============================================================
# Phase 20 - Alert Rules
# Configure vManage alerts for operational and security events
# ============================================================
- name: PHASE 20 - Configure alert rules
  ansible.builtin.include_tasks:
    file: alerts.yml
    apply:
      tags:
        - sdwan
        - monitoring
        - alerts
        - phase20
  when: enable_alert_rules | bool
  tags:
    - sdwan
    - monitoring
    - alerts
    - phase20

# ============================================================
# Phase 20 - Health Monitoring
# ============================================================
- name: PHASE 20 - Configure health monitoring
  ansible.builtin.include_tasks:
    file: health_check.yml
    apply:
      tags:
        - sdwan
        - monitoring
        - health
        - phase20
  when: enable_health_monitoring | bool
  tags:
    - sdwan
    - monitoring
    - health
    - phase20

# ============================================================
# Phase 20 - Validation
# ============================================================
- name: PHASE 20 - Validate monitoring configuration
  ansible.builtin.include_tasks:
    file: validation.yml
    apply:
      tags:
        - sdwan
        - monitoring
        - validation
        - phase20
  tags:
    - sdwan
    - monitoring
    - validation
    - phase20
