---
# tasks file: validation.yml for sdwan_monitoring

- name: Verify SNMP configuration
  ansible.builtin.uri:
    url: "https://{{ sdwan_vmanage_host }}:{{ sdwan_vmanage_port }}/dataservice/settings/configuration/snmp"
    method: GET
    headers:
      Cookie: "{{ sdwan_session_cookie }}"
      X-XSRF-TOKEN: "{{ sdwan_csrf_token }}"
    validate_certs: "{{ sdwan_vmanage_verify_ssl }}"
    timeout: "{{ sdwan_vmanage_timeout }}"
  register: sdwan_val_snmp_mon
  check_mode: false
  tags: [sdwan, monitoring, validation, phase20]

- name: Display monitoring validation summary
  ansible.builtin.debug:
    msg:
      - "════════════════════════════════════════════════════════════════"
      - " SD-WAN Monitoring - Validation Complete"
      - "════════════════════════════════════════════════════════════════"
      - " vManage: {{ sdwan_vmanage_host }}"
      - " SNMPv3: {{ sdwan_val_snmp_mon.json.v3 | default(false) | ternary('ENABLED', 'DISABLED') }}"
      - " Mode: {{ apply_changes | ternary('CHANGES APPLIED', 'DRY RUN') }}"
      - "════════════════════════════════════════════════════════════════"
  tags: [sdwan, monitoring, validation, phase20]
