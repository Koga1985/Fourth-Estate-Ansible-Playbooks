---
# Feature hygiene - disable insecure features, enable required ones.
# CISC-ND-001310 (Telnet off) | CISC-ND-001440 (unused services) | NIST CM-7

- name: CISC-ND-001310 - Disable Telnet feature
  cisco.nxos.nxos_config:
    lines:
      - no feature telnet
  check_mode: "{{ not (apply_changes | bool) }}"
  when: nxos_disable_telnet | bool
  register: nxos_telnet
  notify: save running-config
  tags: [stig_cat2, "CISC-ND-001310"]

- name: CISC-ND-001000 - Enable SSH and SCP server
  cisco.nxos.nxos_config:
    lines:
      - feature ssh
      - feature scp-server
  check_mode: "{{ not (apply_changes | bool) }}"
  register: nxos_ssh_feature
  notify: save running-config
  tags: [stig_cat2, "CISC-ND-001000"]

- name: CISC-ND-001440 - Disable unused/insecure services
  cisco.nxos.nxos_config:
    lines:
      - no feature http-server
      - no cdp enable
      - no feature pim
  check_mode: "{{ not (apply_changes | bool) }}"
  register: nxos_unused
  notify: save running-config
  tags: [stig_cat2, "CISC-ND-001440"]

- name: CISC-ND-000160 - Enable TACACS+ feature
  cisco.nxos.nxos_config:
    lines:
      - feature tacacs+
  check_mode: "{{ not (apply_changes | bool) }}"
  register: nxos_tacacs_feature
  notify: save running-config
  tags: [stig_cat2, "CISC-ND-000160"]
