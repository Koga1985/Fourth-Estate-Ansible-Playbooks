---
# SNMPv3 only - remove v1/v2c communities
# CISC-ND-000150/000160 | NIST SC-8, IA-2

- name: CISC-ND-000150 - Remove insecure SNMP communities
  cisco.nxos.nxos_config:
    lines:
      - "no snmp-server community {{ item }}"
  loop: "{{ nxos_snmp_remove_communities }}"
  loop_control:
    label: "{{ item }}"
  check_mode: "{{ not (apply_changes | bool) }}"
  register: nxos_snmp_communities
  notify: save running-config
  tags: [stig_cat2, "CISC-ND-000150"]

- name: CISC-ND-000150/000160 - Configure SNMPv3 user (auth SHA + priv AES-128)
  cisco.nxos.nxos_config:
    lines:
      - "snmp-server user {{ nxos_snmp_v3_user }} {{ nxos_snmp_v3_role }} auth sha {{ nxos_snmp_v3_auth }} priv aes-128 {{ nxos_snmp_v3_priv }}"
  no_log: true
  check_mode: "{{ not (apply_changes | bool) }}"
  register: nxos_snmp_user
  notify: save running-config
  tags: [stig_cat2, "CISC-ND-000150", "CISC-ND-000160"]
