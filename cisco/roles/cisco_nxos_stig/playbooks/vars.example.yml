---
# Example overrides for cisco_nxos_stig (-e @vars.example.yml).
apply_changes: false

nxos_tacacs_servers:
  - host: 10.0.0.10
    key: "{{ vault_nxos_tacacs_key }}"
nxos_management_subnets:
  - "10.0.0.0/24"
nxos_logging_servers:
  - host: 10.0.0.20
    severity: 6
nxos_ntp_servers:
  - 10.0.0.30
nxos_user_vlans: [10, 20, 30]
nxos_native_vlan: 999
nxos_copp_profile: strict
