---
# Grab-and-go entry point for the Cisco NX-OS Switch STIG role.
#
# Dry-run (default - reports findings, changes nothing):
#   ansible-playbook -i inventory.example run.yml
# Enforce:
#   ansible-playbook -i inventory.example run.yml -e apply_changes=true
- name: Apply Cisco NX-OS Switch STIG hardening
  hosts: nexus_switches
  gather_facts: false
  any_errors_fatal: true
  collections:
    - cisco.nxos
    - ansible.netcommon
  roles:
    - role: cisco_nxos_stig
