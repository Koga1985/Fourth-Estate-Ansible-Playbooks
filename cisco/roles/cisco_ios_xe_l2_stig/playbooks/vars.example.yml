---
# Example overrides for cisco_ios_xe_l2_stig.
# Pass with: ansible-playbook ... -e @vars.example.yml
# Anything not set here falls back to roles/cisco_ios_xe_l2_stig/defaults/main.yml.

apply_changes: false

# --- Layer-2 topology (MUST match your switch before enforcing) ---
l2_user_vlans: [10, 20, 30]
l2_management_vlan: 99
l2_native_vlan: 999
l2_unused_vlan: 998

l2_access_interfaces:
  - GigabitEthernet1/0/1
  - GigabitEthernet1/0/2
  - GigabitEthernet1/0/3

l2_trunk_interfaces:
  - GigabitEthernet1/0/47
  - GigabitEthernet1/0/48

l2_dhcp_trusted_interfaces:
  - GigabitEthernet1/0/48

l2_unused_interfaces:
  - GigabitEthernet1/0/10
  - GigabitEthernet1/0/11

# --- Management plane ---
ndm_tacacs_servers:
  - name: TACACS-1
    address: 10.0.0.10
    key: "{{ vault_ios_tacacs_key }}"
ndm_logging_hosts:
  - 10.0.0.20
ndm_ntp_servers:
  - 10.0.0.30
