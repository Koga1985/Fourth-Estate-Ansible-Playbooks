---
# Grab-and-go entry point for the Cisco IOS XE Layer-2 STIG role.
#
# Dry-run (default - reports findings, changes nothing):
#   ansible-playbook -i inventory.example run.yml
#
# Enforce (writes config, saves to startup-config):
#   ansible-playbook -i inventory.example run.yml -e apply_changes=true
#
# Target a subset:
#   ansible-playbook -i inventory.example run.yml --limit access-switch-01 --tags l2
- name: Apply Cisco IOS XE Layer-2 (L2S + NDM) STIG hardening
  hosts: catalyst_l2_switches
  gather_facts: false
  any_errors_fatal: true
  collections:
    - cisco.ios
    - ansible.netcommon
  roles:
    - role: cisco_ios_xe_l2_stig
