---
# tasks file for aci_fabric_deploy
# Cisco ACI Fabric Initial Deployment - APIC cluster, fabric nodes, policies

# ============================================================
# Prerequisites and Validation (always runs)
# ============================================================
- name: PHASE 1 - Run prerequisites and validation
  ansible.builtin.include_tasks:
    file: prerequisites.yml
    apply:
      tags:
        - always
        - prerequisites
        - validation
  tags:
    - always
    - prerequisites
    - validation

# ============================================================
# APIC Cluster Configuration
# ============================================================
- name: PHASE 1 - Configure APIC cluster settings
  ansible.builtin.include_tasks:
    file: apic_cluster.yml
    apply:
      tags:
        - aci
        - apic
        - cluster
        - phase1
  when: enable_apic_config | bool
  tags:
    - aci
    - apic
    - cluster
    - phase1

# ============================================================
# Fabric Node Registration
# ============================================================
- name: PHASE 1 - Register and discover fabric nodes
  ansible.builtin.include_tasks:
    file: fabric_nodes.yml
    apply:
      tags:
        - aci
        - fabric
        - nodes
        - registration
        - phase1
  when: enable_node_registration | bool
  tags:
    - aci
    - fabric
    - nodes
    - registration
    - phase1

# ============================================================
# Fabric-Wide Policies
# ============================================================
- name: PHASE 1 - Configure fabric-wide policies
  ansible.builtin.include_tasks:
    file: fabric_policies.yml
    apply:
      tags:
        - aci
        - fabric
        - policies
        - phase1
  when: enable_fabric_policies | bool
  tags:
    - aci
    - fabric
    - policies
    - phase1

# ============================================================
# Access Policies
# ============================================================
- name: PHASE 1 - Configure access policies (VLAN pools, domains, AEP)
  ansible.builtin.include_tasks:
    file: access_policies.yml
    apply:
      tags:
        - aci
        - access
        - policies
        - phase1
  when: enable_access_policies | bool
  tags:
    - aci
    - access
    - policies
    - phase1

# ============================================================
# Interface Profiles
# ============================================================
- name: PHASE 1 - Configure interface and switch profiles
  ansible.builtin.include_tasks:
    file: interface_profiles.yml
    apply:
      tags:
        - aci
        - interface
        - profiles
        - phase1
  when: enable_interface_profiles | bool
  tags:
    - aci
    - interface
    - profiles
    - phase1

# ============================================================
# Validation and Verification
# ============================================================
- name: PHASE 1 - Validate fabric deployment
  ansible.builtin.include_tasks:
    file: validation.yml
    apply:
      tags:
        - validation
        - verification
        - phase1
  tags:
    - validation
    - verification
    - phase1
