---
# tasks file for aci_fabric_deploy - Prerequisites and Validation
# Validates connectivity, required variables, and creates artifact directory

- name: PHASE 1 - Display aci_fabric_deploy role banner
  ansible.builtin.debug:
    msg:
      - "================================================================"
      - " Cisco ACI Fabric Deployment - Fourth Estate"
      - "================================================================"
      - " Role:         aci_fabric_deploy"
      - " APIC Host:    {{ aci_host }}"
      - " Fabric Name:  {{ aci_fabric_name }}"
      - " Pod ID:       {{ aci_pod_id }}"
      - " Apply Changes: {{ apply_changes }}"
      - " Artifacts:    {{ artifacts_dir }}"
      - " Compliance:   {{ compliance_frameworks | join(', ') }}"
      - "================================================================"
      - " {{ 'DRY RUN MODE - No changes will be applied' if not (apply_changes | bool) else 'LIVE MODE - Changes WILL be applied' }}"
      - "================================================================"
  tags:
    - always
    - prerequisites

- name: PHASE 1 - Validate required APIC connection variables are defined
  ansible.builtin.assert:
    that:
      - aci_host is defined
      - aci_host | length > 0
      - aci_username is defined
      - aci_username | length > 0
      - aci_password is defined
      - aci_password | length > 0
    fail_msg: "Required APIC connection parameters (aci_host, aci_username, aci_password) must be defined"
    quiet: true
  tags:
    - always
    - prerequisites
    - validation

- name: PHASE 1 - Validate fabric configuration variables are defined
  ansible.builtin.assert:
    that:
      - aci_fabric_name is defined
      - aci_pod_id is defined
      - aci_nodes is defined
      - aci_nodes | length > 0
    fail_msg: "Required fabric configuration variables (aci_fabric_name, aci_pod_id, aci_nodes) must be defined"
    quiet: true
  tags:
    - always
    - prerequisites
    - validation

- name: PHASE 1 - Test APIC connectivity
  cisco.aci.aci_rest:
    host: "{{ aci_host }}"
    username: "{{ aci_username }}"
    password: "{{ aci_password }}"
    validate_certs: "{{ aci_verify_ssl }}"
    use_proxy: "{{ aci_use_proxy }}"
    path: /api/mo/uni.json
    method: get
  register: aci_connectivity_check
  failed_when: false
  tags:
    - always
    - prerequisites
    - validation

- name: PHASE 1 - Assert APIC is reachable
  ansible.builtin.assert:
    that:
      - aci_connectivity_check is defined
      - aci_connectivity_check.status is defined
      - aci_connectivity_check.status == 200
    fail_msg: "Unable to reach APIC at {{ aci_host }} - check connectivity and credentials"
    quiet: true
  tags:
    - always
    - prerequisites
    - validation

- name: PHASE 1 - Create artifacts directory
  ansible.builtin.file:
    path: "{{ artifacts_dir }}"
    state: directory
    mode: "0750"
  tags:
    - always
    - prerequisites

- name: PHASE 1 - Record deployment start time
  ansible.builtin.set_fact:
    aci_fabric_deploy_start_time: "{{ ansible_date_time.iso8601 }}"
    aci_fabric_deploy_epoch: "{{ ansible_date_time.epoch }}"
  tags:
    - always
    - prerequisites

- name: PHASE 1 - Save deployment metadata artifact
  ansible.builtin.copy:
    dest: "{{ artifacts_dir }}/aci_fabric_deploy_metadata.json"
    mode: "0640"
    content: "{{ deployment_metadata | to_nice_json }}"
  vars:
    deployment_metadata:
      role: "aci_fabric_deploy"
      timestamp: "{{ aci_fabric_deploy_start_time }}"
      apic_host: "{{ aci_host }}"
      fabric_name: "{{ aci_fabric_name }}"
      pod_id: "{{ aci_pod_id }}"
      apply_changes: "{{ apply_changes | bool }}"
      node_count: "{{ aci_nodes | length }}"
      compliance_frameworks: "{{ compliance_frameworks }}"
      fourth_estate_org: "{{ fourth_estate_org }}"
      fourth_estate_environment: "{{ fourth_estate_environment }}"
  tags:
    - always
    - prerequisites
