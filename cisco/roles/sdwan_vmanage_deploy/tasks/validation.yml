---
# tasks file: validation.yml for sdwan_vmanage_deploy
# Validate vManage deployment

- name: Check vManage system status
  ansible.builtin.uri:
    url: "https://{{ sdwan_vmanage_host }}:{{ sdwan_vmanage_port }}/dataservice/system/device/controllers"
    method: GET
    headers:
      Cookie: "{{ sdwan_session_cookie }}"
      X-XSRF-TOKEN: "{{ sdwan_csrf_token }}"
    validate_certs: "{{ sdwan_vmanage_verify_ssl }}"
    timeout: "{{ sdwan_vmanage_timeout }}"
  register: sdwan_status
  check_mode: false
  tags: [sdwan, vmanage, validation, phase15]

- name: Display vManage deployment validation summary
  ansible.builtin.debug:
    msg:
      - "════════════════════════════════════════════════════════════════"
      - " vManage Phase 15 Deployment - Validation"
      - "════════════════════════════════════════════════════════════════"
      - " vManage: {{ sdwan_vmanage_host }}"
      - " API status: {{ sdwan_status.status }}"
      - " Mode: {{ apply_changes | ternary('CHANGES APPLIED', 'DRY RUN') }}"
      - " Next: Run 03_sdwan_phase2_vmanage_config.yml"
      - "════════════════════════════════════════════════════════════════"
  tags: [sdwan, vmanage, validation, phase15]
