---
# tasks file: prerequisites.yml for sdwan_vmanage_deploy

- name: Validate required vManage connection variables
  ansible.builtin.assert:
    that:
      - sdwan_vmanage_host is defined and sdwan_vmanage_host | length > 0
      - sdwan_vmanage_username is defined
      - sdwan_vmanage_password is defined
      - sdwan_org_name is defined and sdwan_org_name | length > 0
      - sdwan_vbond_host is defined and sdwan_vbond_host | length > 0
    fail_msg: "Required SD-WAN vManage deployment variables are not defined."
    success_msg: "vManage deployment variables validated"
  tags: [always, prerequisites]

- name: Create artifacts directory
  ansible.builtin.file:
    path: "{{ sdwan_artifacts_dir }}"
    state: directory
    mode: '0750'
  tags: [always, prerequisites]

- name: Display dry-run warning
  ansible.builtin.debug:
    msg: |
      ════════════════════════════════════════════════════════════════
      DRY RUN MODE — No changes will be applied
      Set apply_changes: true to apply changes.
      ════════════════════════════════════════════════════════════════
  when: not apply_changes | bool
  tags: [always, prerequisites]
