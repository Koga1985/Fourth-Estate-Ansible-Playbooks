---
# tasks file: vpn_config.yml for sdwan_vmanage_deploy
# Configure management VPN (VPN 512) on vManage

- name: Configure vManage management VPN 512 interface
  ansible.builtin.uri:
    url: "https://{{ sdwan_vmanage_host }}:{{ sdwan_vmanage_port }}/dataservice/settings/configuration/nms"
    method: PUT
    headers:
      Cookie: "{{ sdwan_session_cookie }}"
      X-XSRF-TOKEN: "{{ sdwan_csrf_token }}"
      Content-Type: "application/json"
    body_format: json
    body:
      ipAddress: "{{ sdwan_vmanage_system_ip }}"
    validate_certs: "{{ sdwan_vmanage_verify_ssl }}"
    timeout: "{{ sdwan_vmanage_timeout }}"
    status_code: [200, 201]
  when: apply_changes | bool
  register: sdwan_vpn_result
  tags: [sdwan, vmanage, vpn, networking, phase15]

- name: Display VPN configuration status
  ansible.builtin.debug:
    msg:
      - "VPN configuration:"
      - "  Management interface: {{ sdwan_vmanage_mgmt_interface }}"
      - "  System IP: {{ sdwan_vmanage_system_ip }}"
      - "  Status: {{ apply_changes | ternary('APPLIED', 'CHECK ONLY') }}"
  tags: [sdwan, vmanage, vpn, networking, phase15]
