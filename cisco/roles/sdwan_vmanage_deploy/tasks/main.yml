---
# tasks file for sdwan_vmanage_deploy
# Cisco SD-WAN vManage Controller Initial Deployment

# ============================================================
# Prerequisites and Validation (always runs)
# ============================================================
- name: Include prerequisites validation
  ansible.builtin.include_tasks:
    file: prerequisites.yml
    apply:
      tags:
        - always
        - prerequisites
  tags:
    - always
    - prerequisites

# ============================================================
# Phase 15 - vManage System Configuration
# NIST CM-6 | Initial system settings
# ============================================================
- name: PHASE 15 - Configure vManage system settings
  ansible.builtin.include_tasks:
    file: system_config.yml
    apply:
      tags:
        - sdwan
        - vmanage
        - system
        - phase15
  when: enable_vmanage_system | bool
  tags:
    - sdwan
    - vmanage
    - system
    - phase15

# ============================================================
# Phase 15 - vManage Certificate Initialization
# NIST SC-17, IA-3 | PKI certificate chain setup
# ============================================================
- name: PHASE 15 - Initialize vManage certificates
  ansible.builtin.include_tasks:
    file: certificates.yml
    apply:
      tags:
        - sdwan
        - vmanage
        - certificates
        - pki
        - phase15
  when: enable_vmanage_certificates | bool
  tags:
    - sdwan
    - vmanage
    - certificates
    - pki
    - phase15

# ============================================================
# Phase 15 - VPN and Interface Configuration
# ============================================================
- name: PHASE 15 - Configure VPN and management interface
  ansible.builtin.include_tasks:
    file: vpn_config.yml
    apply:
      tags:
        - sdwan
        - vmanage
        - vpn
        - networking
        - phase15
  when: enable_vmanage_vpn_config | bool
  tags:
    - sdwan
    - vmanage
    - vpn
    - networking
    - phase15

# ============================================================
# Phase 15 - vManage Cluster Setup (when HA is enabled)
# ============================================================
- name: PHASE 15 - Configure vManage cluster
  ansible.builtin.include_tasks:
    file: cluster.yml
    apply:
      tags:
        - sdwan
        - vmanage
        - cluster
        - ha
        - phase15
  when: enable_vmanage_cluster | bool and sdwan_vmanage_cluster_enabled | bool
  tags:
    - sdwan
    - vmanage
    - cluster
    - ha
    - phase15

# ============================================================
# Phase 15 - Validation
# ============================================================
- name: PHASE 15 - Validate vManage deployment
  ansible.builtin.include_tasks:
    file: validation.yml
    apply:
      tags:
        - sdwan
        - vmanage
        - validation
        - phase15
  tags:
    - sdwan
    - vmanage
    - validation
    - phase15
