---
# handlers file for sdwan_vmanage_deploy

- name: notify vmanage deploy complete
  ansible.builtin.debug:
    msg:
      - "════════════════════════════════════════════════════════════════"
      - " vManage Deployment Complete - Fourth Estate"
      - "════════════════════════════════════════════════════════════════"
      - " vManage: {{ sdwan_vmanage_host }}"
      - " Mode: {{ apply_changes | ternary('CHANGES APPLIED', 'DRY RUN ONLY') }}"
      - " Next: Run 03_sdwan_phase2_vmanage_config.yml"
      - "════════════════════════════════════════════════════════════════"
