---
galaxy_info:
  role_name: sdwan_vmanage_deploy
  author: "Fourth Estate Infrastructure Team"
  description: >
    Cisco SD-WAN vManage Controller Initial Deployment.
    Deploys and initializes vManage, configures system settings,
    and issues PKI certificates for the SD-WAN fabric.
  company: "Fourth Estate"
  license: MIT
  min_ansible_version: "2.15"

  platforms:
    - name: EL
      versions:
        - "8"
        - "9"
    - name: Ubuntu
      versions:
        - focal
        - jammy

  galaxy_tags:
    - cisco
    - sdwan
    - catalystwan
    - vmanage
    - deploy
    - fourth_estate

dependencies: []

collections:
  - ansible.builtin
  - ansible.utils
