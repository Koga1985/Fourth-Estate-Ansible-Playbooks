---
# defaults file for sdwan_vmanage_deploy
# Cisco SD-WAN vManage Controller Initial Deployment
# Deploys and initializes vManage for the Fourth Estate SD-WAN fabric
# Last Updated: 2026-04-08

# ============================================================
# vManage Connection Parameters
# ============================================================
sdwan_vmanage_host: "{{ vault_sdwan_vmanage_host }}"
sdwan_vmanage_port: 443
sdwan_vmanage_username: "{{ vault_sdwan_vmanage_username }}"
sdwan_vmanage_password: "{{ vault_sdwan_vmanage_password }}"
sdwan_vmanage_verify_ssl: true
sdwan_vmanage_timeout: 30

# ============================================================
# Deployment Control
# ============================================================
apply_changes: false
sdwan_artifacts_dir: "/tmp/sdwan-artifacts"

# ============================================================
# Fourth Estate Organization
# ============================================================
fourth_estate_org: "FourthEstate"
fourth_estate_contact: "{{ vault_fourth_estate_contact }}"
fourth_estate_environment: "production"
fourth_estate_region: "primary"

# ============================================================
# Feature Toggles
# ============================================================
enable_vmanage_system: true
enable_vmanage_cluster: true
enable_vmanage_certificates: true
enable_vmanage_vpn_config: true

# ============================================================
# vManage System Settings
# ============================================================
sdwan_vmanage_system_ip: "{{ vault_sdwan_vmanage_system_ip }}"
sdwan_vmanage_site_id: "{{ vault_sdwan_vmanage_site_id }}"
sdwan_vmanage_domain_id: 1
sdwan_vmanage_timezone: "UTC"
sdwan_vmanage_hostname: "{{ vault_sdwan_vmanage_hostname }}"

# Organization and vBond settings
sdwan_org_name: "{{ vault_sdwan_org_name }}"
sdwan_vbond_host: "{{ vault_sdwan_vbond_host }}"
sdwan_vbond_port: 12346

# ============================================================
# vManage Cluster Configuration
# vManage HA cluster for redundancy
# ============================================================
sdwan_vmanage_cluster_enabled: false  # Set true for HA deployment
sdwan_vmanage_cluster_nodes:
  - ip: "{{ vault_sdwan_vmanage_node1_ip }}"
    username: "{{ vault_sdwan_vmanage_username }}"
    password: "{{ vault_sdwan_vmanage_password }}"
  # - ip: "{{ vault_sdwan_vmanage_node2_ip }}"
  #   username: "{{ vault_sdwan_vmanage_username }}"
  #   password: "{{ vault_sdwan_vmanage_password }}"

# ============================================================
# VPN / Interface Configuration
# VPN 0: Transport (WAN)
# VPN 512: Management (out-of-band)
# ============================================================
sdwan_vmanage_mgmt_interface: "eth0"
sdwan_vmanage_mgmt_gateway: "{{ vault_sdwan_vmanage_mgmt_gateway }}"

# ============================================================
# Certificate Management (STIG SC-17, IA-3)
# ============================================================
sdwan_cert_auth_type: "enterprise"    # Options: enterprise, symantec, manual
sdwan_ca_cert_file: "{{ vault_sdwan_ca_cert_path }}"
sdwan_root_ca_cert: "{{ vault_sdwan_root_ca_cert }}"
sdwan_csr_country: "US"
sdwan_csr_state: "{{ vault_sdwan_csr_state }}"
sdwan_csr_city: "{{ vault_sdwan_csr_city }}"
sdwan_csr_org: "FourthEstate"
sdwan_csr_org_unit: "Network Operations"
sdwan_csr_email: "{{ vault_fourth_estate_contact }}"

# ============================================================
# Compliance Frameworks
# ============================================================
compliance_frameworks:
  - "dod_stig"
  - "nist_800_53"
  - "nist_800_171"
  - "fisma_moderate"
  - "fisma_high"
