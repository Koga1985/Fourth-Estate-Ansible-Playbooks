---
# Routing protocol authentication
# CISC-RT-000010 (BGP auth) | CISC-RT-000235 (BGP max-prefix)
# CISC-RT-000490 (BGP GTSM/TTL) | CISC-RT-000020 (OSPF auth)
# NIST AC-4, SC-5

- name: CISC-RT-000010/000235/000490 - BGP neighbor authentication, GTSM and max-prefix
  cisco.ios.ios_config:
    parents: "router bgp {{ rtr_bgp_as }}"
    lines:
      - "neighbor {{ item.neighbor }} password {{ item.password }}"
      - "neighbor {{ item.neighbor }} ttl-security hops {{ item.ttl_security_hops | default(2) }}"
      - "neighbor {{ item.neighbor }} maximum-prefix {{ item.max_prefixes | default(1000) }}"
  loop: "{{ rtr_bgp_peers }}"
  loop_control:
    label: "BGP {{ item.neighbor }}"
  no_log: true
  when: rtr_bgp_as | length > 0
  check_mode: "{{ not (apply_changes | bool) }}"
  register: rtr_bgp
  notify: save running-config
  tags: [stig_cat2, "CISC-RT-000010", "CISC-RT-000235", "CISC-RT-000490"]

- name: CISC-RT-000020 - OSPF interface MD5 authentication
  cisco.ios.ios_config:
    parents: "interface {{ item.interface }}"
    lines:
      - ip ospf authentication message-digest
      - "ip ospf message-digest-key {{ item.md5_key_id }} md5 {{ item.md5_key }}"
  loop: "{{ rtr_ospf_auth_interfaces }}"
  loop_control:
    label: "OSPF {{ item.interface }}"
  no_log: true
  check_mode: "{{ not (apply_changes | bool) }}"
  register: rtr_ospf
  notify: save running-config
  tags: [stig_cat2, "CISC-RT-000020"]

- name: Note when no routing peers/interfaces are defined
  ansible.builtin.debug:
    msg: "No rtr_bgp_peers / rtr_ospf_auth_interfaces (or rtr_bgp_as) defined - skipping routing authentication."
  when:
    - rtr_bgp_peers | length == 0
    - rtr_ospf_auth_interfaces | length == 0
  tags: [routing]
