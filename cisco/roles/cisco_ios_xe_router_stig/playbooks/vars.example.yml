---
# Example overrides for cisco_ios_xe_router_stig (-e @vars.example.yml).
apply_changes: false
rtr_internal_interfaces:
  - GigabitEthernet0/0/1
rtr_external_interfaces:
  - GigabitEthernet0/0/0
rtr_bgp_as: "65001"
rtr_bgp_peers:
  - neighbor: "10.1.1.2"
    password: "{{ vault_rtr_bgp_key }}"
    ttl_security_hops: 2
    max_prefixes: 1000
rtr_ospf_auth_interfaces:
  - interface: "GigabitEthernet0/0/1"
    md5_key_id: 1
    md5_key: "{{ vault_rtr_ospf_key }}"
