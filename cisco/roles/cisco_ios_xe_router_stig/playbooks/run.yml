---
# Grab-and-go entry point for the Cisco IOS XE Router STIG role.
# Dry-run: ansible-playbook -i inventory.example run.yml
# Enforce: ansible-playbook -i inventory.example run.yml -e apply_changes=true -e @vars.example.yml
- name: Apply Cisco IOS XE Router (CISC-RT) STIG hardening
  hosts: ios_xe_routers
  gather_facts: false
  any_errors_fatal: true
  collections:
    - cisco.ios
    - ansible.netcommon
  roles:
    - role: cisco_ios_xe_router_stig
