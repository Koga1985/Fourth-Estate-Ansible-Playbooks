---
# ESXi advanced host settings (banner, lockout, timeouts, MOB, syslog, ...)
# ESXI-80-000004/000035/000068/000111/000114/000124/000195/000220/000241
# NIST AC-7, AC-8, AC-11, AU-4, CM-6, CM-7

- name: ESXI-80-* - Apply advanced configuration settings per host
  community.vmware.vmware_host_config_manager:
    hostname: "{{ vcenter_hostname }}"
    username: "{{ vcenter_username }}"
    password: "{{ vcenter_password }}"
    validate_certs: "{{ vcenter_validate_certs }}"
    esxi_hostname: "{{ item }}"
    options: "{{ esxi_advanced_settings }}"
  loop: "{{ esxi_hosts }}"
  loop_control:
    label: "{{ item }}"
  no_log: true
  check_mode: "{{ not (apply_changes | bool) }}"
  register: esxi_adv
  tags: [stig_cat2, "ESXI-80-000004", "ESXI-80-000111", "ESXI-80-000124", "ESXI-80-000220"]
