---
# tasks file for vsphere8_stig

- name: Ensure artifacts directory exists
  ansible.builtin.file:
    path: "{{ artifacts_dir }}"
    state: directory
    mode: "0750"
  delegate_to: localhost
  run_once: true
  changed_when: false
  tags: [always]

- name: Show run mode
  ansible.builtin.debug:
    msg: >-
      vsphere8_stig via vCenter {{ vcenter_hostname }} -
      {{ 'ENFORCING' if apply_changes | bool else 'DRY-RUN / check mode only' }}
      ({{ esxi_hosts | length }} ESXi host(s))
  tags: [always]

- name: ESXi advanced host settings (ESXI-80-*)
  ansible.builtin.import_tasks: esxi_advanced.yml
  when: stig_esxi_advanced | bool
  tags: [stig, esxi, advanced]

- name: ESXi services, lockdown, NTP (ESXI-80-*)
  ansible.builtin.import_tasks: esxi_services.yml
  when: stig_esxi_services | bool
  tags: [stig, esxi, services]

- name: vCenter advanced settings (VCSA-80-*)
  ansible.builtin.import_tasks: vcenter_settings.yml
  when: stig_vcenter_settings | bool
  tags: [stig, vcenter]

- name: Compliance report
  ansible.builtin.import_tasks: compliance_report.yml
  when: stig_compliance_report | bool
  tags: [stig, report]
