---
# vCenter 8 settings (VCSA-80-*)
# VCSA-80-000034 (logging level) via the supported settings module; remaining
# VCSA controls are surfaced for manual verification (appliance/SSO scope).
# NIST AU-3, AU-12, SC-8

- name: VCSA-80-000034 - Set vCenter logging level to info
  community.vmware.vmware_vcenter_settings:
    hostname: "{{ vcenter_hostname }}"
    username: "{{ vcenter_username }}"
    password: "{{ vcenter_password }}"
    validate_certs: "{{ vcenter_validate_certs }}"
    logging_options: "info"
  no_log: true
  check_mode: "{{ not (apply_changes | bool) }}"
  register: vcsa_logging
  failed_when: false
  tags: [stig_cat2, "VCSA-80-000034"]

- name: VCSA-80-* - Manual-verification reminder for appliance/SSO controls
  ansible.builtin.debug:
    msg:
      - "Verify the following vCenter 8 (VCSA-80-*) controls (appliance/SSO scope):"
      - "VCSA-80-000089: forward vpxd events/alarms to syslog"
      - "VCSA-80-000111: SSO password policy (length>=15, complexity, history, lockout)"
      - "VCSA-80-000257: NFC SSL enabled (config.nfc.useSSL=true)"
      - "VCSA-80-000034: logging level applied = {{ vcsa_logging is changed }}"
  tags: [vcenter]
