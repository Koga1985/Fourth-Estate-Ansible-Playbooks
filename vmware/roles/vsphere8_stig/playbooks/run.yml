---
# Grab-and-go entry point for the VMware vSphere 8 STIG role.
#
# Dry-run (default): ansible-playbook -i inventory.example run.yml -e @vars.example.yml
# Enforce:           ansible-playbook -i inventory.example run.yml -e @vars.example.yml -e apply_changes=true
- name: Apply VMware vSphere 8 STIG hardening (ESXi 8 + vCenter 8)
  hosts: localhost
  connection: local
  gather_facts: true
  any_errors_fatal: true
  collections:
    - community.vmware
  roles:
    - role: vsphere8_stig
