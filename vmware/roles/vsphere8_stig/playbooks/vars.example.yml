---
# Example overrides for vsphere8_stig (-e @vars.example.yml).
apply_changes: false

vcenter_hostname: "vcenter.example.mil"
vcenter_username: "administrator@vsphere.local"
vcenter_password: "{{ vault_vcenter_password }}"
vcenter_validate_certs: true

esxi_hosts:
  - esxi-01.example.mil
  - esxi-02.example.mil

esxi_ntp_servers:
  - 10.0.0.30
  - 10.0.0.31

