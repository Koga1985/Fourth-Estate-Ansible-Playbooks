---
# Secret detection (gitleaks) - APSC-DV-001740
# Exit code 1 means leaks were found (not an error for us).

- name: Run secret scan
  ansible.builtin.command: "{{ appsec_tools.secrets.cmd }}"
  args:
    chdir: "{{ app_src_dir }}"
  register: secrets_run
  changed_when: false
  failed_when: false
  tags: [secrets]

- name: Read secret scan report
  ansible.builtin.slurp:
    src: "{{ appsec_tools.secrets.report }}"
  register: secrets_report_raw
  failed_when: false
  changed_when: false
  tags: [secrets]

- name: Record secret findings
  ansible.builtin.set_fact:
    appsec_findings: >-
      {{ appsec_findings | default({}) | combine({
           'secrets': {
             'tool': appsec_tools.secrets.bin,
             'ran': true,
             'count': secret_count,
             'critical': secret_count,
             'high': 0,
             'report': appsec_tools.secrets.report
           }}) }}
  vars:
    secret_count: >-
      {{ (secrets_report_raw.content | b64decode | from_json | length)
         if (secrets_report_raw.content is defined) else 0 }}
  tags: [secrets]
