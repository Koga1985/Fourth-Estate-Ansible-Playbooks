---
# Grab-and-go entry point for the Application Security & Development STIG gate.
# Runs on the CI runner / control node against an application source tree.
#
# Report-only (default):
#   ansible-playbook run.yml -e app_src_dir=/path/to/app/repo
# Enforce the gate (fail the build on violations):
#   ansible-playbook run.yml -e app_src_dir=/path/to/app/repo -e enforce_gate=true
- name: Application Security & Development STIG gate
  hosts: localhost
  connection: local
  gather_facts: true
  roles:
    - role: app_sec_dev_stig
