---
# Example overrides for app_sec_dev_stig (-e @vars.example.yml).

# Application source tree to assess.
app_src_dir: "/builds/myorg/myapp"

# In CI, enforce the gate so non-compliant builds fail.
enforce_gate: true
gate_max_critical: 0
gate_max_high: 0
gate_fail_on_secrets: true

# Toggle scanners off if a stage handles them elsewhere.
scan_secrets: true
scan_sast: true
scan_dependencies: true
scan_iac: true

# Override a tool invocation if you wrap it differently, e.g. trivy for SCA:
# appsec_tools:
#   dependencies:
#     bin: trivy
#     cmd: "trivy fs --format json --output {{ artifacts_dir }}/trivy.json {{ app_src_dir }}"
#     report: "{{ artifacts_dir }}/trivy.json"
