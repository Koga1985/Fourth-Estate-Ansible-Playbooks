---
# Logging and NTP
# F5BI-DM-000350 (NTP) | F5BI-DM-000098 (remote syslog)
# NIST AU-4, AU-8, AU-9

- name: F5BI-DM-000350 - Configure NTP servers and timezone
  f5networks.f5_modules.bigip_device_ntp:
    ntp_servers: "{{ f5_ntp_servers }}"
    timezone: "{{ f5_timezone }}"
  check_mode: "{{ not (apply_changes | bool) }}"
  register: f5_ntp
  notify: save bigip config
  tags: [stig_cat2, "F5BI-DM-000350"]

- name: F5BI-DM-000098 - Configure remote syslog destinations
  f5networks.f5_modules.bigip_remote_syslog:
    remote_host: "{{ item.host }}"
    remote_port: "{{ item.remote_port | default(514) }}"
  loop: "{{ f5_remote_syslog_servers }}"
  loop_control:
    label: "{{ item.host }}"
  check_mode: "{{ not (apply_changes | bool) }}"
  register: f5_syslog
  notify: save bigip config
  tags: [stig_cat2, "F5BI-DM-000098"]
