---
# Secure management services - httpd TLS + redirect
# F5BI-DM-000107 (TLS protocols/ciphers) | NIST SC-8, SC-23, CM-7

- name: F5BI-DM-000107 - Harden management httpd (TLS 1.2 + ciphers + redirect)
  f5networks.f5_modules.bigip_device_httpd:
    ssl_protocols: "{{ f5_httpd_ssl_protocols }}"
    ssl_cipher_suite: "{{ f5_httpd_ssl_ciphersuite }}"
    redirect_http_to_https: "{{ f5_redirect_http_to_https }}"
  check_mode: "{{ not (apply_changes | bool) }}"
  register: f5_httpd
  notify: save bigip config
  tags: [stig_cat2, "F5BI-DM-000107"]
