---
# Example overrides for f5_bigip_stig (-e @vars.example.yml).
apply_changes: false

f5_idle_timeout_seconds: 600
f5_lockout_max_failures: 3
f5_password_min_length: 15
f5_httpd_ssl_protocols: "TLSv1_2"
f5_ntp_servers:
  - 10.0.0.30
  - 10.0.0.31
f5_remote_syslog_servers:
  - host: 10.0.0.20
    remote_port: 514
f5_snmp_allowed_subnets:
  - "10.0.0.0/24"
f5_snmp_v3_user: snmpv3mon
f5_snmp_v3_auth: "{{ vault_f5_snmp_auth }}"
f5_snmp_v3_priv: "{{ vault_f5_snmp_priv }}"
