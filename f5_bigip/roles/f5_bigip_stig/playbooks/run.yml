---
# Grab-and-go entry point for the F5 BIG-IP Device Management STIG role.
#
# Dry-run (default): ansible-playbook -i inventory.example run.yml
# Enforce:           ansible-playbook -i inventory.example run.yml -e apply_changes=true
- name: Apply F5 BIG-IP Device Management STIG hardening
  hosts: bigips
  connection: httpapi
  gather_facts: false
  any_errors_fatal: true
  collections:
    - f5networks.f5_modules
  roles:
    - role: f5_bigip_stig
