---
# defaults file for fortigate_stig
# Fortinet FortiGate Firewall STIG - NDM management-plane hardening (FGFW-ND-*),
# applied via the certified fortinet.fortios collection (FortiOS REST API).
# NIST SP 800-53 Rev 5 aligned.
#
# Safe by default: apply_changes=false runs every task in check mode (reports,
# no change). With apply_changes=true the FortiOS config is updated (FortiOS
# persists configuration immediately - no separate commit).

# ============================================================
# Connection (FortiOS httpapi - set in inventory)
# ============================================================
fortios_vdom: "root"

# ============================================================
# Deployment control
# ============================================================
apply_changes: false
artifacts_dir: "/tmp/fortigate-stig-artifacts"

# ============================================================
# Control-area toggles
# ============================================================
stig_admin_auth: true
stig_mgmt_services: true
stig_logging_ntp: true
stig_snmp: true
stig_compliance_report: true

# ============================================================
# FGFW-ND-0000xx - Admin auth / lockout / timeout / password / banner
# ============================================================
fgt_admin_timeout_minutes: 10            # idle timeout
fgt_admin_lockout_threshold: 3           # failed attempts before lockout
fgt_admin_lockout_duration_seconds: 900  # lockout duration
fgt_password_min_length: 15
fgt_password_min_upper: 1
fgt_password_min_lower: 1
fgt_password_min_number: 1
fgt_password_min_nonalpha: 1
fgt_password_expire_days: 60
fgt_password_reuse_disabled: true
# Trusted hosts for administrator accounts (mgmt access restriction)
fgt_admin_trusthosts:
  - "10.0.0.0 255.255.255.0"
fgt_admin_account: "admin"
# DoD login banner text (pre-login-banner)
fgt_login_banner: >-
  You are accessing a U.S. Government (USG) Information System (IS) that is
  provided for USG-authorized use only. By using this IS you consent to the
  conditions in the full DoD Notice and Consent Banner.

# ============================================================
# FGFW-ND-0001xx - Secure management services
# ============================================================
fgt_ssl_min_proto: "TLSv1-2"             # ssl-min-proto-version
fgt_strong_crypto: "enable"
fgt_admin_https_redirect: "enable"
fgt_allow_telnet: false
fgt_allow_http: false

# ============================================================
# FGFW-ND-0003xx - Logging and authenticated NTP
# ============================================================
fgt_syslog_server: "{{ vault_syslog_server_primary | default('10.0.0.20') }}"
fgt_syslog_port: 514
fgt_ntp_server: "{{ vault_ntp_server_primary | default('10.0.0.30') }}"
fgt_ntp_type: "custom"

# ============================================================
# FGFW-ND-000200 - SNMPv3 only
# ============================================================
fgt_snmp_v3_user: "{{ vault_fgt_snmp_user | default('snmpv3mon') }}"
fgt_snmp_v3_auth: "{{ vault_fgt_snmp_auth | default('CHANGE_ME_AUTH') }}"
fgt_snmp_v3_priv: "{{ vault_fgt_snmp_priv | default('CHANGE_ME_PRIV') }}"

# ============================================================
# Reporting metadata
# ============================================================
compliance_frameworks:
  - dod_stig
  - nist_800_53
  - nist_800_171
stig_benchmark: "Fortinet FortiGate Firewall STIG"
stig_version: "V1R4"
