---
# SNMPv3 only
# FGFW-ND-000200 | NIST SC-8, IA-2

- name: FGFW-ND-000200 - Enable SNMP agent
  fortinet.fortios.fortios_system_snmp_sysinfo:
    vdom: "{{ fortios_vdom }}"
    system_snmp_sysinfo:
      status: "enable"
  check_mode: "{{ not (apply_changes | bool) }}"
  register: fgt_snmp_sysinfo
  tags: [stig_cat2, "FGFW-ND-000200"]

- name: FGFW-ND-000200 - Configure SNMPv3 user (auth SHA + priv AES), no v1/v2c
  fortinet.fortios.fortios_system_snmp_user:
    vdom: "{{ fortios_vdom }}"
    state: present
    system_snmp_user:
      name: "{{ fgt_snmp_v3_user }}"
      security_level: "auth-priv"
      auth_proto: "sha"
      auth_pwd: "{{ fgt_snmp_v3_auth }}"
      priv_proto: "aes"
      priv_pwd: "{{ fgt_snmp_v3_priv }}"
      queries: "enable"
  no_log: true
  check_mode: "{{ not (apply_changes | bool) }}"
  register: fgt_snmp_user
  tags: [stig_cat2, "FGFW-ND-000200"]
