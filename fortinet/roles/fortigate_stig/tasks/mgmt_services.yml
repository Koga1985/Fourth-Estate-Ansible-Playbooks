---
# Secure management services - strong crypto, TLS floor, disable plaintext admin
# FGFW-ND-000113/000114 (Telnet/HTTP) | FGFW-ND-000150 (TLS/strong crypto)
# NIST AC-17, CM-7, SC-8, SC-23

- name: FGFW-ND-000150 - Enforce strong crypto and TLS 1.2+ for management
  fortinet.fortios.fortios_system_global:
    vdom: "{{ fortios_vdom }}"
    system_global:
      strong_crypto: "{{ fgt_strong_crypto }}"
      ssl_min_proto_version: "{{ fgt_ssl_min_proto }}"
      admin_https_redirect: "{{ fgt_admin_https_redirect }}"
      admin_telnet: "{{ 'enable' if fgt_allow_telnet else 'disable' }}"
  check_mode: "{{ not (apply_changes | bool) }}"
  register: fgt_crypto
  tags: [stig_cat1, "FGFW-ND-000113", "FGFW-ND-000150"]

- name: FGFW-ND-000114 - Restrict admin access protocols on management interfaces
  fortinet.fortios.fortios_system_interface:
    vdom: "{{ fortios_vdom }}"
    state: present
    system_interface:
      name: "{{ fgt_mgmt_interface | default('mgmt') }}"
      allowaccess: "ping https ssh snmp"
  check_mode: "{{ not (apply_changes | bool) }}"
  register: fgt_iface
  failed_when: false
  tags: [stig_cat2, "FGFW-ND-000114"]
