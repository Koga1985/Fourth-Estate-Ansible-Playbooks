---
# Logging and authenticated NTP
# FGFW-ND-000098 (remote syslog) | FGFW-ND-000350 (NTP)
# NIST AU-4, AU-8, AU-9

- name: FGFW-ND-000350 - Configure NTP
  fortinet.fortios.fortios_system_ntp:
    vdom: "{{ fortios_vdom }}"
    system_ntp:
      type: "{{ fgt_ntp_type }}"
      ntpsync: "enable"
      server_mode: "disable"
      ntpserver:
        - id: 1
          server: "{{ fgt_ntp_server }}"
  check_mode: "{{ not (apply_changes | bool) }}"
  register: fgt_ntp
  tags: [stig_cat2, "FGFW-ND-000350"]

- name: FGFW-ND-000098 - Configure remote syslog server
  fortinet.fortios.fortios_log_syslogd_setting:
    vdom: "{{ fortios_vdom }}"
    log_syslogd_setting:
      status: "enable"
      server: "{{ fgt_syslog_server }}"
      port: "{{ fgt_syslog_port }}"
      mode: "udp"
      facility: "local7"
  check_mode: "{{ not (apply_changes | bool) }}"
  register: fgt_syslog
  tags: [stig_cat2, "FGFW-ND-000098"]

- name: FGFW-ND-000099 - Enable event logging to syslog
  fortinet.fortios.fortios_log_syslogd_filter:
    vdom: "{{ fortios_vdom }}"
    log_syslogd_filter:
      severity: "information"
      forward_traffic: "enable"
      local_traffic: "enable"
  check_mode: "{{ not (apply_changes | bool) }}"
  register: fgt_syslog_filter
  failed_when: false
  tags: [stig_cat2, "FGFW-ND-000099"]
