---
# Example overrides for fortigate_stig (-e @vars.example.yml).
apply_changes: false
fortios_vdom: root

fgt_admin_timeout_minutes: 10
fgt_admin_lockout_threshold: 3
fgt_password_min_length: 15
fgt_admin_account: admin
fgt_admin_trusthosts:
  - "10.0.0.0 255.255.255.0"
fgt_mgmt_interface: mgmt
fgt_syslog_server: 10.0.0.20
fgt_ntp_server: 10.0.0.30
fgt_snmp_v3_user: snmpv3mon
fgt_snmp_v3_auth: "{{ vault_fgt_snmp_auth }}"
fgt_snmp_v3_priv: "{{ vault_fgt_snmp_priv }}"
