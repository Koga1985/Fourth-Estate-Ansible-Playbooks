---
# Grab-and-go entry point for the FortiGate Firewall STIG role.
#
# Dry-run (default): ansible-playbook -i inventory.example run.yml
# Enforce:           ansible-playbook -i inventory.example run.yml -e apply_changes=true
- name: Apply Fortinet FortiGate Firewall STIG hardening
  hosts: fortigates
  connection: httpapi
  gather_facts: false
  any_errors_fatal: true
  collections:
    - fortinet.fortios
  roles:
    - role: fortigate_stig
