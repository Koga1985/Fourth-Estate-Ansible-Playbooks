name: CI

# Validates that the playbooks actually parse and lint, so "production ready"
# is a verifiable state instead of a claim. See docs/PRODUCTION_READINESS_ASSESSMENT.md.

on:
  push:
    branches: ["**"]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  # ---------------------------------------------------------------------------
  # ENFORCED GATE 1: YAML must parse and have no duplicate keys.
  # Catches the class of bug that aborts ansible-playbook before any task runs.
  # Requires no Ansible collections, so it is fast and runner-agnostic.
  # ---------------------------------------------------------------------------
  yaml:
    name: YAML parse + lint (required)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install yamllint + PyYAML
        run: pip install --quiet yamllint pyyaml

      - name: YAML parse check (all .yml/.yaml must load)
        run: python3 scripts/check_yaml.py .

      - name: yamllint (syntax errors + duplicate keys)
        run: yamllint -c .yamllint .

  # ---------------------------------------------------------------------------
  # ENFORCED GATE 2: ansible-lint (deterministic, --offline).
  # Uses .ansible-lint (profile + documented skips) and the .ansible-lint-ignore
  # baseline so the current tree passes and any NEW violation fails the build.
  # --offline keeps results identical regardless of Ansible Galaxy availability;
  # collection/roles-path-dependent rules (syntax-check, load-failure) are
  # exercised by the informational job below where collections are installed.
  # ---------------------------------------------------------------------------
  ansible-lint:
    name: ansible-lint (required, baseline-ratcheted)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install ansible-core + ansible-lint
        run: pip install --quiet ansible-core ansible-lint

      - name: ansible-lint (offline, baseline-ratcheted)
        run: |
          dirs=$(ls -d */ | grep -vE '^(docs|\.vscode|scripts)/' | tr -d '/' | tr '\n' ' ')
          ansible-lint --offline $dirs

  # ---------------------------------------------------------------------------
  # INFORMATIONAL: full ansible-lint + ansible-playbook --syntax-check with the
  # declared collections installed. Not blocking (continue-on-error) because it
  # depends on Galaxy reachability and a fully resolved roles_path. Promote to a
  # required gate once findings are triaged on a Galaxy-enabled runner.
  # ---------------------------------------------------------------------------
  ansible-syntax-check:
    name: ansible-lint + syntax-check (informational)
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install ansible-core + ansible-lint
        run: pip install --quiet ansible-core ansible-lint

      - name: Install declared collections (best-effort)
        run: |
          # Install from every requirements.yml so FQCN modules resolve.
          # Best-effort: a single unreachable collection should not abort the job.
          find . -path ./.git -prune -o -name 'requirements.yml' -print | while read -r req; do
            echo "::group::ansible-galaxy install -r $req"
            ansible-galaxy collection install -r "$req" || true
            echo "::endgroup::"
          done

      - name: Full ansible-lint (with collections)
        run: |
          dirs=$(ls -d */ | grep -vE '^(docs|\.vscode|scripts)/' | tr -d '/' | tr '\n' ' ')
          ansible-lint $dirs || true

      - name: Syntax-check discoverable playbooks
        run: |
          # A "playbook" here = any *.yml whose top level is a list of plays
          # (has a 'hosts:' key). Syntax-check each; report failures but do not
          # abort (missing collections on a restricted runner are expected).
          shopt -s globstar nullglob
          fail=0
          for pb in **/*.yml; do
            case "$pb" in .git/*|.github/*) continue;; esac
            if grep -qE '^\s*-?\s*hosts:' "$pb" 2>/dev/null; then
              if ! ansible-playbook --syntax-check "$pb" >/dev/null 2>&1; then
                echo "syntax-check could not validate: $pb"
                fail=$((fail+1))
              fi
            fi
          done
          echo "Playbooks that did not pass syntax-check (often missing collections): $fail"
