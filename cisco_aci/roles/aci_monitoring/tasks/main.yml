---
# tasks file for aci_monitoring
# Cisco ACI Monitoring - SNMP, syslog, Call Home, health monitoring, and fault management

# ============================================================
# Prerequisites and Validation (always runs)
# ============================================================
- name: PHASE 5 - Run prerequisites and validation
  ansible.builtin.include_tasks:
    file: prerequisites.yml
    apply:
      tags:
        - always
        - prerequisites
        - validation
  tags:
    - always
    - prerequisites
    - validation

# ============================================================
# SNMP Configuration
# ============================================================
- name: PHASE 5 - Configure SNMP monitoring
  ansible.builtin.include_tasks:
    file: snmp.yml
    apply:
      tags:
        - aci
        - monitoring
        - snmp
        - phase5
  when: enable_snmp | bool
  tags:
    - aci
    - monitoring
    - snmp
    - phase5

# ============================================================
# Syslog Configuration
# ============================================================
- name: PHASE 5 - Configure syslog destinations and policies
  ansible.builtin.include_tasks:
    file: syslog.yml
    apply:
      tags:
        - aci
        - monitoring
        - syslog
        - logging
        - phase5
  when: enable_syslog | bool
  tags:
    - aci
    - monitoring
    - syslog
    - logging
    - phase5

# ============================================================
# Call Home Configuration
# ============================================================
- name: PHASE 5 - Configure Call Home smart notifications
  ansible.builtin.include_tasks:
    file: callhome.yml
    apply:
      tags:
        - aci
        - monitoring
        - callhome
        - phase5
  when: enable_callhome | bool
  tags:
    - aci
    - monitoring
    - callhome
    - phase5

# ============================================================
# Health Monitoring
# ============================================================
- name: PHASE 5 - Run fabric health monitoring checks
  ansible.builtin.include_tasks:
    file: health_monitoring.yml
    apply:
      tags:
        - aci
        - monitoring
        - health
        - phase5
  when: enable_health_monitoring | bool
  tags:
    - aci
    - monitoring
    - health
    - phase5

# ============================================================
# Fault Management
# ============================================================
- name: PHASE 5 - Run fault management and analysis
  ansible.builtin.include_tasks:
    file: fault_management.yml
    apply:
      tags:
        - aci
        - monitoring
        - faults
        - phase5
  when: enable_fault_management | bool
  tags:
    - aci
    - monitoring
    - faults
    - phase5

# ============================================================
# Validation and Verification
# ============================================================
- name: PHASE 5 - Validate monitoring configuration
  ansible.builtin.include_tasks:
    file: validation.yml
    apply:
      tags:
        - validation
        - verification
  tags:
    - validation
    - verification
