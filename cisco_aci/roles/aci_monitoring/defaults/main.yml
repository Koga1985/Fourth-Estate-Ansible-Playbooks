---
# defaults file for aci_monitoring
# Cisco ACI Monitoring - SNMP, syslog, Call Home, health monitoring, and fault management

# ============================================================
# APIC Connection Parameters
# ============================================================
aci_host: "{{ vault_aci_apic_hostname }}"
aci_username: "{{ vault_aci_apic_username }}"
aci_password: "{{ vault_aci_apic_password }}"
aci_verify_ssl: true
aci_use_proxy: false
aci_timeout: 30
aci_port: 443

# ============================================================
# Deployment Control
# ============================================================
apply_changes: false
artifacts_dir: "/tmp/aci-artifacts"

# ============================================================
# Fourth Estate Organization
# ============================================================
fourth_estate_org: "FourthEstate"
fourth_estate_contact: "{{ vault_fourth_estate_contact }}"
fourth_estate_environment: "production"
fourth_estate_region: "primary"

# ============================================================
# Feature Toggles
# ============================================================
enable_snmp: true
enable_syslog: true
enable_callhome: true
enable_health_monitoring: true
enable_fault_management: true

# ============================================================
# SNMP Configuration
# ============================================================
aci_snmp_enabled: true
aci_snmp_version: "v3"
aci_snmp_community: "{{ vault_aci_snmp_community }}"
aci_snmp_contact: "{{ vault_fourth_estate_contact }}"
aci_snmp_location: "{{ vault_aci_snmp_location }}"

# SNMPv3 Users
aci_snmp_v3_users:
  - username: "fe-snmpv3-ro"
    auth_type: "SHA"
    auth_password: "{{ vault_aci_snmpv3_auth_password }}"
    priv_type: "AES-128"
    priv_password: "{{ vault_aci_snmpv3_priv_password }}"
    description: "Fourth Estate SNMPv3 Read-Only User"

# SNMP Trap Destinations
aci_snmp_trap_destinations:
  - host: "{{ vault_snmp_trap_host_primary }}"
    port: 162
    version: "v3"
    community: "{{ vault_aci_snmp_community }}"
    description: "Primary SNMP Trap Receiver"
  - host: "{{ vault_snmp_trap_host_secondary }}"
    port: 162
    version: "v3"
    community: "{{ vault_aci_snmp_community }}"
    description: "Secondary SNMP Trap Receiver"

# SNMP Client Groups (source IP restriction)
aci_snmp_client_groups:
  - name: "FourthEstate-SNMP-Clients"
    description: "Authorized SNMP polling sources - Fourth Estate"
    clients:
      - address: "10.0.0.0/8"
        name: "mgmt-network"

# ============================================================
# Syslog Configuration
# ============================================================
aci_syslog_enabled: true

aci_syslog_destinations:
  - host: "{{ vault_syslog_server_primary }}"
    port: 514
    severity: "warnings"
    facility: "local7"
    transport: "udp"
    description: "Primary Syslog Server"
  - host: "{{ vault_syslog_server_secondary }}"
    port: 514
    severity: "warnings"
    facility: "local7"
    transport: "udp"
    description: "Secondary Syslog Server"

aci_syslog_local_severity: "information"
aci_syslog_include_ms: true
aci_syslog_format: "aci"
aci_syslog_include_timestamp: true
aci_syslog_include_username: true

# ============================================================
# Call Home Configuration
# ============================================================
aci_callhome_enabled: true
aci_callhome_customer_id: "{{ vault_aci_callhome_customer_id }}"
aci_callhome_contract_id: "{{ vault_aci_callhome_contract_id }}"
aci_callhome_site_id: "{{ vault_aci_callhome_site_id }}"
aci_callhome_email: "{{ vault_aci_callhome_email }}"
aci_callhome_smtp_server: "{{ vault_aci_callhome_smtp_server }}"
aci_callhome_smtp_port: 25
aci_callhome_from_email: "aci-callhome@fourthestate.local"
aci_callhome_reply_email: "noc@fourthestate.local"
aci_callhome_org_name: "FourthEstate"
aci_callhome_contact: "{{ vault_fourth_estate_contact }}"
aci_callhome_phone: "{{ vault_fourth_estate_phone }}"
aci_callhome_street_address: "{{ vault_fourth_estate_address }}"

# ============================================================
# Health Monitoring Configuration
# ============================================================
aci_health_warn_threshold: 75
aci_health_critical_threshold: 50
aci_monitor_pods: true
aci_monitor_nodes: true
aci_monitor_tenants: true
aci_health_fail_on_critical: false
aci_health_poll_interval: 300

# ============================================================
# Fault Management Configuration
# ============================================================
aci_suppress_acknowledged: false
aci_fault_page_size: 100
aci_fault_fail_on_critical: false
aci_fault_warn_on_major: true

# Fault severity levels to collect
aci_fault_severities:
  - "critical"
  - "major"
  - "minor"
  - "warning"

# ============================================================
# Compliance Frameworks
# ============================================================
compliance_frameworks:
  - "dod_stig"
  - "nist_800_53"
  - "nist_800_171"
  - "fisma_moderate"
  - "fisma_high"
