---
# tasks file for aci_network_config
# Cisco ACI Network Connectivity - L3Out, L2Out, external EPGs, static routes, BGP/OSPF

# ============================================================
# Prerequisites and Validation (always runs)
# ============================================================
- name: PHASE 3 - Run prerequisites and validation
  ansible.builtin.include_tasks:
    file: prerequisites.yml
    apply:
      tags:
        - always
        - prerequisites
        - validation
  tags:
    - always
    - prerequisites
    - validation

# ============================================================
# L3Out Configuration
# ============================================================
- name: PHASE 3 - Configure L3Out external connectivity
  ansible.builtin.include_tasks:
    file: l3out.yml
    apply:
      tags:
        - aci
        - network
        - l3out
        - phase3
  when: enable_l3out | bool
  tags:
    - aci
    - network
    - l3out
    - phase3

# ============================================================
# L2Out Configuration
# ============================================================
- name: PHASE 3 - Configure L2Out bridged connectivity
  ansible.builtin.include_tasks:
    file: l2out.yml
    apply:
      tags:
        - aci
        - network
        - l2out
        - phase3
  when: enable_l2out | bool
  tags:
    - aci
    - network
    - l2out
    - phase3

# ============================================================
# External EPG Configuration
# ============================================================
- name: PHASE 3 - Configure external EPGs and subnets
  ansible.builtin.include_tasks:
    file: external_epgs.yml
    apply:
      tags:
        - aci
        - network
        - external_epgs
        - phase3
  when: enable_external_epgs | bool
  tags:
    - aci
    - network
    - external_epgs
    - phase3

# ============================================================
# Static Route Configuration
# ============================================================
- name: PHASE 3 - Configure static routes
  ansible.builtin.include_tasks:
    file: static_routes.yml
    apply:
      tags:
        - aci
        - network
        - routing
        - phase3
  when: enable_static_routes | bool
  tags:
    - aci
    - network
    - routing
    - phase3

# ============================================================
# BGP Peer Configuration
# ============================================================
- name: PHASE 3 - Configure BGP peers
  ansible.builtin.include_tasks:
    file: bgp_peers.yml
    apply:
      tags:
        - aci
        - network
        - bgp
        - routing
        - phase3
  when: enable_bgp_peers | bool
  tags:
    - aci
    - network
    - bgp
    - routing
    - phase3

# ============================================================
# OSPF Peer Configuration
# ============================================================
- name: PHASE 3 - Configure OSPF interface policies and peers
  ansible.builtin.include_tasks:
    file: ospf_peers.yml
    apply:
      tags:
        - aci
        - network
        - ospf
        - routing
        - phase3
  when: enable_ospf_peers | bool
  tags:
    - aci
    - network
    - ospf
    - routing
    - phase3

# ============================================================
# Validation and Verification
# ============================================================
- name: PHASE 3 - Validate network configuration deployment
  ansible.builtin.include_tasks:
    file: validation.yml
    apply:
      tags:
        - validation
        - verification
        - phase3
  tags:
    - validation
    - verification
    - phase3
