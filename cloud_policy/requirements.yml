---
# Cloud Computing SRG Assessment Ansible Collections Requirements
# Install with: ansible-galaxy collection install -r requirements.yml
#
# The assessment role is a read-only evidence rollup that uses only
# ansible.builtin modules on the control node, so no external collections
# are required. The list is kept here so every platform directory installs
# the same way. Run the underlying cloud provider roles (aws/, azure/,
# google_cloud_platform/) first so their artifacts exist; those directories
# declare their own collection requirements.

collections: []
