---
# Example overrides for cloud_computing_srg_assessment (-e @vars.example.yml).

# Impact Level being assessed (IL2 / IL4 / IL5 / IL6).
cloud_impact_level: IL4

# Limit the assessment to the providers actually in use.
cloud_providers_in_scope:
  - aws
  - azure

# Where the provider compliance roles write their artifacts.
cc_evidence_input_dirs:
  - /tmp/aws-artifacts
  - /tmp/azure-artifacts
  - /tmp/policy-artifacts
