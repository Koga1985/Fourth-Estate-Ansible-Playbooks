---
# Grab-and-go entry point for the Cloud Computing SRG + SaaS assessment.
# Read-only; runs on the control node.
#
#   ansible-playbook run.yml
#   ansible-playbook run.yml -e cloud_impact_level=IL5 -e '{"cloud_providers_in_scope":["azure"]}'
#
# Output: /tmp/cloud-srg-artifacts/cloud_computing_srg_assessment.{json,md}
- name: Generate DoD Cloud Computing SRG + SaaS evidence
  hosts: localhost
  connection: local
  gather_facts: true
  roles:
    - role: cloud_computing_srg_assessment
