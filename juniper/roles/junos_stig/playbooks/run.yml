---
# Grab-and-go entry point for the Juniper Junos STIG role.
# Dry-run (candidate diff, no commit): ansible-playbook -i inventory.example run.yml
# Enforce (commit):                    ansible-playbook -i inventory.example run.yml -e apply_changes=true
- name: Apply Juniper Junos STIG hardening
  hosts: junos_devices
  gather_facts: false
  any_errors_fatal: true
  collections:
    - junipernetworks.junos
    - ansible.netcommon
  roles:
    - role: junos_stig
