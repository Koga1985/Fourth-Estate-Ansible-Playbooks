---
# Example overrides for junos_stig (-e @vars.example.yml).
apply_changes: false
junos_tacacs_servers:
  - host: 10.0.0.10
    secret: "{{ vault_junos_tacacs_key }}"
junos_syslog_host: 10.0.0.20
junos_ntp_server: 10.0.0.30
junos_bgp_peers:
  - group: EXTERNAL
    neighbor: 10.1.1.2
    auth_key: "{{ vault_junos_bgp_key }}"
    max_prefixes: 1000
