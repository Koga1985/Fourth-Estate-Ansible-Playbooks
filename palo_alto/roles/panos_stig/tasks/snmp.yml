---
# SNMPv3 only (no v2c)
# PANW-NM-000200 | NIST SC-8, IA-2

- name: PANW-NM-000200 - Configure SNMPv3 (auth + priv), disable v2c
  paloaltonetworks.panos.panos_config_element:
    provider: "{{ panos_provider }}"
    xpath: "{{ panos_dev_xpath }}/deviceconfig/system/snmp-setting"
    element: >-
      <access-setting><version><v3><views><entry name='stig-view'>
      <view><entry name='all'><oid>1</oid><option>include</option></entry></view></entry></views>
      <users><entry name='{{ panos_snmp_v3_user }}'>
      <view>stig-view</view>
      <authprotocol>sha</authprotocol><authpwd>{{ panos_snmp_v3_auth }}</authpwd>
      <privprotocol>aes-128</privprotocol><privpwd>{{ panos_snmp_v3_priv }}</privpwd>
      </entry></users></v3></version></access-setting>
  no_log: true
  check_mode: "{{ not (apply_changes | bool) }}"
  register: panos_snmp
  notify: commit panos
  tags: [stig_cat2, "PANW-NM-000200"]
