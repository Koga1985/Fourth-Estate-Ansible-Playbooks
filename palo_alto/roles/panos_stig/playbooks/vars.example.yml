---
# Example overrides for panos_stig (-e @vars.example.yml).
apply_changes: false

panos_idle_timeout_minutes: 10
panos_lockout_failed_attempts: 3
panos_password_min_length: 15

panos_permitted_mgmt_subnets:
  - "10.0.0.0/24"
panos_syslog_server: 10.0.0.20
panos_ntp_primary: 10.0.0.30
panos_ntp_secondary: 10.0.0.31
panos_snmp_v3_user: snmpv3mon
panos_snmp_v3_auth: "{{ vault_panos_snmp_auth }}"
panos_snmp_v3_priv: "{{ vault_panos_snmp_priv }}"
