---
# Grab-and-go entry point for the Palo Alto PAN-OS NDM STIG role.
#
# Dry-run (default - check mode, no candidate change/commit):
#   ansible-playbook -i inventory.example run.yml
# Enforce (edit candidate config + commit):
#   ansible-playbook -i inventory.example run.yml -e apply_changes=true
- name: Apply Palo Alto PAN-OS NDM STIG hardening
  hosts: panos_firewalls
  connection: local
  gather_facts: true
  any_errors_fatal: true
  collections:
    - paloaltonetworks.panos
  roles:
    - role: panos_stig
