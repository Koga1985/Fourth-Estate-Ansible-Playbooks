---
# defaults file for splunk_enterprise_stig
# Splunk Enterprise STIG (DISA, SPLK-CL-*) - configuration hardening applied to
# $SPLUNK_HOME/etc/system/local/*.conf via community.general.ini_file.
# NIST SP 800-53 Rev 5 aligned.
#
# Safe by default: apply_changes=false runs ini_file in check mode (reports the
# changes it WOULD make) and does NOT restart Splunk. With apply_changes=true the
# .conf files are updated and Splunk is restarted (handler).

# ============================================================
# Target (runs on the Splunk host)
# ============================================================
splunk_home: /opt/splunk
splunk_os_user: splunk

# ============================================================
# Deployment control
# ============================================================
apply_changes: false
restart_splunk_when_changed: true
artifacts_dir: "/tmp/splunk-stig-artifacts"

# ============================================================
# SPLK-CL-000070 - Splunk Web TLS + session timeout + banner (web.conf)
# ============================================================
splunk_web_ssl: true                       # enableSplunkWebSSL
splunk_web_session_timeout: "30m"          # tools.sessions.timeout
splunk_web_inactivity_timeout: 15          # ui_inactivity_timeout (minutes)
splunk_web_login_banner: >-
  You are accessing a U.S. Government (USG) Information System (IS) that is
  provided for USG-authorized use only. By using this IS you consent to the
  conditions in the full DoD Notice and Consent Banner.

# ============================================================
# SPLK-CL-000090 - splunkd TLS (server.conf)
# ============================================================
splunk_ssl_versions: "tls1.2"
splunk_cipher_suite: "ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384"

# ============================================================
# SPLK-CL-000400 - session/auth policy (server.conf [general])
# ============================================================
splunk_min_password_length: 15
splunk_lockout_attempts: 3
splunk_lockout_mins: 30

compliance_frameworks:
  - dod_stig
  - nist_800_53
  - nist_800_171
stig_benchmark: "Splunk Enterprise STIG"
stig_version: "V2R1"
