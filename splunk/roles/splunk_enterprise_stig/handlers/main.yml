---
# handlers file for splunk_enterprise_stig

- name: restart splunk
  ansible.builtin.command: "{{ splunk_home }}/bin/splunk restart"
  become: true
  become_user: "{{ splunk_os_user }}"
  register: splunk_restart
  changed_when: splunk_restart.rc == 0
  when:
    - apply_changes | bool
    - restart_splunk_when_changed | bool
  listen: restart splunk
