---
# Grab-and-go entry point for the Splunk Enterprise STIG role.
# Dry-run: ansible-playbook -i inventory.example run.yml
# Enforce: ansible-playbook -i inventory.example run.yml -e apply_changes=true
- name: Apply Splunk Enterprise STIG hardening
  hosts: splunk_servers
  gather_facts: true
  any_errors_fatal: false
  collections:
    - community.general
  roles:
    - role: splunk_enterprise_stig
