---
# Advanced audit policy subcategories
# WN11-AU-* | NIST AU-2, AU-3, AU-12

- name: WN11-AU-* - Configure advanced audit policy subcategories
  community.windows.win_audit_policy_system:
    subcategory: "{{ item.name }}"
    audit_type: "{{ (['success'] if item.success else []) + (['failure'] if item.failure else []) }}"
  loop: "{{ win_audit_subcategories }}"
  loop_control:
    label: "{{ item.name }}"
  check_mode: "{{ not (apply_changes | bool) }}"
  register: win_audit
  when: item.success or item.failure
  tags:
    - stig_cat2
    - "WN11-AU-000050"
    - "WN11-AU-000280"
    - "WN11-AU-000350"
