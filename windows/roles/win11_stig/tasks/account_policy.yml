---
# Account / password / lockout policy
# WN11-AC-000010..000100 | NIST IA-5, AC-7

- name: WN11-AC-* - Configure password and lockout policy
  ansible.windows.win_security_policy:
    section: System Access
    key: "{{ item.key }}"
    value: "{{ item.value }}"
  loop: "{{ win_account_policy | dict2items }}"
  loop_control:
    label: "{{ item.key }} = {{ item.value }}"
  check_mode: "{{ not (apply_changes | bool) }}"
  register: win_acct
  tags:
    - stig_cat2
    - "WN11-AC-000020"
    - "WN11-AC-000050"
    - "WN11-AC-000080"
    - "WN11-AC-000090"
