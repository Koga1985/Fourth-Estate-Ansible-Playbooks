---
# Security options / computer configuration (registry)
# WN19-SO-* / WN19-CC-* | NIST AC-7, AC-8, IA-5, SC-8, CM-6

- name: WN19-SO-*/CC-* - Apply registry security settings
  ansible.windows.win_regedit:
    path: "{{ item.path }}"
    name: "{{ item.name }}"
    data: "{{ item.data }}"
    type: "{{ item.type }}"
  loop: "{{ win_registry_settings }}"
  loop_control:
    label: "{{ item.id }} - {{ item.name }}"
  check_mode: "{{ not (apply_changes | bool) }}"
  register: win_reg
  tags:
    - stig_cat2
    - "WN19-SO-000150"
    - "WN19-SO-000250"
    - "WN19-CC-000350"

- name: WN19-SO-000040 - Configure DoD logon legal notice text
  ansible.windows.win_regedit:
    path: 'HKLM:\Software\Microsoft\Windows\CurrentVersion\Policies\System'
    name: LegalNoticeText
    data: "{{ win_legal_notice_text }}"
    type: string
  check_mode: "{{ not (apply_changes | bool) }}"
  register: win_legal
  tags: [stig_cat2, "WN19-SO-000040"]
