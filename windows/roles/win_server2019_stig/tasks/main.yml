---
# tasks file for win_server2019_stig

- name: Ensure artifacts directory exists on control node
  ansible.builtin.file:
    path: "{{ artifacts_dir }}"
    state: directory
    mode: "0750"
  delegate_to: localhost
  run_once: true
  changed_when: false
  tags: [always]

- name: Show run mode
  ansible.builtin.debug:
    msg: >-
      win_server2019_stig on {{ inventory_hostname }} -
      {{ 'ENFORCING' if apply_changes | bool else 'DRY-RUN / check mode only' }}
      (DC={{ win_is_domain_controller }}, DNS={{ win_is_dns_server }})
  tags: [always]

- name: Account / password / lockout policy (WN19-AC-*)
  ansible.builtin.import_tasks: account_policy.yml
  when: stig_account_policy | bool
  tags: [stig, account]

- name: Advanced audit policy (WN19-AU-*)
  ansible.builtin.import_tasks: audit_policy.yml
  when: stig_audit_policy | bool
  tags: [stig, audit]

- name: Security options / computer config registry (WN19-SO-*/CC-*)
  ansible.builtin.import_tasks: security_options.yml
  when: stig_security_options | bool
  tags: [stig, security_options]

- name: Active Directory Domain STIG controls
  ansible.builtin.import_tasks: ad_domain.yml
  when: stig_ad_domain | bool
  tags: [stig, ad]

- name: Windows DNS STIG controls
  ansible.builtin.import_tasks: dns_server.yml
  when: stig_dns_server | bool
  tags: [stig, dns]

- name: Compliance report
  ansible.builtin.import_tasks: compliance_report.yml
  when: stig_compliance_report | bool
  tags: [stig, report]
