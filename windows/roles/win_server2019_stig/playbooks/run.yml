---
# Grab-and-go entry point for the Windows Server 2019 STIG role.
#
# Dry-run (default): ansible-playbook -i inventory.example run.yml
# Enforce:           ansible-playbook -i inventory.example run.yml -e apply_changes=true
- name: Apply Microsoft Windows Server 2019 STIG hardening
  hosts: windows_2019
  gather_facts: true
  any_errors_fatal: false
  collections:
    - ansible.windows
    - community.windows
    - microsoft.ad
  roles:
    - role: win_server2019_stig
