---
# Example overrides for win_server2019_stig (-e @vars.example.yml).
apply_changes: false

# Set per-host in inventory/group_vars instead for mixed fleets:
win_is_domain_controller: false
win_is_dns_server: false

win_account_policy:
  MinimumPasswordLength: 14
  PasswordComplexity: 1
  PasswordHistorySize: 24
  MaximumPasswordAge: 60
  MinimumPasswordAge: 1
  ClearTextPassword: 0
  LockoutBadCount: 3
  LockoutDuration: 15
  ResetLockoutCount: 15
