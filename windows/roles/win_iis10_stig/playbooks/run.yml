---
# Grab-and-go entry point for the IIS 10.0 STIG role.
#
# Dry-run (default): ansible-playbook -i inventory.example run.yml
# Enforce:           ansible-playbook -i inventory.example run.yml -e apply_changes=true
- name: Apply Microsoft IIS 10.0 STIG hardening
  hosts: iis_servers
  gather_facts: true
  any_errors_fatal: false
  collections:
    - ansible.windows
    - community.windows
  roles:
    - role: win_iis10_stig
