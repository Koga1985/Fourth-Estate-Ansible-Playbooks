---
# defaults file for win_iis10_stig
# Microsoft IIS 10.0 STIG - Server (IISW-SV-*) and Site (IISW-SI-*) hardening
# via ansible.windows (WebAdministration / appcmd + Schannel registry).
# NIST SP 800-53 Rev 5 aligned.
#
# Safe by default: apply_changes=false runs every task in check/report mode
# (the PowerShell controls compute drift without changing anything). With
# apply_changes=true the settings are written. A per-host JSON artifact is saved.

# ============================================================
# Deployment control
# ============================================================
apply_changes: false
artifacts_dir: "/tmp/iis10-stig-artifacts"     # on the Ansible control node

# Target site for site-level (IISW-SI-*) controls.
iis_site_name: "Default Web Site"
iis_app_pool_name: "DefaultAppPool"

# ============================================================
# Control-area toggles
# ============================================================
stig_server_logging: true
stig_server_modules_tls: true
stig_site_security: true
stig_compliance_report: true

# ============================================================
# IISW-SV-000110/000115 - Logging fields
# ============================================================
iis_log_fields:
  - Date
  - Time
  - ClientIP
  - UserName
  - Method
  - UriQuery
  - HttpStatus
  - Referer

# ============================================================
# IISW-SV-000130 - MIME types to remove (mapped to executable content)
# ============================================================
iis_remove_mime_extensions:
  - ".exe"
  - ".dll"
  - ".com"
  - ".bat"
  - ".csh"

# ============================================================
# IISW-SV-000159 / IISW-SI-000231 - Schannel TLS hardening (server-wide)
# Disable legacy protocols, enforce TLS 1.2.
# ============================================================
iis_disable_protocols:
  - "SSL 2.0"
  - "SSL 3.0"
  - "TLS 1.0"
  - "TLS 1.1"
iis_enable_protocols:
  - "TLS 1.2"

# ============================================================
# IISW-SI-000210 - Session timeout (minutes)
# ============================================================
iis_session_timeout_minutes: 20

# ============================================================
# Reporting metadata
# ============================================================
compliance_frameworks:
  - dod_stig
  - nist_800_53
  - nist_800_171
stig_benchmark: "Microsoft IIS 10.0 Server + Site STIG"
stig_version: "V3R1"
