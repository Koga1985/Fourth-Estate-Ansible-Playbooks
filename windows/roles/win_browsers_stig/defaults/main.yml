---
# defaults file for win_browsers_stig
# DISA browser STIGs applied as Windows machine policies (registry):
#   * Microsoft Edge STIG    (EDGE-00-*)
#   * Google Chrome STIG     (DTBC-*)
#   * Mozilla Firefox STIG   (DTBF-*)
# via ansible.windows.win_regedit. NIST SP 800-53 Rev 5 aligned.
#
# Safe by default: apply_changes=false runs win_regedit in check mode (reports,
# no change). A per-host JSON artifact is written either way.

apply_changes: false
artifacts_dir: "/tmp/win-browsers-stig-artifacts"

# Which browsers to enforce on this host
stig_edge: true
stig_chrome: true
stig_firefox: true
stig_compliance_report: true

# Policy registry roots
edge_policy_path: 'HKLM:\SOFTWARE\Policies\Microsoft\Edge'
chrome_policy_path: 'HKLM:\SOFTWARE\Policies\Google\Chrome'
firefox_policy_path: 'HKLM:\SOFTWARE\Policies\Mozilla\Firefox'

# ============================================================
# EDGE-00-* - Microsoft Edge
# ============================================================
edge_settings:
  - { id: "EDGE-00-000017", name: "SSLVersionMin", data: "tls1.2", type: string }
  - { id: "EDGE-00-001100", name: "SmartScreenEnabled", data: 1, type: dword }
  - { id: "EDGE-00-001200", name: "PreventSmartScreenPromptOverride", data: 1, type: dword }
  - { id: "EDGE-00-000019", name: "PasswordManagerEnabled", data: 0, type: dword }
  - { id: "EDGE-00-000022", name: "AutoplayAllowed", data: 0, type: dword }
  - { id: "EDGE-00-000025", name: "BackgroundModeEnabled", data: 0, type: dword }
  - { id: "EDGE-00-000027", name: "DefaultPopupsSetting", data: 2, type: dword }
  - { id: "EDGE-00-000030", name: "InPrivateModeAvailability", data: 1, type: dword }

# ============================================================
# DTBC-* - Google Chrome
# ============================================================
chrome_settings:
  - { id: "DTBC-0001", name: "SSLVersionMin", data: "tls1.2", type: string }
  - { id: "DTBC-0006", name: "PasswordManagerEnabled", data: 0, type: dword }
  - { id: "DTBC-0008", name: "DefaultPopupsSetting", data: 2, type: dword }
  - { id: "DTBC-0017", name: "IncognitoModeAvailability", data: 1, type: dword }
  - { id: "DTBC-0035", name: "SafeBrowsingProtectionLevel", data: 1, type: dword }
  - { id: "DTBC-0067", name: "RemoteAccessHostFirewallTraversal", data: 0, type: dword }
  - { id: "DTBC-0070", name: "DownloadRestrictions", data: 1, type: dword }

# ============================================================
# DTBF-* - Mozilla Firefox
# ============================================================
firefox_settings:
  - { id: "DTBF-001000", name: "DisableTelemetry", data: 1, type: dword }
  - { id: "DTBF-001100", name: "DisableFirefoxStudies", data: 1, type: dword }
  - { id: "DTBF-001200", name: "DisablePocket", data: 1, type: dword }
  - { id: "DTBF-001300", name: "DisableFormHistory", data: 1, type: dword }
  - { id: "DTBF-001400", name: "ExtensionUpdate", data: 1, type: dword }

compliance_frameworks:
  - dod_stig
  - nist_800_53
  - nist_800_171
stig_benchmark: "DISA Web Browser STIGs (Edge / Chrome / Firefox)"
stig_version: "current"
