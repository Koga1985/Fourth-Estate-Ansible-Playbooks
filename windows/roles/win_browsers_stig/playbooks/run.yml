---
# Grab-and-go entry point for the Browser STIG role.
# Dry-run: ansible-playbook -i inventory.example run.yml
# Enforce: ansible-playbook -i inventory.example run.yml -e apply_changes=true
- name: Apply DISA web browser STIGs (Edge / Chrome / Firefox)
  hosts: windows_hosts
  gather_facts: true
  any_errors_fatal: false
  collections:
    - ansible.windows
  roles:
    - role: win_browsers_stig
